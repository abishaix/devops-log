server {
    listen 80;

    # All traffic hitting the public IP (3.108.40.11) on port 80
    # gets forwarded internally to the Flask backend on the private server.
    # The client never knows 10.0.131.56 exists.
    location / {
        proxy_pass http://10.0.131.56:5000;

        # Forward the original client IP to Flask so the app knows
        # where the request actually came from
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
