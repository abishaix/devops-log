<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" style="background:#ffffff;font-family:Arial,sans-serif">
  <style>
    .title{font-size:18px;font-weight:bold;fill:#232f3e}
    .vpclbl{font-size:13px;font-weight:bold;fill:#1a73e8}
    .sublbl{font-size:11px;font-weight:bold;fill:#3f6212}
    .node{font-size:12px;font-weight:bold;fill:#ffffff}
    .nodesub{font-size:10px;fill:#ffffff}
    .rt{font-size:10px;fill:#7c2d12;font-weight:bold}
    .small{font-size:11px;fill:#444}
    .flow{font-size:10px;fill:#b91c1c;font-weight:bold}
  </style>

  <text x="30" y="32" class="title">lab-16 Part 1 — S3 via NAT Gateway (internet path)</text>

  <!-- User -->
  <rect x="20" y="180" width="80" height="50" rx="6" fill="#475569"/>
  <text x="60" y="202" text-anchor="middle" class="node">User</text>
  <text x="60" y="218" text-anchor="middle" class="nodesub">console</text>

  <!-- Region boundary -->
  <rect x="115" y="55" width="580" height="420" rx="12" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6"/>
  <text x="130" y="74" style="font-size:11px;font-weight:bold;fill:#b45309">us-west-2 / Oregon</text>

  <!-- VPC -->
  <rect x="130" y="85" width="420" height="370" rx="10" fill="none" stroke="#1a73e8" stroke-width="2"/>
  <text x="146" y="106" class="vpclbl">VPC  10.0.0.0/24  (mod1-vpc)</text>

  <!-- Public subnet -->
  <rect x="148" y="115" width="185" height="100" rx="8" fill="#eef6ff" stroke="#3b82f6" stroke-dasharray="4"/>
  <text x="160" y="133" class="sublbl">Public Subnet</text>
  <rect x="168" y="143" width="140" height="58" rx="6" fill="#dd6b20"/>
  <text x="238" y="168" text-anchor="middle" class="node">Bastion</text>
  <text x="238" y="184" text-anchor="middle" class="nodesub">35.93.224.251</text>

  <!-- Private subnet -->
  <rect x="148" y="235" width="385" height="200" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-dasharray="4"/>
  <text x="160" y="253" class="sublbl">Private Subnet</text>
  <rect x="168" y="263" width="140" height="58" rx="6" fill="#16a34a"/>
  <text x="238" y="288" text-anchor="middle" class="node">ec2-private</text>
  <text x="238" y="304" text-anchor="middle" class="nodesub">10.0.140.142</text>

  <!-- Route table -->
  <rect x="330" y="263" width="185" height="80" rx="6" fill="#fefce8" stroke="#ca8a04"/>
  <text x="340" y="282" class="rt">Route table (private):</text>
  <text x="340" y="298" class="rt">10.0.0.0/24  → local</text>
  <text x="340" y="314" class="rt">0.0.0.0/0    → NAT GW</text>
  <text x="340" y="330" style="font-size:9px;fill:#b91c1c;font-weight:bold">S3 traffic goes via internet ⚠</text>

  <!-- IGW -->
  <rect x="560" y="115" width="120" height="58" rx="8" fill="#0369a1"/>
  <text x="620" y="140" text-anchor="middle" class="node">IGW</text>
  <text x="620" y="156" text-anchor="middle" class="nodesub">internet gateway</text>

  <!-- NAT -->
  <rect x="560" y="195" width="120" height="58" rx="8" fill="#7c3aed"/>
  <text x="620" y="220" text-anchor="middle" class="node">NAT Gateway</text>
  <text x="620" y="236" text-anchor="middle" class="nodesub">54.190.220.171</text>

  <!-- Public internet -->
  <rect x="730" y="150" width="110" height="70" rx="35" fill="#f59e0b"/>
  <text x="785" y="180" text-anchor="middle" class="node">Public</text>
  <text x="785" y="196" text-anchor="middle" class="node">Internet</text>

  <!-- S3 -->
  <rect x="730" y="290" width="110" height="70" rx="10" fill="#dd6b20"/>
  <text x="785" y="322" text-anchor="middle" class="node">Amazon S3</text>
  <text x="785" y="338" text-anchor="middle" class="nodesub">s3-nat-access-bucket</text>

  <!-- IAM role note -->
  <rect x="148" y="360" width="170" height="70" rx="6" fill="#fdf4ff" stroke="#9333ea"/>
  <text x="158" y="378" style="font-size:10px;font-weight:bold;fill:#7e22ce">IAM Role (on ec2-private)</text>
  <text x="158" y="394" style="font-size:9px;fill:#444">STS temp credentials</text>
  <text x="158" y="408" style="font-size:9px;fill:#444">S3FullAccess permission</text>
  <text x="158" y="422" style="font-size:9px;fill:#444">rotates every 1-12hrs</text>

  <!-- Arrows -->
  <line x1="100" y1="200" x2="146" y2="180" stroke="#b91c1c" stroke-width="2" marker-end="url(#arr)"/>
  <text x="90" y="192" class="flow">SSH</text>
  <line x1="238" y1="230" x2="238" y2="261" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr)"/>
  <line x1="308" y1="292" x2="328" y2="292" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="515" y1="292" x2="558" y2="224" stroke="#b91c1c" stroke-width="2" marker-end="url(#arr)"/>
  <text x="490" y="267" class="flow">0.0.0.0/0</text>
  <line x1="620" y1="193" x2="620" y2="175" stroke="#b91c1c" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="680" y1="155" x2="728" y2="175" stroke="#b91c1c" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="785" y1="220" x2="785" y2="288" stroke="#b91c1c" stroke-width="2" marker-end="url(#arr)"/>
  <text x="790" y="262" class="flow">S3 API call</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b91c1c"/>
    </marker>
  </defs>
</svg>
