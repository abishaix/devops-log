<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520" style="background:#ffffff;font-family:Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Internet -->
  <rect x="280" y="16" width="200" height="44" rx="22" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
  <text x="380" y="44" text-anchor="middle" font-size="15" font-weight="bold" fill="#0C447C">Internet</text>

  <!-- Developer -->
  <rect x="16" y="16" width="170" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="101" y="38" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C2C2A">Developer</text>
  <text x="101" y="58" text-anchor="middle" font-size="12" fill="#5F5E5A">Outside AWS</text>

  <!-- Dev to Internet -->
  <line x1="186" y1="38" x2="278" y2="38" stroke="#888" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)"/>

  <!-- Internet bidirectional IGW -->
  <line x1="380" y1="60" x2="380" y2="96" stroke="#555" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- IGW -->
  <rect x="260" y="96" width="240" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="380" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Internet Gateway</text>
  <text x="380" y="136" text-anchor="middle" font-size="12" fill="#0F6E56">Attaches to VPC — not subnet</text>

  <!-- IGW to RT -->
  <line x1="380" y1="148" x2="380" y2="184" stroke="#555" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- Route Table -->
  <rect x="260" y="184" width="240" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
  <text x="380" y="206" text-anchor="middle" font-size="14" font-weight="bold" fill="#712B13">Route Table</text>
  <text x="380" y="224" text-anchor="middle" font-size="12" fill="#993C1D">0.0.0.0/0 to IGW  |  local</text>

  <!-- VPC -->
  <rect x="30" y="264" width="700" height="236" rx="16" fill="#EEEDFE" fill-opacity="0.2" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="380" y="288" text-anchor="middle" font-size="14" font-weight="bold" fill="#3C3489">VPC  10.0.0.0/16</text>

  <!-- RT to public subnet assoc -->
  <path d="M320 236 L190 292" fill="none" stroke="#993C1D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="228" y="258" text-anchor="middle" font-size="11" fill="#993C1D">subnet assoc.</text>

  <!-- Public Subnet -->
  <rect x="50" y="296" width="280" height="184" rx="10" fill="#E1F5EE" fill-opacity="0.6" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="190" y="318" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Public Subnet</text>
  <text x="190" y="334" text-anchor="middle" font-size="12" fill="#0F6E56">10.0.0.0/24</text>

  <!-- Private Subnet -->
  <rect x="430" y="296" width="280" height="184" rx="10" fill="#F1EFE8" fill-opacity="0.6" stroke="#5F5E5A" stroke-width="1.2"/>
  <text x="570" y="318" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C2C2A">Private Subnet</text>
  <text x="570" y="334" text-anchor="middle" font-size="12" fill="#5F5E5A">10.0.1.0/24</text>
  <text x="570" y="350" text-anchor="middle" font-size="11" fill="#A32D2D">No IGW route</text>

  <!-- Public EC2 -->
  <rect x="70" y="358" width="240" height="68" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="190" y="379" text-anchor="middle" font-size="14" font-weight="bold" fill="#0C447C">EC2 Instance</text>
  <text x="190" y="397" text-anchor="middle" font-size="12" fill="#185FA5">Public IP + Private IP</text>
  <text x="190" y="414" text-anchor="middle" font-size="12" fill="#185FA5">SG: port 22 open</text>

  <!-- Private EC2 -->
  <rect x="450" y="358" width="240" height="68" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="570" y="379" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C2C2A">EC2 Instance</text>
  <text x="570" y="397" text-anchor="middle" font-size="12" fill="#5F5E5A">Private IP only</text>
  <text x="570" y="414" text-anchor="middle" font-size="12" fill="#5F5E5A">Not reachable from outside</text>

  <!-- Dev SSH to public (green dashed) -->
  <path d="M60 70 Q30 200 68 358" fill="none" stroke="#0F6E56" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#ag)"/>
  <text x="22" y="220" font-size="12" fill="#0F6E56" font-weight="bold">SSH</text>
  <text x="22" y="236" font-size="12" fill="#0F6E56" font-weight="bold">allowed</text>

  <!-- Blocked arrow to private -->
  <line x1="332" y1="392" x2="448" y2="392" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="390" y="380" text-anchor="middle" font-size="13" fill="#A32D2D" font-weight="bold">blocked  X</text>

  <!-- Legend bar -->
  <rect x="30" y="488" width="700" height="24" rx="4" fill="#F5F5F5" stroke="#DDD" stroke-width="0.5"/>
  <line x1="50" y1="500" x2="80" y2="500" stroke="#0F6E56" stroke-width="1.8" stroke-dasharray="5 3"/>
  <text x="90" y="504" font-size="11" fill="#333">SSH allowed</text>
  <line x1="200" y1="500" x2="230" y2="500" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="240" y="504" font-size="11" fill="#333">Blocked</text>
  <line x1="330" y1="500" x2="360" y2="500" stroke="#993C1D" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="370" y="504" font-size="11" fill="#333">Subnet association</text>
  <text x="570" y="504" font-size="11" fill="#888">Day 7  DevOps Bootcamp</text>
</svg>
