<svg width="900" height="760" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif">

  <text x="450" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Session 78 — Import, Data Sources &amp; Lifecycle</text>

  <!-- IMPORT PANEL -->
  <rect x="30" y="60" width="260" height="330" rx="8" fill="#eef4ff" stroke="#3b6fd6" stroke-width="1.5"/>
  <text x="160" y="88" font-size="15" font-weight="bold" text-anchor="middle" fill="#1a3d8f">terraform import</text>

  <rect x="55" y="105" width="210" height="40" rx="5" fill="#ffffff" stroke="#3b6fd6"/>
  <text x="160" y="129" font-size="11" text-anchor="middle">Manually created resource</text>

  <line x1="160" y1="145" x2="160" y2="165" stroke="#3b6fd6" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="55" y="165" width="210" height="40" rx="5" fill="#ffffff" stroke="#3b6fd6"/>
  <text x="160" y="184" font-size="11" text-anchor="middle">Empty resource block</text>
  <text x="160" y="198" font-size="11" text-anchor="middle">written in .tf</text>

  <line x1="160" y1="205" x2="160" y2="225" stroke="#3b6fd6" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="55" y="225" width="210" height="40" rx="5" fill="#ffffff" stroke="#3b6fd6"/>
  <text x="160" y="244" font-size="11" text-anchor="middle">terraform import</text>
  <text x="160" y="258" font-size="11" text-anchor="middle">resource.name id</text>

  <line x1="160" y1="265" x2="160" y2="285" stroke="#3b6fd6" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="55" y="285" width="210" height="40" rx="5" fill="#ffffff" stroke="#3b6fd6"/>
  <text x="160" y="304" font-size="11" text-anchor="middle">State updated,</text>
  <text x="160" y="318" font-size="11" text-anchor="middle">.tf args added manually</text>

  <line x1="160" y1="325" x2="160" y2="345" stroke="#3b6fd6" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="55" y="345" width="210" height="35" rx="5" fill="#d7ecd9" stroke="#2f8f4e"/>
  <text x="160" y="367" font-size="11" font-weight="bold" text-anchor="middle" fill="#1e6b34">plan: zero changes</text>

  <!-- DATA PANEL -->
  <rect x="320" y="60" width="260" height="330" rx="8" fill="#fff6ea" stroke="#d68a1f" stroke-width="1.5"/>
  <text x="450" y="88" font-size="15" font-weight="bold" text-anchor="middle" fill="#8a5610">data block</text>

  <rect x="345" y="105" width="210" height="40" rx="5" fill="#ffffff" stroke="#d68a1f"/>
  <text x="450" y="124" font-size="11" text-anchor="middle">Existing AWS resource</text>
  <text x="450" y="138" font-size="11" text-anchor="middle">(any origin)</text>

  <line x1="450" y1="145" x2="450" y2="165" stroke="#d68a1f" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <rect x="345" y="165" width="210" height="40" rx="5" fill="#ffffff" stroke="#d68a1f"/>
  <text x="450" y="184" font-size="11" text-anchor="middle">data block + filter</text>
  <text x="450" y="198" font-size="11" text-anchor="middle">(tag, name, most_recent)</text>

  <line x1="450" y1="205" x2="450" y2="225" stroke="#d68a1f" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <rect x="345" y="225" width="210" height="40" rx="5" fill="#ffffff" stroke="#d68a1f"/>
  <text x="450" y="249" font-size="11" text-anchor="middle">Value fetched read-only</text>

  <line x1="450" y1="265" x2="450" y2="285" stroke="#d68a1f" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <rect x="345" y="285" width="210" height="40" rx="5" fill="#ffffff" stroke="#d68a1f"/>
  <text x="450" y="304" font-size="11" text-anchor="middle">Referenced inside a</text>
  <text x="450" y="318" font-size="11" text-anchor="middle">resource block</text>

  <rect x="345" y="345" width="210" height="35" rx="5" fill="#fbe3c2" stroke="#a86a12"/>
  <text x="450" y="367" font-size="10.5" font-weight="bold" text-anchor="middle" fill="#7a4c0e">never created/destroyed</text>

  <!-- LIFECYCLE PANEL -->
  <rect x="610" y="60" width="260" height="330" rx="8" fill="#f3ecfa" stroke="#7a3fbf" stroke-width="1.5"/>
  <text x="740" y="88" font-size="15" font-weight="bold" text-anchor="middle" fill="#4c1f80">lifecycle block</text>

  <rect x="630" y="105" width="220" height="55" rx="5" fill="#ffffff" stroke="#7a3fbf"/>
  <text x="740" y="126" font-size="11" font-weight="bold" text-anchor="middle">create_before_destroy</text>
  <text x="740" y="142" font-size="10" text-anchor="middle">new resource made first,</text>
  <text x="740" y="155" font-size="10" text-anchor="middle">old destroyed after</text>

  <rect x="630" y="172" width="220" height="55" rx="5" fill="#ffffff" stroke="#7a3fbf"/>
  <text x="740" y="193" font-size="11" font-weight="bold" text-anchor="middle">prevent_destroy</text>
  <text x="740" y="209" font-size="10" text-anchor="middle">blocks destroy and any</text>
  <text x="740" y="222" font-size="10" text-anchor="middle">apply that would replace it</text>

  <rect x="630" y="239" width="220" height="55" rx="5" fill="#ffffff" stroke="#7a3fbf"/>
  <text x="740" y="260" font-size="11" font-weight="bold" text-anchor="middle">ignore_changes</text>
  <text x="740" y="276" font-size="10" text-anchor="middle">stops drift detection on</text>
  <text x="740" y="289" font-size="10" text-anchor="middle">the listed attribute(s)</text>

  <rect x="630" y="345" width="220" height="35" rx="5" fill="#e2d4f5" stroke="#5c2a99"/>
  <text x="740" y="367" font-size="10.5" font-weight="bold" text-anchor="middle" fill="#3d1966">opt-in per resource</text>

  <!-- BOTTOM: manual change decision -->
  <text x="450" y="425" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Manual Change in AWS — Which Path?</text>

  <rect x="120" y="450" width="230" height="45" rx="5" fill="#ffffff" stroke="#555555"/>
  <text x="235" y="470" font-size="11" text-anchor="middle">Resource already tracked</text>
  <text x="235" y="485" font-size="11" text-anchor="middle">in Terraform state?</text>

  <line x1="235" y1="495" x2="235" y2="520" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="200" y="512" font-size="10" fill="#2f8f4e">yes</text>

  <rect x="120" y="520" width="230" height="45" rx="5" fill="#d7ecd9" stroke="#2f8f4e"/>
  <text x="235" y="540" font-size="11" text-anchor="middle">Edit the .tf value to</text>
  <text x="235" y="555" font-size="11" text-anchor="middle">match, then apply</text>

  <rect x="420" y="450" width="230" height="45" rx="5" fill="#ffffff" stroke="#555555"/>
  <text x="535" y="470" font-size="11" text-anchor="middle">Not tracked — resource</text>
  <text x="535" y="485" font-size="11" text-anchor="middle">exists in AWS already?</text>

  <line x1="535" y1="495" x2="420" y2="530" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="440" y="510" font-size="10" fill="#1a3d8f">exists</text>

  <rect x="380" y="530" width="200" height="45" rx="5" fill="#eef4ff" stroke="#3b6fd6"/>
  <text x="480" y="550" font-size="11" text-anchor="middle">terraform import,</text>
  <text x="480" y="565" font-size="11" text-anchor="middle">then fill in matching args</text>

  <line x1="535" y1="495" x2="650" y2="530" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="620" y="510" font-size="10" fill="#8a5610">new</text>

  <rect x="600" y="530" width="200" height="45" rx="5" fill="#fff6ea" stroke="#d68a1f"/>
  <text x="700" y="550" font-size="11" text-anchor="middle">Write resource block</text>
  <text x="700" y="565" font-size="11" text-anchor="middle">normally and apply</text>

  <!-- footer note -->
  <rect x="120" y="610" width="680" height="90" rx="6" fill="#f5f5f7" stroke="#999999"/>
  <text x="460" y="632" font-size="12" font-weight="bold" text-anchor="middle" fill="#333333">Key distinction</text>
  <text x="460" y="654" font-size="11" text-anchor="middle" fill="#333333">data block = read a value, never manages the resource's lifecycle</text>
  <text x="460" y="672" font-size="11" text-anchor="middle" fill="#333333">terraform import = adopt a resource into full Terraform management</text>
  <text x="460" y="690" font-size="11" text-anchor="middle" fill="#333333">Every distinct resource type (e.g. bucket vs. bucket versioning) needs its own import</text>

  <defs>
    <marker id="arrow1" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3b6fd6"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#d68a1f"/>
    </marker>
    <marker id="arrow3" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555555"/>
    </marker>
  </defs>
</svg>
