<svg width="920" height="780" viewBox="0 0 920 780" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif">

  <text x="460" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Session 73 — State Locking &amp; Multi-Developer Workflows</text>

  <!-- Panel 1: unpushed apply drift -->
  <text x="20" y="65" font-size="14" font-weight="bold" fill="#2c3e50">1. The "Forgot to Push" Drift Pattern</text>

  <rect x="30" y="80" width="200" height="34" rx="4" fill="#dbe9f6" stroke="#2c3e50"/>
  <text x="130" y="102" font-size="11" text-anchor="middle">Dev A: adds VPC to code</text>

  <line x1="130" y1="114" x2="130" y2="140" stroke="#2c3e50" marker-end="url(#arrow)"/>

  <rect x="30" y="140" width="200" height="34" rx="4" fill="#dbe9f6" stroke="#2c3e50"/>
  <text x="130" y="162" font-size="11" text-anchor="middle">terraform apply → VPC created</text>

  <line x1="130" y1="174" x2="130" y2="200" stroke="#c0392b" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="145" y="192" font-size="10" fill="#c0392b">git push SKIPPED</text>

  <rect x="30" y="200" width="200" height="34" rx="4" fill="#f5b7b1" stroke="#c0392b"/>
  <text x="130" y="222" font-size="11" text-anchor="middle">S3 state: has VPC. GitHub: no VPC</text>

  <line x1="230" y1="217" x2="420" y2="217" stroke="#2c3e50" marker-end="url(#arrow)"/>

  <rect x="420" y="200" width="230" height="34" rx="4" fill="#dbe9f6" stroke="#2c3e50"/>
  <text x="535" y="222" font-size="11" text-anchor="middle">Dev B: git pull (gets old code, no VPC)</text>

  <line x1="535" y1="234" x2="535" y2="260" stroke="#2c3e50" marker-end="url(#arrow)"/>

  <rect x="420" y="260" width="230" height="34" rx="4" fill="#fdebd0" stroke="#c0392b"/>
  <text x="535" y="282" font-size="11" text-anchor="middle">terraform plan → "1 to destroy" (VPC)</text>

  <text x="700" y="105" font-size="10.5" fill="#555">Local config has no VPC block,</text>
  <text x="700" y="120" font-size="10.5" fill="#555">but state says VPC exists.</text>
  <text x="700" y="135" font-size="10.5" fill="#555">Terraform's read: "state has a</text>
  <text x="700" y="150" font-size="10.5" fill="#555">resource my config doesn't</text>
  <text x="700" y="165" font-size="10.5" fill="#555">declare — remove it."</text>
  <text x="700" y="185" font-size="10.5" fill="#c0392b" font-weight="bold">Same signal (unexpected destroy)</text>
  <text x="700" y="200" font-size="10.5" fill="#c0392b" font-weight="bold">can mean either "someone forgot</text>
  <text x="700" y="215" font-size="10.5" fill="#c0392b" font-weight="bold">to push" or "someone forgot to</text>
  <text x="700" y="230" font-size="10.5" fill="#c0392b" font-weight="bold">actually delete after removing</text>
  <text x="700" y="245" font-size="10.5" fill="#c0392b" font-weight="bold">it from code." Never assume —</text>
  <text x="700" y="260" font-size="10.5" fill="#c0392b" font-weight="bold">confirm with the team first.</text>

  <!-- Panel 2: locking race -->
  <text x="20" y="335" font-size="14" font-weight="bold" fill="#2c3e50">2. Concurrent Apply — Locking Prevents the Race</text>

  <rect x="30" y="350" width="200" height="34" rx="4" fill="#dbe9f6" stroke="#2c3e50"/>
  <text x="130" y="372" font-size="11" text-anchor="middle">Dev A: terraform apply</text>

  <rect x="450" y="350" width="200" height="34" rx="4" fill="#dbe9f6" stroke="#2c3e50"/>
  <text x="550" y="372" font-size="11" text-anchor="middle">Dev B: terraform apply (same time)</text>

  <line x1="130" y1="384" x2="130" y2="415" stroke="#27ae60" marker-end="url(#arrow)"/>
  <line x1="550" y1="384" x2="550" y2="415" stroke="#c0392b" marker-end="url(#arrow)"/>

  <rect x="30" y="415" width="200" height="40" rx="4" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="130" y="435" font-size="11" text-anchor="middle" font-weight="bold">Lock acquired</text>
  <text x="130" y="449" font-size="10" text-anchor="middle">proceeds normally</text>

  <rect x="450" y="415" width="200" height="40" rx="4" fill="#fadbd8" stroke="#c0392b"/>
  <text x="550" y="435" font-size="11" text-anchor="middle" font-weight="bold">Blocked — lock held</text>
  <text x="550" y="449" font-size="10" text-anchor="middle">"Error acquiring state lock"</text>

  <text x="280" y="440" font-size="10.5" fill="#555">Without a lock, both writes race</text>
  <text x="280" y="455" font-size="10.5" fill="#555">against the same state file →</text>
  <text x="280" y="470" font-size="10.5" fill="#555">possible corruption.</text>

  <text x="30" y="485" font-size="10.5" fill="#555">Two mechanisms: S3 native lockfile (Terraform ≥1.10, backend arg `use_lockfile = true`) — no extra</text>
  <text x="30" y="500" font-size="10.5" fill="#555">infrastructure needed. Or a DynamoDB table with partition key `LockID` (older/pre-1.10 pattern).</text>
  <text x="30" y="515" font-size="10.5" fill="#555">Any change to the backend block itself (not resources) requires: terraform init -reconfigure</text>

  <!-- Panel 3: S3 key collision -->
  <text x="20" y="555" font-size="14" font-weight="bold" fill="#2c3e50">3. State Key Collisions — Same Path Overwrites Unrelated State</text>

  <rect x="30" y="570" width="380" height="34" rx="4" fill="#f5b7b1" stroke="#c0392b"/>
  <text x="220" y="592" font-size="11" text-anchor="middle">key = "terraform.tfstate" used for BOTH day-04 and day-05</text>

  <line x1="220" y1="604" x2="220" y2="630" stroke="#c0392b" marker-end="url(#arrow)"/>

  <rect x="30" y="630" width="380" height="34" rx="4" fill="#fadbd8" stroke="#c0392b"/>
  <text x="220" y="652" font-size="11" text-anchor="middle">day-05 apply overwrites day-04's state object</text>

  <rect x="470" y="570" width="380" height="34" rx="4" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="660" y="592" font-size="11" text-anchor="middle">key = "day-04/terraform.tfstate"</text>

  <rect x="470" y="614" width="380" height="34" rx="4" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="660" y="636" font-size="11" text-anchor="middle">key = "day-05/terraform.tfstate"</text>

  <text x="470" y="670" font-size="10.5" fill="#555">Separate key paths in the same bucket = separate state objects.</text>
  <text x="470" y="685" font-size="10.5" fill="#555">No collision, both tracked independently.</text>

  <text x="30" y="720" font-size="10.5" fill="#555">S3 objects don't merge on upload — a new object at the same key fully replaces the old one,</text>
  <text x="30" y="735" font-size="10.5" fill="#555">same as overwriting any file. Applies to state exactly like any other object in the bucket.</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2c3e50"/>
    </marker>
  </defs>
</svg>
