<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" width="900" height="660" style="background:#ffffff;font-family:Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ao" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1A1A2E">Day 13 — ALB Path-Based Routing</text>

  <!-- User -->
  <rect x="20" y="36" width="120" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
  <text x="80" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#0C447C">User</text>
  <text x="80" y="76" text-anchor="middle" font-size="11" fill="#185FA5">walmart.com</text>

  <!-- DNS -->
  <rect x="180" y="36" width="180" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="270" y="58" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C2C2A">DNS</text>
  <text x="270" y="76" text-anchor="middle" font-size="11" fill="#5F5E5A">walmart.com → ALB</text>

  <!-- User → DNS → ALB -->
  <line x1="140" y1="62" x2="178" y2="62" stroke="#185FA5" stroke-width="1.3" marker-end="url(#ab)"/>

  <!-- ALB -->
  <rect x="390" y="24" width="390" height="76" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
  <text x="585" y="48" text-anchor="middle" font-size="14" font-weight="bold" fill="#633806">Application Load Balancer (ALB)</text>
  <text x="585" y="66" text-anchor="middle" font-size="11" fill="#854F0B">HTTP protocol  |  Layer 7  |  One ALB handles all paths</text>
  <text x="585" y="84" text-anchor="middle" font-size="11" fill="#854F0B">Internet-facing  |  2 public subnets across 2 AZs</text>

  <line x1="360" y1="62" x2="388" y2="62" stroke="#854F0B" stroke-width="1.3" marker-end="url(#ao)"/>

  <!-- Listener rules box -->
  <rect x="20" y="120" width="860" height="116" rx="10" fill="#EEEDFE" fill-opacity="0.3" stroke="#7F77DD" stroke-width="1.3"/>
  <text x="450" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#3C3489">ALB Listener Rules  (HTTP:80)</text>

  <!-- Rule rows -->
  <rect x="40" y="150" width="200" height="32" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="140" y="171" text-anchor="middle" font-size="12" fill="#0C447C">path = /  (default)</text>

  <rect x="260" y="150" width="200" height="32" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="360" y="171" text-anchor="middle" font-size="12" fill="#085041">path = /electronics</text>

  <rect x="480" y="150" width="200" height="32" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="580" y="171" text-anchor="middle" font-size="12" fill="#712B13">path = /mobiles</text>

  <rect x="700" y="150" width="160" height="32" rx="6" fill="#FFFEF0" stroke="#CCA800" stroke-width="0.8"/>
  <text x="780" y="171" text-anchor="middle" font-size="12" fill="#5A4800">path = /groceries</text>

  <text x="140" y="208" text-anchor="middle" font-size="11" fill="#3C3489">→ TG-home</text>
  <text x="360" y="208" text-anchor="middle" font-size="11" fill="#3C3489">→ TG-electronics</text>
  <text x="580" y="208" text-anchor="middle" font-size="11" fill="#3C3489">→ TG-mobiles</text>
  <text x="780" y="208" text-anchor="middle" font-size="11" fill="#3C3489">→ TG-groceries</text>

  <!-- Arrows from rules to TGs -->
  <line x1="140" y1="236" x2="140" y2="264" stroke="#7F77DD" stroke-width="1.3" marker-end="url(#ap)"/>
  <line x1="360" y1="236" x2="360" y2="264" stroke="#7F77DD" stroke-width="1.3" marker-end="url(#ap)"/>
  <line x1="580" y1="236" x2="580" y2="264" stroke="#7F77DD" stroke-width="1.3" marker-end="url(#ap)"/>
  <line x1="780" y1="236" x2="780" y2="264" stroke="#7F77DD" stroke-width="1.3" marker-end="url(#ap)"/>

  <!-- TG-home -->
  <rect x="40" y="264" width="200" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
  <text x="140" y="286" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C447C">TG-home</text>
  <text x="140" y="304" text-anchor="middle" font-size="11" fill="#185FA5">HTTP:80  |  path: /</text>

  <!-- TG-electronics -->
  <rect x="260" y="264" width="200" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="360" y="286" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">TG-electronics</text>
  <text x="360" y="304" text-anchor="middle" font-size="11" fill="#0F6E56">HTTP:3000  |  path: /electronics</text>

  <!-- TG-mobiles -->
  <rect x="480" y="264" width="200" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
  <text x="580" y="286" text-anchor="middle" font-size="12" font-weight="bold" fill="#712B13">TG-mobiles</text>
  <text x="580" y="304" text-anchor="middle" font-size="11" fill="#993C1D">HTTP:2000  |  path: /mobiles</text>

  <!-- TG-groceries -->
  <rect x="700" y="264" width="180" height="52" rx="8" fill="#FFFEF0" stroke="#CCA800" stroke-width="1.2"/>
  <text x="790" y="286" text-anchor="middle" font-size="12" font-weight="bold" fill="#5A4800">TG-groceries</text>
  <text x="790" y="304" text-anchor="middle" font-size="11" fill="#5A4800">HTTP:4000  |  path: /groceries</text>

  <!-- Arrows from TGs to servers -->
  <line x1="140" y1="316" x2="140" y2="348" stroke="#854F0B" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="360" y1="316" x2="360" y2="348" stroke="#854F0B" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="580" y1="316" x2="580" y2="348" stroke="#854F0B" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="790" y1="316" x2="790" y2="348" stroke="#854F0B" stroke-width="1.5" marker-end="url(#ao)"/>

  <!-- Server boxes -->
  <!-- Home servers -->
  <rect x="40" y="348" width="92" height="80" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="86" y="370" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C447C">Home-1</text>
  <text x="86" y="388" text-anchor="middle" font-size="11" fill="#185FA5">AZ-1a</text>
  <text x="86" y="404" text-anchor="middle" font-size="11" fill="#185FA5">port 80</text>
  <rect x="148" y="348" width="92" height="80" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="194" y="370" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C447C">Home-2</text>
  <text x="194" y="388" text-anchor="middle" font-size="11" fill="#185FA5">AZ-1b</text>
  <text x="194" y="404" text-anchor="middle" font-size="11" fill="#185FA5">port 80</text>

  <!-- Electronics servers -->
  <rect x="260" y="348" width="92" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="306" y="370" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">Elec-1</text>
  <text x="306" y="388" text-anchor="middle" font-size="11" fill="#0F6E56">AZ-1a</text>
  <text x="306" y="404" text-anchor="middle" font-size="11" fill="#0F6E56">port 3000</text>
  <rect x="368" y="348" width="92" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="414" y="370" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">Elec-2</text>
  <text x="414" y="388" text-anchor="middle" font-size="11" fill="#0F6E56">AZ-1b</text>
  <text x="414" y="404" text-anchor="middle" font-size="11" fill="#0F6E56">port 3000</text>

  <!-- Mobiles servers -->
  <rect x="480" y="348" width="92" height="80" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="526" y="370" text-anchor="middle" font-size="12" font-weight="bold" fill="#712B13">Mob-1</text>
  <text x="526" y="388" text-anchor="middle" font-size="11" fill="#993C1D">AZ-1a</text>
  <text x="526" y="404" text-anchor="middle" font-size="11" fill="#993C1D">port 2000</text>
  <rect x="588" y="348" width="92" height="80" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="634" y="370" text-anchor="middle" font-size="12" font-weight="bold" fill="#712B13">Mob-2</text>
  <text x="634" y="388" text-anchor="middle" font-size="11" fill="#993C1D">AZ-1b</text>
  <text x="634" y="404" text-anchor="middle" font-size="11" fill="#993C1D">port 2000</text>

  <!-- Groceries servers -->
  <rect x="700" y="348" width="84" height="80" rx="8" fill="#FFFEF0" stroke="#CCA800" stroke-width="1"/>
  <text x="742" y="370" text-anchor="middle" font-size="12" font-weight="bold" fill="#5A4800">Groc-1</text>
  <text x="742" y="388" text-anchor="middle" font-size="11" fill="#5A4800">AZ-1a</text>
  <text x="742" y="404" text-anchor="middle" font-size="11" fill="#5A4800">port 4000</text>
  <rect x="796" y="348" width="84" height="80" rx="8" fill="#FFFEF0" stroke="#CCA800" stroke-width="1"/>
  <text x="838" y="370" text-anchor="middle" font-size="12" font-weight="bold" fill="#5A4800">Groc-2</text>
  <text x="838" y="388" text-anchor="middle" font-size="11" fill="#5A4800">AZ-1b</text>
  <text x="838" y="404" text-anchor="middle" font-size="11" fill="#5A4800">port 4000</text>

  <!-- Monolithic vs Dedicated comparison -->
  <rect x="20" y="452" width="420" height="156" rx="10" fill="#FCEBEB" fill-opacity="0.5" stroke="#A32D2D" stroke-width="1.2"/>
  <text x="230" y="474" text-anchor="middle" font-size="13" font-weight="bold" fill="#791F1F">Approach A — Monolithic (wrong) ✕</text>
  <text x="230" y="494" text-anchor="middle" font-size="12" fill="#A32D2D">Server 1: food + electronics + groceries</text>
  <text x="230" y="512" text-anchor="middle" font-size="12" fill="#A32D2D">Server 2: food + electronics + groceries</text>
  <rect x="40" y="524" width="380" height="72" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
  <text x="230" y="544" text-anchor="middle" font-size="11" fill="#791F1F">❌ Common OS — one crash = all apps down</text>
  <text x="230" y="560" text-anchor="middle" font-size="11" fill="#791F1F">❌ Version conflicts between apps</text>
  <text x="230" y="576" text-anchor="middle" font-size="11" fill="#791F1F">❌ Maintenance takes all apps offline</text>
  <text x="230" y="592" text-anchor="middle" font-size="11" fill="#791F1F">❌ Traffic spike on one app starves others</text>

  <rect x="460" y="452" width="420" height="156" rx="10" fill="#E8F8E8" fill-opacity="0.5" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="670" y="474" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041">Approach B — Dedicated servers (correct) ✓</text>
  <text x="670" y="494" text-anchor="middle" font-size="12" fill="#0F6E56">Server 1: food only</text>
  <text x="670" y="512" text-anchor="middle" font-size="12" fill="#0F6E56">Server 2: electronics only</text>
  <text x="670" y="530" text-anchor="middle" font-size="12" fill="#0F6E56">Server 3: groceries only</text>
  <rect x="480" y="544" width="380" height="52" rx="6" fill="#E8F8E8" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="670" y="564" text-anchor="middle" font-size="11" fill="#085041">✅ One app fails = only that section affected</text>
  <text x="670" y="582" text-anchor="middle" font-size="11" fill="#085041">✅ Isolated OS, no version conflicts, scale independently</text>

  <!-- Legend -->
  <rect x="20" y="618" width="860" height="36" rx="4" fill="#F5F5F5" stroke="#DDD" stroke-width="0.5"/>
  <rect x="40" y="628" width="12" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="60" y="637" font-size="11" fill="#333">ALB (one, handles all paths)</text>
  <rect x="230" y="628" width="12" height="10" rx="2" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="250" y="637" font-size="11" fill="#333">Listener rules (path → TG)</text>
  <rect x="450" y="628" width="12" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="470" y="637" font-size="11" fill="#333">Target Groups per service</text>
  <text x="700" y="637" font-size="11" fill="#888">Day 13  |  DevOps Bootcamp  |  May 1 2026</text>
</svg>
