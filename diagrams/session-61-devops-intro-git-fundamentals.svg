<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" style="background:#ffffff;font-family:Arial,sans-serif">
  <style>
    .title{font-size:20px;font-weight:bold;fill:#1a1a2e}
    .sub{font-size:13px;font-weight:bold;fill:#444}
    .lbl{font-size:12px;fill:#1a1a2e}
    .small{font-size:11px;fill:#555}
    .box{fill:#eef2ff;stroke:#4361ee;stroke-width:1.5}
    .phase{fill:#e7f5ee;stroke:#2a9d6e;stroke-width:1.5}
    .gitbox{fill:#fff4e6;stroke:#e8870c;stroke-width:1.5}
    .remote{fill:#f3e8ff;stroke:#8e44ad;stroke-width:1.5}
    .arrow{stroke:#666;stroke-width:1.6;fill:none;marker-end:url(#ah)}
    .loop{stroke:#2a9d6e;stroke-width:1.6;fill:none;marker-end:url(#ahg);stroke-dasharray:5,4}
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#666"/>
    </marker>
    <marker id="ahg" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2a9d6e"/>
    </marker>
  </defs>

  <text x="30" y="36" class="title">Session 61 — DevOps Lifecycle &amp; Git: Tracking vs Storage</text>

  <!-- ===== Lifecycle loop ===== -->
  <text x="30" y="70" class="sub">DevOps Lifecycle (continuous loop)</text>

  <rect x="30"  y="86" width="120" height="46" rx="6" class="phase"/>
  <text x="90" y="108" class="lbl" text-anchor="middle">PLAN</text>
  <text x="90" y="124" class="small" text-anchor="middle">requirements</text>

  <rect x="170" y="86" width="100" height="46" rx="6" class="phase"/>
  <text x="220" y="114" class="lbl" text-anchor="middle">CODE</text>

  <rect x="290" y="86" width="100" height="46" rx="6" class="phase"/>
  <text x="340" y="114" class="lbl" text-anchor="middle">BUILD</text>

  <rect x="410" y="86" width="100" height="46" rx="6" class="phase"/>
  <text x="460" y="108" class="lbl" text-anchor="middle">TEST</text>
  <text x="460" y="124" class="small" text-anchor="middle">func + quality</text>

  <rect x="530" y="86" width="110" height="46" rx="6" class="phase"/>
  <text x="585" y="114" class="lbl" text-anchor="middle">RELEASE</text>

  <rect x="660" y="86" width="110" height="46" rx="6" class="phase"/>
  <text x="715" y="114" class="lbl" text-anchor="middle">DEPLOY</text>

  <rect x="790" y="86" width="140" height="46" rx="6" class="phase"/>
  <text x="860" y="108" class="lbl" text-anchor="middle">OPERATE +</text>
  <text x="860" y="124" class="lbl" text-anchor="middle">MONITOR</text>

  <line x1="150" y1="109" x2="170" y2="109" class="arrow"/>
  <line x1="270" y1="109" x2="290" y2="109" class="arrow"/>
  <line x1="390" y1="109" x2="410" y2="109" class="arrow"/>
  <line x1="510" y1="109" x2="530" y2="109" class="arrow"/>
  <line x1="640" y1="109" x2="660" y2="109" class="arrow"/>
  <line x1="770" y1="109" x2="790" y2="109" class="arrow"/>

  <!-- feedback loop -->
  <path d="M860,132 L860,160 L90,160 L90,132" class="loop"/>
  <text x="475" y="176" class="small" text-anchor="middle" fill="#2a9d6e">monitoring feedback drives the next PLAN (continuous)</text>

  <!-- ===== CI/CD vs CD ===== -->
  <text x="30" y="216" class="sub">Deploy vs Delivery</text>

  <rect x="30" y="230" width="430" height="80" rx="6" class="box"/>
  <text x="45" y="252" class="lbl" font-weight="bold">Continuous Deployment</text>
  <text x="45" y="274" class="small">code → build → test → DEPLOY to live</text>
  <text x="45" y="294" class="small">one pipeline, all the way to production</text>

  <rect x="500" y="230" width="430" height="80" rx="6" class="box"/>
  <text x="515" y="252" class="lbl" font-weight="bold">Continuous Delivery</text>
  <text x="515" y="274" class="small">code → build → test → store ARTIFACT (ready)</text>
  <text x="515" y="294" class="small">deploy later, on demand</text>

  <!-- ===== Git vs GitHub ===== -->
  <text x="30" y="356" class="sub">Git (tracking) + GitHub (storage)</text>

  <!-- local -->
  <rect x="30" y="372" width="380" height="220" rx="8" class="gitbox" fill="#fffaf3"/>
  <text x="50" y="396" class="lbl" font-weight="bold">LOCAL — your laptop</text>

  <rect x="55" y="412" width="150" height="40" rx="5" class="gitbox"/>
  <text x="130" y="437" class="lbl" text-anchor="middle">edit files</text>

  <rect x="55" y="470" width="150" height="40" rx="5" class="gitbox"/>
  <text x="130" y="495" class="lbl" text-anchor="middle">Git tracks</text>

  <rect x="55" y="528" width="320" height="46" rx="5" class="gitbox"/>
  <text x="215" y="550" class="lbl" text-anchor="middle">commit  →  unique commit ID</text>
  <text x="215" y="567" class="small" text-anchor="middle">(like an S3 version ID)</text>

  <line x1="130" y1="452" x2="130" y2="470" class="arrow"/>
  <line x1="130" y1="510" x2="130" y2="528" class="arrow"/>

  <text x="290" y="430" class="small">v1 → v2 → v3 → v4</text>
  <text x="290" y="450" class="small">roll back to any</text>
  <text x="290" y="466" class="small">commit by ID</text>

  <!-- remote -->
  <rect x="560" y="372" width="370" height="220" rx="8" class="remote" fill="#faf5ff"/>
  <text x="580" y="396" class="lbl" font-weight="bold">REMOTE — cloud</text>

  <rect x="600" y="430" width="290" height="60" rx="5" class="remote"/>
  <text x="745" y="456" class="lbl" text-anchor="middle">GitHub repository</text>
  <text x="745" y="476" class="small" text-anchor="middle">stores code · same commit IDs</text>

  <text x="580" y="528" class="small">No version control added here —</text>
  <text x="580" y="546" class="small">Git already enabled it before push.</text>
  <text x="580" y="564" class="small">Alternatives: GitLab, Azure Repos</text>

  <!-- push arrow -->
  <line x1="410" y1="488" x2="600" y2="460" class="arrow"/>
  <text x="505" y="466" class="small" text-anchor="middle">push</text>

  <text x="30" y="624" class="small">Tracking alone = nowhere to store · Storage alone = nothing tracked · you need both.</text>
</svg>
