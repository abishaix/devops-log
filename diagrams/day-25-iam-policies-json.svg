<svg xmlns="http://www.w3.org/2000/svg" width="760" height="540" viewBox="0 0 760 540" style="background:#ffffff;font-family:Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">IAM Policies — Types, JSON Structure, and Priority</text>

  <!-- ===== LEFT: Policy Types ===== -->
  <text x="40" y="55" font-size="12" font-weight="bold" fill="#444">Policy types</text>

  <!-- AWS Managed -->
  <rect x="40" y="63" width="200" height="62" rx="8" fill="#fff8e6" stroke="#c09030" stroke-width="1.5"/>
  <text x="140" y="81" text-anchor="middle" font-size="12" font-weight="bold" fill="#8a6010">AWS Managed</text>
  <text x="140" y="96" text-anchor="middle" font-size="10" fill="#b07020">Pre-built by AWS</text>
  <text x="140" y="110" text-anchor="middle" font-size="10" fill="#b07020">Full or read-only. Not fine-grained.</text>

  <!-- Customer Managed -->
  <rect x="40" y="140" width="200" height="74" rx="8" fill="#e8ffe8" stroke="#3a8a4a" stroke-width="1.5"/>
  <text x="140" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a6a2a">Customer Managed</text>
  <text x="140" y="173" text-anchor="middle" font-size="10" fill="#3a8a4a">You define it. Stored centrally.</text>
  <text x="140" y="187" text-anchor="middle" font-size="10" fill="#3a8a4a">Fine-grained. Reusable.</text>
  <text x="140" y="201" text-anchor="middle" font-size="10" fill="#3a8a4a">Attach to any user / group / role.</text>

  <!-- Inline -->
  <rect x="40" y="228" width="200" height="74" rx="8" fill="#ffeef0" stroke="#bf3a4a" stroke-width="1.5"/>
  <text x="140" y="246" text-anchor="middle" font-size="12" font-weight="bold" fill="#9a1a2a">Inline</text>
  <text x="140" y="261" text-anchor="middle" font-size="10" fill="#bf3a4a">Attached to one user only.</text>
  <text x="140" y="275" text-anchor="middle" font-size="10" fill="#bf3a4a">Not stored centrally.</text>
  <text x="140" y="289" text-anchor="middle" font-size="10" fill="#bf3a4a">Deleted when user is deleted.</text>

  <!-- Allow vs Deny box -->
  <rect x="40" y="318" width="200" height="64" rx="8" fill="#f0eeff" stroke="#6a4abf" stroke-width="1.5"/>
  <text x="140" y="336" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a2a9a">Allow vs Deny priority</text>
  <text x="140" y="351" text-anchor="middle" font-size="10" fill="#7a4abf">Deny ALWAYS wins.</text>
  <text x="140" y="365" text-anchor="middle" font-size="10" fill="#7a4abf">Explicit Deny &gt; Allow &gt; Implicit Deny</text>

  <!-- ===== RIGHT: JSON Structure ===== -->
  <text x="280" y="55" font-size="12" font-weight="bold" fill="#444">JSON policy structure</text>

  <!-- JSON block background -->
  <rect x="278" y="63" width="462" height="282" rx="10" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>

  <!-- JSON content — monospace style approximation -->
  <text x="298" y="86"  font-size="11" fill="#888" font-family="monospace">{</text>
  <text x="308" y="103" font-size="11" fill="#888" font-family="monospace">  "Version": "</text>
  <text x="422" y="103" font-size="11" fill="#2a7a2a" font-family="monospace">2012-10-17</text>
  <text x="504" y="103" font-size="11" fill="#888" font-family="monospace">",</text>
  <text x="308" y="120" font-size="11" fill="#888" font-family="monospace">  "Statement": [</text>

  <!-- Statement 1 -->
  <rect x="318" y="127" width="408" height="84" rx="6" fill="#e8f4e8" stroke="#3a8a4a" stroke-width="1"/>
  <text x="330" y="143" font-size="11" fill="#888" font-family="monospace">  {</text>
  <text x="340" y="158" font-size="11" fill="#555" font-family="monospace">    "Sid":    "</text>
  <text x="430" y="158" font-size="11" fill="#a06020" font-family="monospace">AllowListBuckets</text>
  <text x="566" y="158" font-size="11" fill="#555" font-family="monospace">",</text>
  <text x="340" y="172" font-size="11" fill="#555" font-family="monospace">    "Effect": "</text>
  <text x="434" y="172" font-size="11" fill="#2a7a2a" font-family="monospace">Allow</text>
  <text x="477" y="172" font-size="11" fill="#555" font-family="monospace">",</text>
  <text x="340" y="186" font-size="11" fill="#555" font-family="monospace">    "Action": "s3:ListAllMyBuckets",</text>
  <text x="340" y="200" font-size="11" fill="#555" font-family="monospace">    "Resource": "*"</text>
  <text x="330" y="207" font-size="11" fill="#888" font-family="monospace">  },</text>

  <!-- Statement 2 -->
  <rect x="318" y="216" width="408" height="96" rx="6" fill="#e6f0ff" stroke="#3a6abf" stroke-width="1"/>
  <text x="330" y="232" font-size="11" fill="#888" font-family="monospace">  {</text>
  <text x="340" y="247" font-size="11" fill="#555" font-family="monospace">    "Sid":     "</text>
  <text x="436" y="247" font-size="11" fill="#a06020" font-family="monospace">AllowListSpecificBucket</text>
  <text x="616" y="247" font-size="11" fill="#555" font-family="monospace">",</text>
  <text x="340" y="261" font-size="11" fill="#555" font-family="monospace">    "Effect":  "</text>
  <text x="438" y="261" font-size="11" fill="#2a7a2a" font-family="monospace">Allow</text>
  <text x="481" y="261" font-size="11" fill="#555" font-family="monospace">",</text>
  <text x="340" y="275" font-size="11" fill="#555" font-family="monospace">    "Action":  "s3:ListBucket",</text>
  <text x="340" y="289" font-size="11" fill="#555" font-family="monospace">    "Resource":</text>
  <text x="420" y="289" font-size="11" fill="#1a4abf" font-family="monospace">"arn:aws:s3:::my-bucket"</text>
  <text x="330" y="306" font-size="11" fill="#888" font-family="monospace">  }</text>

  <text x="308" y="325" font-size="11" fill="#888" font-family="monospace">  ]</text>
  <text x="298" y="338" font-size="11" fill="#888" font-family="monospace">}</text>

  <!-- Callout labels on the right side of JSON -->
  <line x1="605" y1="103" x2="700" y2="103" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="705" y="107" font-size="10" fill="#666">Fixed — never change</text>

  <line x1="532" y1="172" x2="700" y2="165" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="705" y="145" font-size="10" fill="#666">Allow or Deny</text>
  <text x="705" y="157" font-size="10" fill="#c03030">Deny always wins</text>

  <line x1="475" y1="289" x2="700" y2="302" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="705" y="296" font-size="10" fill="#666">ARN = specific</text>
  <text x="705" y="308" font-size="10" fill="#666">resource (one bucket)</text>

  <!-- ===== BOTTOM: CLI Use Cases ===== -->
  <text x="40" y="412" font-size="12" font-weight="bold" fill="#444">CLI — use for debugging, not infra creation</text>

  <rect x="40" y="420" width="330" height="50" rx="8" fill="#e6f0ff" stroke="#3a6abf" stroke-width="1"/>
  <text x="55" y="438" font-size="11" font-weight="bold" fill="#1a4a9a">✅ Debugging</text>
  <text x="55" y="453" font-size="10" fill="#3a6abf">Check SG ports, list instances, S3 public access, verify IAM perms</text>
  <text x="55" y="465" font-size="10" fill="#3a6abf">aws sts get-caller-identity  |  aws s3 ls  |  aws ec2 describe-instances</text>

  <rect x="390" y="420" width="330" height="50" rx="8" fill="#ffeef0" stroke="#bf3a4a" stroke-width="1"/>
  <text x="405" y="438" font-size="11" font-weight="bold" fill="#9a1a2a">❌ Production infra creation</text>
  <text x="405" y="453" font-size="10" fill="#bf3a4a">No state — same command = new resource every time</text>
  <text x="405" y="465" font-size="10" fill="#bf3a4a">No idempotency. Hard to audit. Use Terraform instead.</text>

  <!-- Multi-profile note -->
  <rect x="40" y="484" width="680" height="40" rx="8" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <text x="55" y="499" font-size="11" font-weight="bold" fill="#333">Multi-account CLI profiles:</text>
  <text x="220" y="499" font-size="11" fill="#555" font-family="monospace">aws configure --profile dev</text>
  <text x="430" y="499" font-size="11" fill="#555" font-family="monospace">aws s3 ls --profile prod</text>
  <text x="55" y="516" font-size="10" fill="#777">Stored in ~/.aws/credentials — default profile used when no --profile flag given</text>
</svg>
