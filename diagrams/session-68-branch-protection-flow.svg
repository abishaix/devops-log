<svg viewBox="0 0 900 460" width="900" height="460" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif">

  <text x="450" y="35" font-size="18" font-weight="bold" text-anchor="middle" fill="#222">Branch Protection: Local Merge vs Remote Push</text>

  <!-- Local box -->
  <rect x="40" y="70" width="380" height="330" rx="10" fill="#f5f8ff" stroke="#3b6fd6" stroke-width="2"/>
  <text x="230" y="100" font-size="15" font-weight="bold" text-anchor="middle" fill="#1f3a63">LOCAL (your machine)</text>

  <rect x="80" y="130" width="140" height="60" rx="6" fill="#eef4ff" stroke="#3b6fd6" stroke-width="2"/>
  <text x="150" y="165" font-size="13" text-anchor="middle" fill="#1f3a63">dev branch</text>

  <rect x="260" y="130" width="140" height="60" rx="6" fill="#eef4ff" stroke="#3b6fd6" stroke-width="2"/>
  <text x="330" y="165" font-size="13" text-anchor="middle" fill="#1f3a63">local main</text>

  <line x1="220" y1="160" x2="258" y2="160" stroke="#3b6fd6" stroke-width="2" marker-end="url(#arrowb)"/>
  <text x="239" y="145" font-size="11" text-anchor="middle" fill="#1f3a63">git merge dev</text>

  <rect x="90" y="230" width="300" height="50" rx="6" fill="#e9f9ee" stroke="#2f9e58" stroke-width="2"/>
  <text x="240" y="260" font-size="13" text-anchor="middle" fill="#1c5c33" font-weight="bold">✓ allowed — no rules apply locally</text>

  <text x="240" y="330" font-size="12" text-anchor="middle" fill="#555">Branch protection rules only</text>
  <text x="240" y="348" font-size="12" text-anchor="middle" fill="#555">apply once you try to push</text>
  <text x="240" y="366" font-size="12" text-anchor="middle" fill="#555">to the protected branch on the remote.</text>

  <!-- arrow local to remote -->
  <line x1="420" y1="235" x2="478" y2="235" stroke="#c53030" stroke-width="3" marker-end="url(#arrowr)"/>
  <text x="449" y="220" font-size="12" text-anchor="middle" fill="#7a1f1f" font-weight="bold">git push origin main</text>

  <!-- Remote box -->
  <rect x="480" y="70" width="380" height="330" rx="10" fill="#fdeeee" stroke="#c53030" stroke-width="2"/>
  <text x="670" y="100" font-size="15" font-weight="bold" text-anchor="middle" fill="#7a1f1f">REMOTE (GitHub/GitLab)</text>

  <rect x="520" y="130" width="300" height="50" rx="6" fill="#fff6e0" stroke="#d69e2e" stroke-width="2"/>
  <text x="670" y="160" font-size="13" text-anchor="middle" fill="#7a5c17" font-weight="bold">✗ rejected — rule violation</text>

  <rect x="520" y="200" width="300" height="150" rx="6" fill="#ffffff" stroke="#c53030" stroke-width="1.5"/>
  <text x="670" y="225" font-size="12" font-weight="bold" text-anchor="middle" fill="#7a1f1f">Rules on protected branch:</text>
  <text x="535" y="248" font-size="11" fill="#444">• restrict deletion</text>
  <text x="535" y="267" font-size="11" fill="#444">• require linear history</text>
  <text x="535" y="286" font-size="11" fill="#444">• block force-push</text>
  <text x="535" y="305" font-size="11" fill="#444">• require PR before merging</text>
  <text x="535" y="324" font-size="11" fill="#444">• minimum N approvals (write access)</text>
  <text x="535" y="343" font-size="11" fill="#444">• optional: code owner review</text>

  <text x="670" y="380" font-size="12" text-anchor="middle" fill="#555" font-weight="bold">Only path in: open a PR,</text>
  <text x="670" y="398" font-size="12" text-anchor="middle" fill="#555" font-weight="bold">get required approvals, then merge</text>

  <defs>
    <marker id="arrowb" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6fd6"/>
    </marker>
    <marker id="arrowr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c53030"/>
    </marker>
  </defs>

  <text x="450" y="435" font-size="12" text-anchor="middle" fill="#888">Author cannot self-approve — approver needs write access, not just contributor status</text>
</svg>
