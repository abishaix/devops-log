<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" viewBox="0 0 760 500" style="background:#ffffff;font-family:Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#bf3a4a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3a8a4a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="380" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">IAM Roles — How EC2 Accesses AWS Services Securely</text>

  <!-- ===== TOP HALF: BAD APPROACH ===== -->
  <rect x="20" y="36" width="720" height="120" rx="10" fill="#fff5f5" stroke="#bf3a4a" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="36" y="56" font-size="11" font-weight="bold" fill="#bf3a4a">❌  Bad approach — keys configured inside EC2</text>

  <!-- Laptop -->
  <rect x="50" y="68" width="110" height="44" rx="8" fill="#ffeef0" stroke="#bf3a4a" stroke-width="1.5"/>
  <text x="105" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="#9a1a2a">Admin</text>
  <text x="105" y="100" text-anchor="middle" font-size="10" fill="#bf3a4a">aws configure</text>

  <line x1="160" y1="90" x2="220" y2="90" stroke="#bf3a4a" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <text x="190" y="84" text-anchor="middle" font-size="9" fill="#bf3a4a">root keys</text>

  <!-- EC2 bad -->
  <rect x="220" y="68" width="130" height="44" rx="8" fill="#ffeef0" stroke="#bf3a4a" stroke-width="1.5"/>
  <text x="285" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="#9a1a2a">EC2 instance</text>
  <text x="285" y="100" text-anchor="middle" font-size="10" fill="#bf3a4a">~/.aws/credentials</text>

  <line x1="350" y1="90" x2="410" y2="90" stroke="#bf3a4a" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- S3 bad -->
  <rect x="410" y="68" width="100" height="44" rx="8" fill="#ffeef0" stroke="#bf3a4a" stroke-width="1.5"/>
  <text x="460" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="#9a1a2a">S3 bucket</text>
  <text x="460" y="100" text-anchor="middle" font-size="10" fill="#bf3a4a">accessed</text>

  <!-- Risk callout -->
  <rect x="530" y="62" width="200" height="54" rx="8" fill="#ffeef0" stroke="#bf3a4a" stroke-width="1"/>
  <text x="542" y="79" font-size="10" font-weight="bold" fill="#9a1a2a">Risk: anyone with server access</text>
  <text x="542" y="93" font-size="10" fill="#bf3a4a">can run:  cat ~/.aws/credentials</text>
  <text x="542" y="107" font-size="10" fill="#bf3a4a">→ sees permanent root keys</text>

  <!-- ===== BOTTOM HALF: GOOD APPROACH ===== -->
  <rect x="20" y="170" width="720" height="310" rx="10" fill="#f0fff4" stroke="#3a8a4a" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="36" y="190" font-size="11" font-weight="bold" fill="#3a8a4a">✅  Correct approach — IAM Role attached to EC2</text>

  <!-- Step 1: Create Role -->
  <rect x="40" y="200" width="150" height="58" rx="8" fill="#e8f4e8" stroke="#3a8a4a" stroke-width="1.5"/>
  <text x="115" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a6a2a">1. Create IAM Role</text>
  <text x="115" y="233" text-anchor="middle" font-size="10" fill="#3a8a4a">Trusted service: EC2</text>
  <text x="115" y="247" text-anchor="middle" font-size="10" fill="#3a8a4a">Permission: S3 Full Access</text>

  <line x1="190" y1="229" x2="228" y2="229" stroke="#3a8a4a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Step 2: Attach to EC2 -->
  <rect x="228" y="200" width="150" height="58" rx="8" fill="#e8f4e8" stroke="#3a8a4a" stroke-width="1.5"/>
  <text x="303" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a6a2a">2. Attach Role to EC2</text>
  <text x="303" y="233" text-anchor="middle" font-size="10" fill="#3a8a4a">Actions → Security</text>
  <text x="303" y="247" text-anchor="middle" font-size="10" fill="#3a8a4a">→ Modify IAM Role</text>

  <line x1="378" y1="229" x2="416" y2="229" stroke="#3a8a4a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Step 3: STS creates creds -->
  <rect x="416" y="200" width="160" height="58" rx="8" fill="#e6f0ff" stroke="#3a6abf" stroke-width="1.5"/>
  <text x="496" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a4a9a">3. STS generates creds</text>
  <text x="496" y="233" text-anchor="middle" font-size="10" fill="#3a6abf">Temporary. Auto-rotating.</text>
  <text x="496" y="247" text-anchor="middle" font-size="10" fill="#3a6abf">1 hr min / 12 hr max</text>

  <line x1="576" y1="229" x2="614" y2="229" stroke="#3a6abf" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 4: EC2 accesses S3 -->
  <rect x="614" y="200" width="110" height="58" rx="8" fill="#e8f4e8" stroke="#3a8a4a" stroke-width="1.5"/>
  <text x="669" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a6a2a">4. EC2 → S3</text>
  <text x="669" y="233" text-anchor="middle" font-size="10" fill="#3a8a4a">No keys configured.</text>
  <text x="669" y="247" text-anchor="middle" font-size="10" fill="#3a8a4a">Role does the work.</text>

  <!-- Trust policy box -->
  <rect x="40" y="276" width="724" height="52" rx="8" fill="#f5eeff" stroke="#7a4abf" stroke-width="1"/>
  <text x="56" y="295" font-size="11" font-weight="bold" fill="#5a2a9a">Trust policy</text>
  <text x="160" y="295" font-size="10" fill="#7a4abf">Automatically created when you select the trusted service during role creation.</text>
  <text x="56" y="313" font-size="10" fill="#7a4abf">EC2 selected → principal: ec2.amazonaws.com    |    Lambda selected → principal: lambda.amazonaws.com</text>
  <text x="540" y="313" font-size="10" fill="#7a4abf">Role is locked to that service type.</text>

  <!-- Temp creds behavior -->
  <rect x="40" y="342" width="340" height="68" rx="8" fill="#e6f0ff" stroke="#3a6abf" stroke-width="1"/>
  <text x="56" y="360" font-size="11" font-weight="bold" fill="#1a4a9a">Temporary credentials behavior</text>
  <text x="56" y="376" font-size="10" fill="#3a6abf">• Not stored in ~/.aws/credentials — nothing to steal</text>
  <text x="56" y="390" font-size="10" fill="#3a6abf">• Auto-rotate every 1–12 hours via STS</text>
  <text x="56" y="404" font-size="10" fill="#3a6abf">• aws configure list  →  type = iam-role (not user)</text>

  <!-- Local vs cloud access -->
  <rect x="400" y="342" width="340" height="68" rx="8" fill="#fff8e6" stroke="#c09030" stroke-width="1"/>
  <text x="416" y="360" font-size="11" font-weight="bold" fill="#8a6010">Local laptop vs cloud resource</text>
  <text x="416" y="376" font-size="10" fill="#b07020">Local machine: must use aws configure (access key + secret)</text>
  <text x="416" y="390" font-size="10" fill="#b07020">EC2 / Lambda / cloud resource: use IAM Role — no keys</text>
  <text x="416" y="404" font-size="10" fill="#b07020">Can't attach a role to your laptop.</text>

  <!-- Delete keys reminder -->
  <rect x="40" y="424" width="680" height="36" rx="8" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <text x="56" y="440" font-size="11" font-weight="bold" fill="#333">If you previously configured keys on EC2 and now want to use a role:</text>
  <text x="56" y="454" font-size="10" fill="#555" font-family="monospace">rm -rf ~/.aws</text>
  <text x="170" y="454" font-size="10" fill="#777">— remove the keys file first, otherwise the static keys take priority over the role</text>
</svg>
