<svg viewBox="0 0 900 420" width="900" height="420" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif">

  <!-- Zones -->
  <rect x="30" y="140" width="170" height="90" rx="8" fill="#eef4ff" stroke="#3b6fd6" stroke-width="2"/>
  <text x="115" y="175" font-size="15" font-weight="bold" text-anchor="middle" fill="#1f3a63">Working</text>
  <text x="115" y="195" font-size="15" font-weight="bold" text-anchor="middle" fill="#1f3a63">Directory</text>

  <rect x="260" y="140" width="170" height="90" rx="8" fill="#fff6e0" stroke="#d69e2e" stroke-width="2"/>
  <text x="345" y="175" font-size="15" font-weight="bold" text-anchor="middle" fill="#7a5c17">Staging</text>
  <text x="345" y="195" font-size="15" font-weight="bold" text-anchor="middle" fill="#7a5c17">Area</text>

  <rect x="490" y="140" width="170" height="90" rx="8" fill="#e9f9ee" stroke="#2f9e58" stroke-width="2"/>
  <text x="575" y="175" font-size="15" font-weight="bold" text-anchor="middle" fill="#1c5c33">Local Repo</text>
  <text x="575" y="195" font-size="15" font-weight="bold" text-anchor="middle" fill="#1c5c33">(HEAD)</text>

  <rect x="720" y="140" width="170" height="90" rx="8" fill="#fdeeee" stroke="#c53030" stroke-width="2"/>
  <text x="805" y="175" font-size="15" font-weight="bold" text-anchor="middle" fill="#7a1f1f">Remote Repo</text>
  <text x="805" y="195" font-size="15" font-weight="bold" text-anchor="middle" fill="#7a1f1f">(origin/main)</text>

  <!-- Arrows between zones -->
  <line x1="200" y1="185" x2="258" y2="185" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="430" y1="185" x2="488" y2="185" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="185" x2="718" y2="185" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- git add / commit / push labels under arrows -->
  <text x="229" y="245" font-size="12" text-anchor="middle" fill="#444">git add</text>
  <text x="459" y="245" font-size="12" text-anchor="middle" fill="#444">git commit</text>
  <text x="689" y="245" font-size="12" text-anchor="middle" fill="#444">git push</text>

  <!-- Diff arcs above -->
  <path d="M 115 138 C 115 60, 345 60, 345 138" fill="none" stroke="#3b6fd6" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="230" y="55" font-size="13" text-anchor="middle" fill="#1f3a63" font-weight="bold">git diff</text>
  <text x="230" y="72" font-size="11" text-anchor="middle" fill="#555">(unstaged changes)</text>

  <path d="M 345 138 C 345 20, 575 20, 575 138" fill="none" stroke="#d69e2e" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="460" y="15" font-size="13" text-anchor="middle" fill="#7a5c17" font-weight="bold">git diff --staged</text>
  <text x="460" y="32" font-size="11" text-anchor="middle" fill="#555">(staged, uncommitted)</text>

  <path d="M 575 138 C 575 60, 805 60, 805 138" fill="none" stroke="#c53030" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="690" y="55" font-size="13" text-anchor="middle" fill="#7a1f1f" font-weight="bold">git diff main origin/main</text>
  <text x="690" y="72" font-size="11" text-anchor="middle" fill="#555">(unpushed commits)</text>

  <!-- HEAD diff below, spanning working dir to local repo -->
  <path d="M 115 232 C 115 320, 575 320, 575 232" fill="none" stroke="#2f9e58" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="345" y="345" font-size="13" text-anchor="middle" fill="#1c5c33" font-weight="bold">git diff HEAD</text>
  <text x="345" y="362" font-size="11" text-anchor="middle" fill="#555">(all uncommitted changes: staged + unstaged)</text>

  <text x="450" y="400" font-size="12" text-anchor="middle" fill="#888">Four comparison points — each answers "am I in sync at this boundary?"</text>
</svg>
