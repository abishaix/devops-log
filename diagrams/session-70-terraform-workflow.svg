<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620" style="background:#ffffff;font-family:Arial,sans-serif">
  <defs>
    <marker id="tf-arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b21b6"/>
    </marker>
    <marker id="tf-arrow-g" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0f766e"/>
    </marker>
  </defs>

  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#111827">Terraform Configuration — files, value flow, and command lifecycle</text>

  <!-- ============ Left: file relationships ============ -->
  <text x="230" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#5b21b6">How values flow into a resource</text>

  <!-- terraform.tfvars -->
  <rect x="40" y="90" width="180" height="70" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="130" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">terraform.tfvars</text>
  <text x="130" y="138" text-anchor="middle" font-size="11" fill="#374151">supplies the values</text>
  <text x="130" y="153" text-anchor="middle" font-size="10" fill="#6b7280">cidr_block = "10.0.0.0/16"</text>

  <!-- variables.tf -->
  <rect x="40" y="205" width="180" height="80" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="130" y="233" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">variables.tf</text>
  <text x="130" y="252" text-anchor="middle" font-size="11" fill="#374151">declares var + type</text>
  <text x="130" y="268" text-anchor="middle" font-size="10" fill="#6b7280">default (overridable)</text>

  <!-- main.tf -->
  <rect x="40" y="330" width="180" height="90" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="2"/>
  <text x="130" y="358" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f766e">main.tf</text>
  <text x="130" y="377" text-anchor="middle" font-size="11" fill="#374151">resources use var.x</text>
  <text x="130" y="393" text-anchor="middle" font-size="10" fill="#6b7280">cidr_block = var.cidr_block</text>
  <text x="130" y="409" text-anchor="middle" font-size="10" fill="#6b7280">aws_vpc.dev.id  (references)</text>

  <!-- arrows down -->
  <line x1="130" y1="162" x2="130" y2="203" stroke="#5b21b6" stroke-width="2.5" marker-end="url(#tf-arrow)"/>
  <text x="250" y="188" text-anchor="middle" font-size="10" fill="#5b21b6">overrides default</text>
  <line x1="130" y1="287" x2="130" y2="328" stroke="#0f766e" stroke-width="2.5" marker-end="url(#tf-arrow-g)"/>
  <text x="215" y="312" text-anchor="middle" font-size="10" fill="#0f766e">via var.</text>

  <!-- precedence box -->
  <rect x="40" y="445" width="360" height="120" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="55" y="470" font-size="12" font-weight="bold" fill="#111827">Value precedence (highest wins)</text>
  <text x="55" y="493" font-size="11" fill="#374151">1. hardcoded value in main.tf   (block being applied)</text>
  <text x="55" y="512" font-size="11" fill="#374151">2. terraform.tfvars   (through var.)</text>
  <text x="55" y="531" font-size="11" fill="#374151">3. default in variables.tf</text>
  <text x="55" y="553" font-size="10" fill="#6b7280">Don't hardcode in main.tf — keep it a reusable template.</text>

  <!-- ============ Right: provider + lifecycle ============ -->
  <text x="655" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f766e">Command lifecycle</text>

  <!-- provider.tf -->
  <rect x="480" y="88" width="350" height="70" rx="8" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
  <text x="655" y="114" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">provider.tf  +  terraform{} version block</text>
  <text x="655" y="133" text-anchor="middle" font-size="10" fill="#374151">provider "aws" (no keys — read from aws configure)</text>
  <text x="655" y="149" text-anchor="middle" font-size="10" fill="#6b7280">version = "&lt;= 6.53.0"  pins the provider</text>

  <!-- init -->
  <rect x="520" y="185" width="270" height="66" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="2"/>
  <text x="655" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f766e">terraform init</text>
  <text x="655" y="230" text-anchor="middle" font-size="10" fill="#374151">downloads plugins → .terraform/</text>
  <text x="655" y="245" text-anchor="middle" font-size="10" fill="#6b7280">writes .terraform.lock.hcl (pins version)</text>

  <!-- plan -->
  <rect x="520" y="272" width="270" height="60" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="655" y="297" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">terraform plan</text>
  <text x="655" y="317" text-anchor="middle" font-size="10" fill="#374151">dry run: "3 to add" — review before apply</text>

  <!-- apply -->
  <rect x="520" y="353" width="270" height="66" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="655" y="378" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">terraform apply</text>
  <text x="655" y="398" text-anchor="middle" font-size="10" fill="#374151">creates VPC first, then subnet</text>
  <text x="655" y="413" text-anchor="middle" font-size="10" fill="#6b7280">implicit dependency ordering</text>

  <!-- destroy -->
  <rect x="520" y="440" width="270" height="56" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="655" y="465" text-anchor="middle" font-size="13" font-weight="bold" fill="#dc2626">terraform destroy</text>
  <text x="655" y="484" text-anchor="middle" font-size="10" fill="#374151">tears down managed resources</text>

  <!-- lifecycle arrows -->
  <line x1="655" y1="158" x2="655" y2="183" stroke="#0f766e" stroke-width="2.5" marker-end="url(#tf-arrow-g)"/>
  <line x1="655" y1="251" x2="655" y2="270" stroke="#0f766e" stroke-width="2.5" marker-end="url(#tf-arrow-g)"/>
  <line x1="655" y1="332" x2="655" y2="351" stroke="#0f766e" stroke-width="2.5" marker-end="url(#tf-arrow-g)"/>
  <line x1="655" y1="419" x2="655" y2="438" stroke="#0f766e" stroke-width="2.5" marker-end="url(#tf-arrow-g)"/>

  <!-- upgrade note -->
  <text x="810" y="222" font-size="10" fill="#6b7280">init -upgrade</text>
  <text x="810" y="236" font-size="10" fill="#6b7280">to re-pin</text>

  <!-- gitignore footer -->
  <rect x="430" y="522" width="440" height="66" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="445" y="544" font-size="11" font-weight="bold" fill="#111827">.gitignore (repo root):</text>
  <text x="445" y="563" font-size="10" fill="#374151">ignore  .terraform/ · .terraform.lock.hcl · *.tfstate*</text>
  <text x="445" y="579" font-size="10" fill="#374151">push  provider.tf · main.tf · variables.tf · terraform.tfvars</text>

  <text x="450" y="610" text-anchor="middle" font-size="10" fill="#9ca3af">Session 70 · 2026-07-08 · devops-log</text>
</svg>
