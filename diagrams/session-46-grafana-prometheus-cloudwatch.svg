<svg width="900" height="620" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif">
  <style>
    .title{font-size:20px;font-weight:bold;fill:#232f3e}
    .label{font-size:13px;fill:#232f3e}
    .small{font-size:11px;fill:#555}
    .box{stroke-width:2;rx:8}
    .flow{font-size:11px;fill:#067d62;font-weight:bold}
  </style>

  <text x="30" y="36" class="title">Session 46 — Grafana Monitoring Stack (Dual Data Source)</text>
  <text x="30" y="58" class="small">Servers → node_exporter → Prometheus → Grafana  |  CloudWatch → Grafana (parallel path)</text>

  <!-- Target / monitored servers -->
  <rect x="30" y="90" width="180" height="150" fill="#fef3e7" stroke="#d86613" rx="8"/>
  <text x="50" y="115" class="label" font-weight="bold">Monitored EC2 (x2)</text>
  <rect x="50" y="128" width="140" height="42" fill="#ffffff" stroke="#d86613" rx="6"/>
  <text x="60" y="146" class="small">node_exporter</text>
  <text x="60" y="162" class="small">:9100 (host metrics)</text>
  <rect x="50" y="180" width="140" height="42" fill="#ffffff" stroke="#d86613" rx="6"/>
  <text x="60" y="198" class="small">CPU / RAM / disk</text>
  <text x="60" y="214" class="small">filesystem / network</text>

  <!-- Prometheus -->
  <rect x="290" y="90" width="190" height="200" fill="#fde8e8" stroke="#e6522c" rx="8"/>
  <text x="310" y="115" class="label" font-weight="bold">Prometheus :9090</text>
  <text x="310" y="138" class="small">Scrapes 2 targets:</text>
  <text x="320" y="156" class="small">• node_server (target)</text>
  <text x="320" y="172" class="small">• localhost (self)</text>
  <text x="310" y="196" class="small">Stores time-series</text>
  <text x="310" y="214" class="small">Runs PromQL</text>
  <rect x="310" y="228" width="150" height="48" fill="#ffffff" stroke="#e6522c" rx="6"/>
  <text x="320" y="247" class="small" font-weight="bold">Alertmanager :9093</text>
  <text x="320" y="264" class="small">(integrated here, not Grafana)</text>

  <!-- CloudWatch -->
  <rect x="290" y="330" width="190" height="120" fill="#e8f0fb" stroke="#3b48cc" rx="8"/>
  <text x="310" y="355" class="label" font-weight="bold">AWS CloudWatch</text>
  <text x="310" y="378" class="small">Auto-collects EC2/RDS</text>
  <text x="310" y="394" class="small">metrics by default</text>
  <text x="310" y="410" class="small">No agent needed</text>
  <text x="310" y="430" class="small">Namespace + dimensions</text>

  <!-- Grafana -->
  <rect x="560" y="160" width="200" height="180" fill="#fdf3e3" stroke="#f46800" rx="8"/>
  <text x="580" y="185" class="label" font-weight="bold">Grafana :3000</text>
  <text x="580" y="208" class="small">Visualization only —</text>
  <text x="580" y="224" class="small">never executes queries</text>
  <text x="580" y="246" class="small">Data sources:</text>
  <text x="590" y="264" class="small">1. Prometheus (PromQL)</text>
  <text x="590" y="280" class="small">2. CloudWatch (no PromQL)</text>
  <text x="580" y="304" class="small">Dashboards, panels,</text>
  <text x="580" y="320" class="small">alert rules</text>

  <!-- PagerDuty -->
  <rect x="560" y="400" width="200" height="90" fill="#e7f6ec" stroke="#06ac38" rx="8"/>
  <text x="580" y="425" class="label" font-weight="bold">PagerDuty</text>
  <text x="580" y="448" class="small">Contact point via</text>
  <text x="580" y="464" class="small">integration key</text>
  <text x="580" y="480" class="small">Fires on rule breach</text>

  <!-- IAM role note -->
  <rect x="560" y="90" width="310" height="52" fill="#f4f4f4" stroke="#879196" rx="8"/>
  <text x="572" y="112" class="small" font-weight="bold">IAM Role on Grafana EC2</text>
  <text x="572" y="130" class="small">Grants CloudWatch read access (managed CloudWatch policy)</text>

  <!-- arrows -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#067d62"/>
    </marker>
  </defs>

  <line x1="210" y1="160" x2="288" y2="160" stroke="#067d62" stroke-width="2" marker-end="url(#arr)"/>
  <text x="218" y="152" class="flow">scrape</text>

  <line x1="480" y1="180" x2="558" y2="220" stroke="#067d62" stroke-width="2" marker-end="url(#arr)"/>
  <text x="486" y="190" class="flow">PromQL</text>

  <line x1="480" y1="380" x2="558" y2="300" stroke="#067d62" stroke-width="2" marker-end="url(#arr)"/>
  <text x="486" y="362" class="flow">metrics</text>

  <line x1="660" y1="340" x2="660" y2="398" stroke="#067d62" stroke-width="2" marker-end="url(#arr)"/>
  <text x="668" y="375" class="flow">alert</text>

  <!-- key callout -->
  <rect x="30" y="300" width="230" height="290" fill="#fafafa" stroke="#cccccc" rx="8"/>
  <text x="44" y="324" class="label" font-weight="bold">Key points</text>
  <text x="44" y="348" class="small">• Grafana passes query to</text>
  <text x="54" y="364" class="small">Prometheus; Prometheus</text>
  <text x="54" y="380" class="small">runs it, returns result.</text>
  <text x="44" y="402" class="small">• CloudWatch path needs</text>
  <text x="54" y="418" class="small">NO node_exporter.</text>
  <text x="44" y="440" class="small">• PromQL does NOT work</text>
  <text x="54" y="456" class="small">on a CloudWatch source.</text>
  <text x="44" y="478" class="small">• Alertmanager lives at</text>
  <text x="54" y="494" class="small">Prometheus level.</text>
  <text x="44" y="516" class="small">• Import community boards</text>
  <text x="54" y="532" class="small">by ID (1860 = node</text>
  <text x="54" y="548" class="small">exporter full).</text>
  <text x="44" y="570" class="small">• prometheus + node_exporter</text>
  <text x="54" y="586" class="small">≈ what CloudWatch gives free.</text>
</svg>
