<svg xmlns="http://www.w3.org/2000/svg" width="760" height="480" viewBox="0 0 760 480" style="background:#ffffff;font-family:Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3a6abf" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3a8a4a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#bf3a4a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="380" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">IAM Groups + EC2 Web Server + Route 53 — abishaix.com</text>

  <!-- ===== TOP: DNS Flow ===== -->
  <rect x="20" y="36" width="720" height="100" rx="10" fill="#fff8e6" stroke="#c09030" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="38" y="56" font-size="11" font-weight="bold" fill="#8a6010">DNS Flow — abishaix.com</text>

  <!-- User -->
  <circle cx="60" cy="90" r="18" fill="#e6f0ff" stroke="#3a6abf" stroke-width="1.5"/>
  <text x="60" y="94" text-anchor="middle" font-size="10" fill="#1a4a9a">User</text>

  <line x1="78" y1="90" x2="118" y2="90" stroke="#3a6abf" stroke-width="1.2" marker-end="url(#arr-blue)"/>
  <text x="98" y="84" text-anchor="middle" font-size="9" fill="#888">abishaix.com</text>

  <!-- GoDaddy -->
  <rect x="118" y="74" width="110" height="32" rx="6" fill="#fff0d0" stroke="#c09030" stroke-width="1"/>
  <text x="173" y="87" text-anchor="middle" font-size="10" font-weight="bold" fill="#8a6010">GoDaddy</text>
  <text x="173" y="99" text-anchor="middle" font-size="9" fill="#b07020">NS → AWS Route 53</text>

  <line x1="228" y1="90" x2="268" y2="90" stroke="#c09030" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Route 53 -->
  <rect x="268" y="74" width="120" height="32" rx="6" fill="#e8ffe8" stroke="#3a8a4a" stroke-width="1"/>
  <text x="328" y="87" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a6a2a">Route 53</text>
  <text x="328" y="99" text-anchor="middle" font-size="9" fill="#3a8a4a">A record → EC2 IP</text>

  <line x1="388" y1="90" x2="428" y2="90" stroke="#3a8a4a" stroke-width="1.2" marker-end="url(#arr-green)"/>

  <!-- EC2 -->
  <rect x="428" y="74" width="130" height="32" rx="6" fill="#e6f0ff" stroke="#3a6abf" stroke-width="1.5"/>
  <text x="493" y="87" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a4a9a">EC2 abishaix-web</text>
  <text x="493" y="99" text-anchor="middle" font-size="9" fill="#3a6abf">Apache httpd • port 80</text>

  <line x1="558" y1="90" x2="598" y2="90" stroke="#3a6abf" stroke-width="1.2" marker-end="url(#arr-blue)"/>

  <!-- Site -->
  <rect x="598" y="74" width="120" height="32" rx="6" fill="#f5eeff" stroke="#7a4abf" stroke-width="1.5"/>
  <text x="658" y="87" text-anchor="middle" font-size="10" font-weight="bold" fill="#5a2a9a">abishaix.com ✅</text>
  <text x="658" y="99" text-anchor="middle" font-size="9" fill="#7a4abf">Portfolio site live</text>

  <!-- ===== MIDDLE: IAM Groups ===== -->
  <rect x="20" y="150" width="720" height="180" rx="10" fill="#f0f4ff" stroke="#4a6fa5" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="38" y="170" font-size="11" font-weight="bold" fill="#4a6fa5">IAM Groups — Permission Management</text>

  <!-- dev-team group -->
  <rect x="40" y="178" width="200" height="134" rx="8" fill="#ffeef0" stroke="#bf3a4a" stroke-width="1.5"/>
  <text x="140" y="196" text-anchor="middle" font-size="12" font-weight="bold" fill="#9a1a2a">dev-team</text>
  <text x="140" y="211" text-anchor="middle" font-size="10" fill="#bf3a4a">AmazonEC2ReadOnlyAccess</text>

  <rect x="56" y="220" width="168" height="34" rx="6" fill="#fff" stroke="#bf3a4a" stroke-width="1"/>
  <text x="140" y="234" text-anchor="middle" font-size="10" font-weight="bold" fill="#9a1a2a">dev-user</text>
  <text x="140" y="246" text-anchor="middle" font-size="10" fill="#bf3a4a">Console access only</text>

  <rect x="56" y="262" width="168" height="34" rx="6" fill="#ffeef0" stroke="#bf3a4a" stroke-width="1"/>
  <text x="140" y="276" text-anchor="middle" font-size="11" fill="#bf3a4a">Stop instance →</text>
  <text x="140" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#bf3a4a">❌ ACCESS DENIED</text>

  <!-- ops-team group -->
  <rect x="280" y="178" width="200" height="134" rx="8" fill="#e8ffe8" stroke="#3a8a4a" stroke-width="1.5"/>
  <text x="380" y="196" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a6a2a">ops-team</text>
  <text x="380" y="211" text-anchor="middle" font-size="10" fill="#3a8a4a">AmazonEC2FullAccess</text>

  <rect x="296" y="220" width="168" height="34" rx="6" fill="#fff" stroke="#3a8a4a" stroke-width="1"/>
  <text x="380" y="234" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a6a2a">ops-user</text>
  <text x="380" y="246" text-anchor="middle" font-size="10" fill="#3a8a4a">Console access only</text>

  <rect x="296" y="262" width="168" height="34" rx="6" fill="#e8ffe8" stroke="#3a8a4a" stroke-width="1"/>
  <text x="380" y="276" text-anchor="middle" font-size="11" fill="#3a8a4a">Stop instance →</text>
  <text x="380" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a6a2a">✅ SUCCESS</text>

  <!-- Key rule -->
  <rect x="520" y="178" width="200" height="134" rx="8" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <text x="620" y="196" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Key Rules</text>
  <text x="536" y="216" font-size="10" fill="#555">• Group perms = shared</text>
  <text x="536" y="232" font-size="10" fill="#555">• Individual perms = private</text>
  <text x="536" y="248" font-size="10" fill="#555">• Deny always beats Allow</text>
  <text x="536" y="264" font-size="10" fill="#555">• One policy → many users</text>
  <text x="536" y="280" font-size="10" fill="#555">• Add/remove users anytime</text>
  <text x="536" y="296" font-size="10" fill="#555">• No limit on group members</text>

  <!-- ===== BOTTOM: Route 53 setup ===== -->
  <rect x="20" y="344" width="720" height="120" rx="10" fill="#f0fff4" stroke="#3a8a4a" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="38" y="364" font-size="11" font-weight="bold" fill="#3a8a4a">Route 53 Setup Steps</text>

  <rect x="40" y="372" width="130" height="80" rx="6" fill="#e8ffe8" stroke="#3a8a4a" stroke-width="1"/>
  <text x="105" y="390" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a6a2a">1. Hosted Zone</text>
  <text x="105" y="405" text-anchor="middle" font-size="10" fill="#3a8a4a">Create public</text>
  <text x="105" y="419" text-anchor="middle" font-size="10" fill="#3a8a4a">hosted zone</text>
  <text x="105" y="433" text-anchor="middle" font-size="10" fill="#3a8a4a">for abishaix.com</text>
  <text x="105" y="447" text-anchor="middle" font-size="10" fill="#3a8a4a">4 NS records auto</text>

  <line x1="170" y1="412" x2="200" y2="412" stroke="#3a8a4a" stroke-width="1.2" marker-end="url(#arr-green)"/>

  <rect x="200" y="372" width="130" height="80" rx="6" fill="#e8ffe8" stroke="#3a8a4a" stroke-width="1"/>
  <text x="265" y="390" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a6a2a">2. GoDaddy NS</text>
  <text x="265" y="405" text-anchor="middle" font-size="10" fill="#3a8a4a">Update nameservers</text>
  <text x="265" y="419" text-anchor="middle" font-size="10" fill="#3a8a4a">to 4 AWS NS</text>
  <text x="265" y="433" text-anchor="middle" font-size="10" fill="#3a8a4a">records from</text>
  <text x="265" y="447" text-anchor="middle" font-size="10" fill="#3a8a4a">hosted zone</text>

  <line x1="330" y1="412" x2="360" y2="412" stroke="#3a8a4a" stroke-width="1.2" marker-end="url(#arr-green)"/>

  <rect x="360" y="372" width="130" height="80" rx="6" fill="#e8ffe8" stroke="#3a8a4a" stroke-width="1"/>
  <text x="425" y="390" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a6a2a">3. A Record</text>
  <text x="425" y="405" text-anchor="middle" font-size="10" fill="#3a8a4a">Create A record</text>
  <text x="425" y="419" text-anchor="middle" font-size="10" fill="#3a8a4a">abishaix.com</text>
  <text x="425" y="433" text-anchor="middle" font-size="10" fill="#3a8a4a">→ EC2 public IP</text>
  <text x="425" y="447" text-anchor="middle" font-size="10" fill="#3a8a4a">TTL: 300</text>

  <line x1="490" y1="412" x2="520" y2="412" stroke="#3a8a4a" stroke-width="1.2" marker-end="url(#arr-green)"/>

  <rect x="520" y="372" width="200" height="80" rx="6" fill="#e6f0ff" stroke="#3a6abf" stroke-width="1"/>
  <text x="620" y="390" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a4a9a">4. DNS Propagation</text>
  <text x="536" y="408" font-size="10" fill="#3a6abf">Wait 5–15 mins for GoDaddy</text>
  <text x="536" y="422" font-size="10" fill="#3a6abf">→ AWS propagation</text>
  <text x="536" y="436" font-size="10" fill="#c03030">⚠️ IP changes on EC2 restart</text>
  <text x="536" y="450" font-size="10" fill="#c03030">Update A record each time</text>
</svg>
