<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" viewBox="0 0 760 500" style="background:#ffffff;font-family:Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3a6abf" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3a8a4a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#bf3a4a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="380" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Lab 11 — Route 53 All Routing Policies on abishaix.com</text>

  <!-- Route 53 center -->
  <rect x="310" y="40" width="140" height="50" rx="10" fill="#fff8e6" stroke="#c09030" stroke-width="2"/>
  <text x="380" y="61" text-anchor="middle" font-size="12" font-weight="bold" fill="#8a6010">Route 53</text>
  <text x="380" y="78" text-anchor="middle" font-size="10" fill="#b07020">abishaix.com</text>

  <!-- Simple -->
  <rect x="20" y="130" width="120" height="52" rx="8" fill="#f0f4ff" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="80" y="148" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a4a9a">1. Simple</text>
  <text x="80" y="162" text-anchor="middle" font-size="9" fill="#3a6abf">abishaix.com</text>
  <text x="80" y="174" text-anchor="middle" font-size="9" fill="#3a6abf">→ EC2 / ALB ✅</text>
  <line x1="140" y1="156" x2="310" y2="75" stroke="#4a6fa5" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>

  <!-- Subdomain -->
  <rect x="20" y="200" width="120" height="52" rx="8" fill="#f0f4ff" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="80" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a4a9a">3. Subdomain</text>
  <text x="80" y="232" text-anchor="middle" font-size="9" fill="#3a6abf">api.abishaix.com</text>
  <text x="80" y="244" text-anchor="middle" font-size="9" fill="#3a6abf">→ EC2 ✅</text>
  <line x1="140" y1="226" x2="310" y2="80" stroke="#4a6fa5" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>

  <!-- CNAME -->
  <rect x="20" y="270" width="120" height="52" rx="8" fill="#f0f4ff" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="80" y="288" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a4a9a">4. CNAME</text>
  <text x="80" y="302" text-anchor="middle" font-size="9" fill="#3a6abf">dev → abishaix.com</text>
  <text x="80" y="314" text-anchor="middle" font-size="9" fill="#3a6abf">domain to domain ✅</text>
  <line x1="140" y1="296" x2="310" y2="82" stroke="#4a6fa5" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>

  <!-- Alias -->
  <rect x="20" y="340" width="120" height="52" rx="8" fill="#e8ffe8" stroke="#3a8a4a" stroke-width="1.5"/>
  <text x="80" y="358" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a6a2a">2. Alias</text>
  <text x="80" y="372" text-anchor="middle" font-size="9" fill="#3a8a4a">abishaix.com → ALB</text>
  <text x="80" y="384" text-anchor="middle" font-size="9" fill="#3a8a4a">AWS endpoint ✅</text>
  <line x1="140" y1="366" x2="310" y2="85" stroke="#3a8a4a" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr-green)"/>

  <!-- Weighted -->
  <rect x="620" y="130" width="120" height="66" rx="8" fill="#f5eeff" stroke="#7a4abf" stroke-width="1.5"/>
  <text x="680" y="148" text-anchor="middle" font-size="10" font-weight="bold" fill="#5a2a9a">5. Weighted</text>
  <text x="680" y="162" text-anchor="middle" font-size="9" fill="#7a4abf">Server1: 70% ✅</text>
  <text x="680" y="175" text-anchor="middle" font-size="9" fill="#7a4abf">Server2: 30% ✅</text>
  <text x="680" y="188" text-anchor="middle" font-size="9" fill="#7a4abf">Manual split</text>
  <line x1="620" y1="163" x2="450" y2="75" stroke="#7a4abf" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>

  <!-- Geolocation -->
  <rect x="620" y="214" width="120" height="66" rx="8" fill="#fff8e6" stroke="#c09030" stroke-width="1.5"/>
  <text x="680" y="232" text-anchor="middle" font-size="10" font-weight="bold" fill="#8a6010">6. Geolocation</text>
  <text x="680" y="246" text-anchor="middle" font-size="9" fill="#b07020">Turkey → ✅</text>
  <text x="680" y="259" text-anchor="middle" font-size="9" fill="#b07020">Bulgaria → ❌</text>
  <text x="680" y="272" text-anchor="middle" font-size="9" fill="#b07020">Country-based</text>
  <line x1="620" y1="247" x2="450" y2="78" stroke="#c09030" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>

  <!-- Latency -->
  <rect x="620" y="298" width="120" height="66" rx="8" fill="#e8ffe8" stroke="#3a8a4a" stroke-width="1.5"/>
  <text x="680" y="316" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a6a2a">8. Latency</text>
  <text x="680" y="330" text-anchor="middle" font-size="9" fill="#3a8a4a">Mumbai (ap-south-1)</text>
  <text x="680" y="343" text-anchor="middle" font-size="9" fill="#3a8a4a">US East (us-east-1)</text>
  <text x="680" y="356" text-anchor="middle" font-size="9" fill="#3a8a4a">Lowest latency ✅</text>
  <line x1="620" y1="331" x2="450" y2="82" stroke="#3a8a4a" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr-green)"/>

  <!-- Failover -->
  <rect x="620" y="382" width="120" height="66" rx="8" fill="#ffeef0" stroke="#bf3a4a" stroke-width="1.5"/>
  <text x="680" y="400" text-anchor="middle" font-size="10" font-weight="bold" fill="#9a1a2a">7. Failover</text>
  <text x="680" y="414" text-anchor="middle" font-size="9" fill="#bf3a4a">Primary: Mumbai ✅</text>
  <text x="680" y="427" text-anchor="middle" font-size="9" fill="#bf3a4a">Secondary: US East</text>
  <text x="680" y="440" text-anchor="middle" font-size="9" fill="#bf3a4a">Health checks ✅</text>
  <line x1="620" y1="415" x2="450" y2="85" stroke="#bf3a4a" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr-red)"/>

  <!-- Mumbai region box -->
  <rect x="160" y="320" width="160" height="120" rx="10" fill="#e6f0ff" stroke="#3a6abf" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="240" y="340" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a4a9a">ap-south-1 (Mumbai)</text>
  <rect x="174" y="348" width="132" height="30" rx="6" fill="#fff" stroke="#3a6abf" stroke-width="1"/>
  <text x="240" y="363" text-anchor="middle" font-size="9" fill="#1a4a9a">route53-web (Server 1)</text>
  <text x="240" y="375" text-anchor="middle" font-size="8" fill="#3a6abf">3.6.38.190</text>
  <rect x="174" y="386" width="132" height="30" rx="6" fill="#fff" stroke="#3a6abf" stroke-width="1"/>
  <text x="240" y="401" text-anchor="middle" font-size="9" fill="#1a4a9a">route53-web-2 (Server 2)</text>
  <text x="240" y="413" text-anchor="middle" font-size="8" fill="#3a6abf">15.206.66.155</text>
  <line x1="310" y1="85" x2="240" y2="320" stroke="#3a6abf" stroke-width="1" marker-end="url(#arr-blue)"/>

  <!-- US East region box -->
  <rect x="340" y="320" width="160" height="80" rx="10" fill="#ffeef0" stroke="#bf3a4a" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="420" y="340" text-anchor="middle" font-size="10" font-weight="bold" fill="#9a1a2a">us-east-1 (US East)</text>
  <rect x="354" y="348" width="132" height="42" rx="6" fill="#fff" stroke="#bf3a4a" stroke-width="1"/>
  <text x="420" y="363" text-anchor="middle" font-size="9" fill="#9a1a2a">route53-web-us (Server 3)</text>
  <text x="420" y="376" text-anchor="middle" font-size="8" fill="#bf3a4a">44.204.219.97</text>
  <text x="420" y="388" text-anchor="middle" font-size="8" fill="#bf3a4a">Secondary / Failover</text>
  <line x1="450" y1="85" x2="420" y2="320" stroke="#bf3a4a" stroke-width="1" marker-end="url(#arr-red)"/>

  <!-- Key insight -->
  <rect x="160" y="452" width="440" height="38" rx="8" fill="#f5eeff" stroke="#7a4abf" stroke-width="1"/>
  <text x="380" y="468" text-anchor="middle" font-size="10" font-weight="bold" fill="#5a2a9a">Route 53 Failover + ALB = High Availability at Zone Level AND Region Level</text>
  <text x="380" y="482" text-anchor="middle" font-size="10" fill="#7a4abf">AZ failure → ALB handles it     |     Region failure → Route 53 failover handles it</text>
</svg>
