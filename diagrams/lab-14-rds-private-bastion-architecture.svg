<svg xmlns="http://www.w3.org/2000/svg" width="860" height="460" style="background:#ffffff;font-family:Arial,sans-serif">

  <!-- Title -->
  <text x="430" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Lab 14 — Private RDS + Bastion Host Connection Pattern</text>

  <!-- VPC boundary -->
  <rect x="30" y="42" width="700" height="380" rx="12" fill="none" stroke="#5c85d6" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="48" y="62" font-size="11" fill="#5c85d6" font-weight="bold">VPC — rds-practice-vpc-vpc — 10.0.0.0/16</text>

  <!-- Public subnet -->
  <rect x="55" y="72" width="280" height="160" rx="8" fill="#fff9e6" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="195" y="90" text-anchor="middle" font-size="10" fill="#f9a825" font-weight="bold">Public Subnet — us-west-2b</text>

  <!-- Bastion -->
  <rect x="75" y="100" width="240" height="116" rx="8" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="195" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Bastion Host (rds-bastion)</text>
  <text x="195" y="138" text-anchor="middle" font-size="10" fill="#555">t3.micro  |  Amazon Linux 2023</text>
  <text x="195" y="154" text-anchor="middle" font-size="10" fill="#555">Public IP: 44.243.214.110</text>
  <text x="195" y="170" text-anchor="middle" font-size="10" fill="#34a853">MySQL client installed (mariadb105)</text>
  <text x="195" y="186" text-anchor="middle" font-size="10" fill="#888">SG: rds-new-sec-sg</text>
  <text x="195" y="202" text-anchor="middle" font-size="9" fill="#888">Inbound: SSH 22 from 0.0.0.0/0</text>

  <!-- Private subnet -->
  <rect x="365" y="72" width="340" height="220" rx="8" fill="#f0eaff" stroke="#7c4dff" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="535" y="90" text-anchor="middle" font-size="10" fill="#7c4dff" font-weight="bold">Private Subnet — us-west-2a</text>

  <!-- RDS -->
  <rect x="385" y="100" width="300" height="170" rx="8" fill="#fff8e1" stroke="#f9a825" stroke-width="2"/>
  <text x="535" y="122" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">RDS MySQL — rds-private-db</text>
  <text x="535" y="140" text-anchor="middle" font-size="10" fill="#555">db.t4g.micro  |  MySQL 8.4.8</text>
  <text x="535" y="156" text-anchor="middle" font-size="10" fill="#e53935">Internet access gateway: Disabled</text>
  <text x="535" y="172" text-anchor="middle" font-size="10" fill="#e53935">Public access: No</text>
  <text x="535" y="188" text-anchor="middle" font-size="10" fill="#555">SG: rds-practice-sg</text>
  <text x="535" y="204" text-anchor="middle" font-size="9" fill="#888">Inbound: 3306 from rds-new-sec-sg only</text>
  <text x="535" y="222" text-anchor="middle" font-size="10" fill="#34a853">testdb → orders (4 records)</text>
  <text x="535" y="240" text-anchor="middle" font-size="9" fill="#888">endpoint: rds-private-db.cpumwuw0u34t...</text>
  <text x="535" y="256" text-anchor="middle" font-size="9" fill="#888">us-west-2.rds.amazonaws.com</text>

  <!-- Arrow bastion → RDS -->
  <line x1="315" y1="158" x2="385" y2="180" stroke="#7c4dff" stroke-width="2" marker-end="url(#arrP)"/>
  <text x="348" y="158" text-anchor="middle" font-size="10" fill="#7c4dff">mysql</text>
  <text x="348" y="172" text-anchor="middle" font-size="10" fill="#7c4dff">port 3306</text>
  <text x="348" y="186" text-anchor="middle" font-size="9" fill="#888">VPC local</text>

  <!-- No direct path from internet to RDS -->
  <rect x="55" y="310" width="640" height="90" rx="8" fill="#fff5f5" stroke="#e53935" stroke-width="1.2"/>
  <text x="375" y="332" text-anchor="middle" font-size="11" font-weight="bold" fill="#e53935">❌  No Direct Internet → RDS Path</text>
  <text x="375" y="352" text-anchor="middle" font-size="10" fill="#555">Private subnet has no IGW route  |  Public access disabled  |  No public IP assigned</text>
  <text x="375" y="370" text-anchor="middle" font-size="10" fill="#555">Only path: Internet → Bastion (SSH) → RDS (mysql port 3306)</text>
  <text x="375" y="388" text-anchor="middle" font-size="9" fill="#888">SG chain: bastion SG trusted by RDS SG — no other source allowed</text>

  <!-- Browser/EC2 Instance Connect -->
  <rect x="750" y="80" width="100" height="70" rx="8" fill="#f0f4ff" stroke="#5c85d6" stroke-width="1.5"/>
  <text x="800" y="103" text-anchor="middle" font-size="20">🌐</text>
  <text x="800" y="123" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">Browser</text>
  <text x="800" y="139" text-anchor="middle" font-size="9" fill="#555">EC2 Instance</text>
  <text x="800" y="151" text-anchor="middle" font-size="9" fill="#555">Connect</text>

  <!-- Arrow browser → bastion -->
  <line x1="750" y1="115" x2="730" y2="158" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrB)"/>
  <text x="752" y="135" font-size="9" fill="#4a90d9">SSH 22</text>

  <!-- Arrowhead defs -->
  <defs>
    <marker id="arrP" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c4dff"/>
    </marker>
    <marker id="arrB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/>
    </marker>
  </defs>

</svg>
