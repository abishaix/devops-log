<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" style="background:#ffffff;font-family:Arial,sans-serif">

  <text x="430" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Lab 19 Part 1 — EventBridge Event Rule → EBS Snapshot on EC2 Shutdown</text>

  <!-- Step numbers -->
  <circle cx="120" cy="55" r="14" fill="#2980b9"/><text x="120" y="60" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">1</text>
  <circle cx="400" cy="55" r="14" fill="#e67e22"/><text x="400" y="60" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">2</text>
  <circle cx="680" cy="55" r="14" fill="#27ae60"/><text x="680" y="60" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">3</text>

  <!-- EC2 box -->
  <rect x="30" y="75" width="180" height="220" rx="10" fill="#eaf6ff" stroke="#2980b9" stroke-width="2"/>
  <text x="120" y="97" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">EC2 Instance</text>
  <rect x="50" y="107" width="140" height="28" rx="5" fill="#27ae60"/>
  <text x="120" y="126" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">● running</text>
  <line x1="120" y1="135" x2="120" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="148" y="149" font-size="9" fill="#666">stop/terminate</text>
  <rect x="50" y="158" width="140" height="28" rx="5" fill="#e74c3c"/>
  <text x="120" y="177" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">⚠ shutting-down</text>
  <rect x="50" y="200" width="140" height="34" rx="5" fill="#f39c12" stroke="#d68910" stroke-width="1"/>
  <text x="120" y="214" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">EBS Volume</text>
  <text x="120" y="228" text-anchor="middle" font-size="9" fill="#fff">/dev/xvda  (still alive)</text>
  <rect x="34" y="245" width="172" height="42" rx="5" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="120" y="261" text-anchor="middle" font-size="9" fill="#c0602a" font-weight="bold">⚠ "terminated" = too late</text>
  <text x="120" y="275" text-anchor="middle" font-size="9" fill="#555">EBS already gone by then</text>

  <!-- EventBridge box -->
  <rect x="300" y="75" width="200" height="165" rx="10" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
  <text x="400" y="97" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">EventBridge Rule</text>
  <text x="400" y="112" text-anchor="middle" font-size="10" fill="#888">Event Pattern</text>
  <rect x="315" y="120" width="170" height="20" rx="4" fill="#fdebd0"/><text x="400" y="134" text-anchor="middle" font-size="9" fill="#a04000">Source: Amazon EC2</text>
  <rect x="315" y="144" width="170" height="20" rx="4" fill="#fdebd0"/><text x="400" y="158" text-anchor="middle" font-size="9" fill="#a04000">Event: Instance State-change</text>
  <rect x="315" y="168" width="170" height="20" rx="4" fill="#fdebd0"/><text x="400" y="182" text-anchor="middle" font-size="9" fill="#a04000">State: shutting-down</text>
  <rect x="315" y="192" width="170" height="20" rx="4" fill="#fdebd0"/><text x="400" y="206" text-anchor="middle" font-size="9" fill="#a04000">Scope: specific Instance ID</text>

  <!-- EBS Snapshot box -->
  <rect x="580" y="75" width="250" height="165" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="705" y="97" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">EBS Snapshot</text>
  <text x="705" y="112" text-anchor="middle" font-size="10" fill="#888">Target action</text>
  <rect x="596" y="120" width="218" height="20" rx="4" fill="#d5f5e3"/><text x="705" y="134" text-anchor="middle" font-size="9" fill="#1a6a3a">CreateSnapshot API call</text>
  <rect x="596" y="144" width="218" height="20" rx="4" fill="#d5f5e3"/><text x="705" y="158" text-anchor="middle" font-size="9" fill="#1a6a3a">Volume: /dev/xvda (volume ID)</text>
  <rect x="596" y="168" width="218" height="20" rx="4" fill="#d5f5e3"/><text x="705" y="182" text-anchor="middle" font-size="9" fill="#1a6a3a">Stored in S3 (AWS-managed)</text>
  <rect x="596" y="192" width="218" height="20" rx="4" fill="#d5f5e3"/><text x="705" y="206" text-anchor="middle" font-size="9" fill="#1a6a3a">Survives instance deletion ✓</text>

  <!-- Arrows -->
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#555"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/></marker>
  </defs>
  <line x1="210" y1="168" x2="298" y2="168" stroke="#e67e22" stroke-width="2" marker-end="url(#a2)"/>
  <text x="254" y="161" text-anchor="middle" font-size="9" fill="#e67e22" font-weight="bold">state-change event</text>
  <line x1="500" y1="168" x2="578" y2="168" stroke="#27ae60" stroke-width="2" marker-end="url(#a3)"/>
  <text x="539" y="161" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="bold">trigger target</text>

  <!-- Key insight box -->
  <rect x="30" y="320" width="800" height="80" rx="8" fill="#f4f6f7" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="340" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Key Concepts</text>
  <text x="45" y="358" font-size="10" fill="#2980b9" font-weight="bold">Why shutting-down (not terminated):</text>
  <text x="245" y="358" font-size="9" fill="#555">At "terminated" state, EBS root volume is already deleted. Must capture at "shutting-down" when volume still exists.</text>
  <text x="45" y="376" font-size="10" fill="#e67e22" font-weight="bold">EventBridge vs Lambda:</text>
  <text x="175" y="376" font-size="9" fill="#555">Use EventBridge for predefined AWS actions (no code needed). Use Lambda when you need custom logic or tag-based filtering.</text>
  <text x="45" y="394" font-size="10" fill="#27ae60" font-weight="bold">S3 for snapshots:</text>
  <text x="160" y="394" font-size="9" fill="#555">AWS stores snapshots internally in S3 (managed). No bucket needed on your side — you only pay per GB/month of snapshot storage.</text>

</svg>
