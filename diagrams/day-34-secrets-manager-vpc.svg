<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" style="background:#ffffff;font-family:Arial,sans-serif">

  <!-- Title -->
  <text x="480" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">EC2 Pricing Options + Secrets Manager + VPC Endpoint Architecture</text>

  <!-- ══════════════════════════════════════════
       TOP HALF: EC2 Pricing Options
  ══════════════════════════════════════════ -->

  <!-- Section label -->
  <text x="480" y="48" text-anchor="middle" font-size="11" fill="#888">EC2 Instance Purchasing Options</text>

  <!-- On-Demand -->
  <rect x="30" y="56" width="160" height="100" rx="8" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="110" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a90d9">On-Demand</text>
  <text x="110" y="94" text-anchor="middle" font-size="10" fill="#555">No commitment</text>
  <text x="110" y="110" text-anchor="middle" font-size="10" fill="#555">Pay per use</text>
  <text x="110" y="126" text-anchor="middle" font-size="10" fill="#888">Best: testing, short workloads</text>
  <text x="110" y="146" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a90d9">Discount: 0%</text>

  <!-- Reserved -->
  <rect x="210" y="56" width="160" height="100" rx="8" fill="#e8f8ee" stroke="#34a853" stroke-width="1.5"/>
  <text x="290" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#34a853">Reserved</text>
  <text x="290" y="94" text-anchor="middle" font-size="10" fill="#555">1 or 3 year commit</text>
  <text x="290" y="110" text-anchor="middle" font-size="10" fill="#555">Standard or Convertible</text>
  <text x="290" y="126" text-anchor="middle" font-size="10" fill="#888">Best: 24/7 production apps</text>
  <text x="290" y="146" text-anchor="middle" font-size="11" font-weight="bold" fill="#34a853">Discount: ~72%</text>

  <!-- Spot -->
  <rect x="390" y="56" width="160" height="100" rx="8" fill="#fff3cd" stroke="#f9a825" stroke-width="1.5"/>
  <text x="470" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#f9a825">Spot</text>
  <text x="470" y="94" text-anchor="middle" font-size="10" fill="#555">Unused DC capacity</text>
  <text x="470" y="110" text-anchor="middle" font-size="10" fill="#e53935">Can be deleted anytime</text>
  <text x="470" y="126" text-anchor="middle" font-size="10" fill="#888">Best: batch, CI/CD, ASG</text>
  <text x="470" y="146" text-anchor="middle" font-size="11" font-weight="bold" fill="#f9a825">Discount: ~90%</text>

  <!-- Dedicated Host -->
  <rect x="570" y="56" width="175" height="100" rx="8" fill="#ffeaea" stroke="#e53935" stroke-width="1.5"/>
  <text x="657" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#e53935">Dedicated Host</text>
  <text x="657" y="94" text-anchor="middle" font-size="10" fill="#555">Physical hardware reserved</text>
  <text x="657" y="110" text-anchor="middle" font-size="10" fill="#555">No shared tenancy</text>
  <text x="657" y="126" text-anchor="middle" font-size="10" fill="#888">Best: compliance, licensing</text>
  <text x="657" y="146" text-anchor="middle" font-size="11" font-weight="bold" fill="#e53935">Cost: Highest</text>

  <!-- Capacity Reservation -->
  <rect x="765" y="56" width="170" height="100" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
  <text x="850" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Capacity Reservation</text>
  <text x="850" y="94" text-anchor="middle" font-size="10" fill="#555">Reserve AZ slot</text>
  <text x="850" y="110" text-anchor="middle" font-size="10" fill="#555">No billing discount</text>
  <text x="850" y="126" text-anchor="middle" font-size="10" fill="#888">Best: guaranteed availability</text>
  <text x="850" y="146" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Discount: 0%</text>

  <!-- Spot + ASG note -->
  <rect x="390" y="164" width="160" height="36" rx="6" fill="#fff8e1" stroke="#f9a825" stroke-width="1"/>
  <text x="470" y="180" text-anchor="middle" font-size="9" fill="#e53935">⚠ Must use with ASG</text>
  <text x="470" y="194" text-anchor="middle" font-size="9" fill="#555">Single spot = deleted = app down</text>

  <!-- ══════════════════════════════════════════
       BOTTOM HALF: Secrets Manager Architecture
  ══════════════════════════════════════════ -->

  <text x="480" y="228" text-anchor="middle" font-size="11" fill="#888">Secrets Manager + Private RDS — Architecture & Challenge</text>

  <!-- VPC boundary -->
  <rect x="30" y="238" width="620" height="340" rx="12" fill="none" stroke="#5c85d6" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="48" y="258" font-size="11" fill="#5c85d6" font-weight="bold">VPC</text>

  <!-- Public Subnet -->
  <rect x="50" y="265" width="200" height="90" rx="8" fill="#fff9e6" stroke="#f9a825" stroke-width="1.2"/>
  <text x="150" y="283" text-anchor="middle" font-size="10" fill="#f9a825" font-weight="bold">Public Subnet</text>
  <rect x="65" y="290" width="170" height="52" rx="6" fill="#fff" stroke="#f9a825" stroke-width="1.2"/>
  <text x="150" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Backend Server</text>
  <text x="150" y="328" text-anchor="middle" font-size="10" fill="#555">Python / Node.js</text>
  <text x="150" y="343" text-anchor="middle" font-size="9" fill="#34a853">fetches secret → connects DB</text>

  <!-- Private Subnet -->
  <rect x="280" y="265" width="350" height="90" rx="8" fill="#f0eaff" stroke="#7c4dff" stroke-width="1.2"/>
  <text x="455" y="283" text-anchor="middle" font-size="10" fill="#7c4dff" font-weight="bold">Private Subnet</text>
  <rect x="295" y="290" width="320" height="52" rx="6" fill="#fff" stroke="#7c4dff" stroke-width="1.5"/>
  <text x="455" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">RDS MySQL (Private)</text>
  <text x="455" y="328" text-anchor="middle" font-size="10" fill="#555">No public IP  |  No internet path</text>
  <text x="455" y="343" text-anchor="middle" font-size="9" fill="#7c4dff">Port 3306 — internal only</text>

  <!-- Arrow backend → RDS -->
  <line x1="235" y1="316" x2="295" y2="316" stroke="#7c4dff" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="265" y="310" text-anchor="middle" font-size="9" fill="#7c4dff">3306</text>

  <!-- VPC Endpoint box (inside VPC) -->
  <rect x="50" y="390" width="580" height="60" rx="8" fill="#e8f8ee" stroke="#34a853" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="340" y="413" text-anchor="middle" font-size="11" font-weight="bold" fill="#34a853">VPC Endpoint (Secrets Manager)</text>
  <text x="340" y="431" text-anchor="middle" font-size="10" fill="#555">Private connection from VPC to Secrets Manager — no internet required</text>
  <text x="340" y="446" text-anchor="middle" font-size="9" fill="#888">(covered next class)</text>

  <!-- Arrow backend → VPC Endpoint -->
  <line x1="150" y1="355" x2="150" y2="390" stroke="#34a853" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrG)"/>
  <text x="120" y="378" font-size="9" fill="#34a853">get secret</text>

  <!-- Challenge box -->
  <rect x="50" y="470" width="580" height="90" rx="8" fill="#fff5f5" stroke="#e53935" stroke-width="1.2"/>
  <text x="340" y="490" text-anchor="middle" font-size="11" font-weight="bold" fill="#e53935">⚠  Architecture Challenge</text>
  <text x="340" y="510" text-anchor="middle" font-size="10" fill="#555">Secrets Manager lives outside VPC  |  Private RDS has no internet path</text>
  <text x="340" y="528" text-anchor="middle" font-size="10" fill="#555">Solution: VPC Endpoint → private AWS-backbone connection (no internet)</text>
  <text x="340" y="546" text-anchor="middle" font-size="10" fill="#555">Also needed: VPC Peering if backend and RDS are in different VPCs</text>

  <!-- Secrets Manager (outside VPC) -->
  <rect x="680" y="265" width="250" height="265" rx="12" fill="#f9f9f9" stroke="#ccc" stroke-width="1.5"/>
  <text x="805" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">AWS Secrets Manager</text>
  <text x="805" y="300" text-anchor="middle" font-size="9" fill="#888">(outside VPC — global service)</text>

  <rect x="700" y="310" width="210" height="90" rx="6" fill="#fff" stroke="#34a853" stroke-width="1.2"/>
  <text x="805" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#34a853">Secret Value</text>
  <text x="805" y="348" text-anchor="middle" font-size="10" fill="#555">username: admin</text>
  <text x="805" y="364" text-anchor="middle" font-size="10" fill="#555">password: ••••••••••</text>
  <text x="805" y="380" text-anchor="middle" font-size="10" fill="#555">host: db.xxxxx.rds.amazonaws.com</text>
  <text x="805" y="396" text-anchor="middle" font-size="9" fill="#888">endpoint: rds!db-xxxxxxxx</text>

  <!-- Rotation box -->
  <rect x="700" y="415" width="210" height="56" rx="6" fill="#e8f8ee" stroke="#34a853" stroke-width="1"/>
  <text x="805" y="435" text-anchor="middle" font-size="11" font-weight="bold" fill="#34a853">Auto Rotation</text>
  <text x="805" y="452" text-anchor="middle" font-size="10" fill="#555">Default: every 7 days</text>
  <text x="805" y="467" text-anchor="middle" font-size="9" fill="#888">Configurable: daily / 30 days / custom</text>

  <!-- Arrow VPC Endpoint → Secrets Manager -->
  <line x1="630" y1="420" x2="700" y2="370" stroke="#34a853" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrG)"/>
  <text x="675" y="395" font-size="9" fill="#34a853">AWS backbone</text>

  <!-- Arrowhead defs -->
  <defs>
    <marker id="arrP" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c4dff"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34a853"/>
    </marker>
  </defs>

</svg>
