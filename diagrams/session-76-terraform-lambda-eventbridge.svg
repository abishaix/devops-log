<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="40" y="40" width="190" height="56" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="135" y="64" text-anchor="middle" font-size="14" font-weight="bold" fill="#26215c">IAM role</text>
<text x="135" y="82" text-anchor="middle" font-size="12" fill="#3c3489">trust: lambda.amazonaws.com</text>

<rect x="40" y="120" width="190" height="56" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="135" y="144" text-anchor="middle" font-size="14" font-weight="bold" fill="#26215c">Policy attachment</text>
<text x="135" y="162" text-anchor="middle" font-size="12" fill="#3c3489">AWSLambdaBasicExecutionRole</text>
<line x1="135" y1="96" x2="135" y2="120" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="280" y="80" width="220" height="80" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="390" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="#04342c">Lambda function</text>
<text x="390" y="124" text-anchor="middle" font-size="12" fill="#0f6e56">handler: file.function_name</text>
<text x="390" y="142" text-anchor="middle" font-size="12" fill="#0f6e56">source_code_hash tracks zip</text>
<line x1="230" y1="148" x2="278" y2="130" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="210" width="190" height="56" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="135" y="234" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c2c2a">Zipped code</text>
<text x="135" y="252" text-anchor="middle" font-size="12" fill="#444441">lambda_function.zip</text>
<line x1="230" y1="230" x2="300" y2="162" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="510" y="40" width="150" height="56" rx="8" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
<text x="585" y="62" text-anchor="middle" font-size="14" font-weight="bold" fill="#412402">EventBridge rule</text>
<text x="585" y="80" text-anchor="middle" font-size="12" fill="#633806">rate(5 minutes)</text>

<rect x="510" y="120" width="150" height="56" rx="8" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
<text x="585" y="142" text-anchor="middle" font-size="14" font-weight="bold" fill="#412402">EventBridge target</text>
<text x="585" y="160" text-anchor="middle" font-size="12" fill="#633806">targets Lambda function</text>
<line x1="585" y1="96" x2="585" y2="120" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="510" y1="148" x2="502" y2="130" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="510" y="200" width="150" height="56" rx="8" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
<text x="585" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="#412402">Lambda permission</text>
<text x="585" y="240" text-anchor="middle" font-size="12" fill="#633806">allows EventBridge invoke</text>
<line x1="502" y1="200" x2="440" y2="150" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<text x="340" y="320" text-anchor="middle" font-size="12" fill="#444441">Terraform provisions this once -- EventBridge, not Terraform, fires the schedule</text>
</svg>
