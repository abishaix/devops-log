<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" width="820" height="560" style="background:#ffffff;font-family:Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#A32D2D" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A1A2E">AWS Regions, Availability Zones &amp; High Availability</text>

  <!-- AWS Global box -->
  <rect x="20" y="38" width="780" height="490" rx="16" fill="#E6F1FB" fill-opacity="0.15" stroke="#185FA5" stroke-width="1.5"/>
  <text x="410" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#185FA5">AWS Global Infrastructure</text>
  <text x="410" y="78" text-anchor="middle" font-size="11" fill="#555">30%+ global cloud market share — largest network globally = low latency</text>

  <!-- Region: Mumbai -->
  <rect x="40" y="90" width="360" height="420" rx="12" fill="#E1F5EE" fill-opacity="0.4" stroke="#0F6E56" stroke-width="1.3"/>
  <text x="220" y="114" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Region: ap-south-1</text>
  <text x="220" y="130" text-anchor="middle" font-size="12" fill="#0F6E56">Mumbai, India</text>

  <!-- AZ 1a -->
  <rect x="60" y="148" width="148" height="340" rx="10" fill="#E1F5EE" fill-opacity="0.6" stroke="#0F6E56" stroke-width="1"/>
  <text x="134" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041">AZ: 1a</text>
  <text x="134" y="186" text-anchor="middle" font-size="11" fill="#0F6E56">data center(s)</text>

  <!-- EC2 in AZ 1a -->
  <rect x="74" y="202" width="120" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="134" y="224" text-anchor="middle" font-size="13" font-weight="bold" fill="#0C447C">EC2</text>
  <text x="134" y="240" text-anchor="middle" font-size="11" fill="#185FA5">Server A</text>

  <!-- HA label in 1a -->
  <rect x="74" y="272" width="120" height="196" rx="6" fill="#FFFEF0" stroke="#CCA800" stroke-width="0.8"/>
  <text x="134" y="294" text-anchor="middle" font-size="11" font-weight="bold" fill="#5A4800">If this AZ fails</text>
  <text x="134" y="312" text-anchor="middle" font-size="11" fill="#854F0B">Server A down</text>
  <text x="134" y="330" text-anchor="middle" font-size="11" fill="#854F0B">but Server B</text>
  <text x="134" y="348" text-anchor="middle" font-size="11" fill="#0F6E56">still running ✓</text>
  <text x="134" y="372" text-anchor="middle" font-size="11" fill="#854F0B">Application</text>
  <text x="134" y="390" text-anchor="middle" font-size="11" fill="#0F6E56">stays online ✓</text>
  <text x="134" y="416" text-anchor="middle" font-size="11" fill="#185FA5">= High</text>
  <text x="134" y="434" text-anchor="middle" font-size="11" fill="#185FA5">Availability</text>

  <!-- AZ 1b -->
  <rect x="232" y="148" width="148" height="340" rx="10" fill="#E1F5EE" fill-opacity="0.6" stroke="#0F6E56" stroke-width="1"/>
  <text x="306" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041">AZ: 1b</text>
  <text x="306" y="186" text-anchor="middle" font-size="11" fill="#0F6E56">data center(s)</text>

  <!-- EC2 in AZ 1b -->
  <rect x="246" y="202" width="120" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="306" y="224" text-anchor="middle" font-size="13" font-weight="bold" fill="#0C447C">EC2</text>
  <text x="306" y="240" text-anchor="middle" font-size="11" fill="#185FA5">Server B</text>

  <!-- HA green check in 1b -->
  <rect x="246" y="272" width="120" height="80" rx="6" fill="#E8F8E8" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="306" y="296" text-anchor="middle" font-size="11" font-weight="bold" fill="#085041">Stays up when</text>
  <text x="306" y="314" text-anchor="middle" font-size="11" fill="#085041">AZ-1a fails ✓</text>
  <text x="306" y="332" text-anchor="middle" font-size="11" fill="#0F6E56">Correct approach</text>

  <!-- HA arrow between AZs -->
  <line x1="210" y1="228" x2="244" y2="228" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ag)"/>
  <line x1="244" y1="240" x2="210" y2="240" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ag)"/>

  <!-- AZ 1c label -->
  <rect x="60" y="502" width="316" height="0" rx="0"/>
  <text x="220" y="500" text-anchor="middle" font-size="11" fill="#888">+ AZ: 1c (ap-south-1c) — third availability zone in Mumbai region</text>

  <!-- Region: Hyderabad -->
  <rect x="440" y="90" width="340" height="420" rx="12" fill="#FAECE7" fill-opacity="0.4" stroke="#993C1D" stroke-width="1.3"/>
  <text x="610" y="114" text-anchor="middle" font-size="14" font-weight="bold" fill="#712B13">Region: ap-south-2</text>
  <text x="610" y="130" text-anchor="middle" font-size="12" fill="#993C1D">Hyderabad, India</text>

  <!-- AZ 2a -->
  <rect x="460" y="148" width="140" height="180" rx="10" fill="#FAECE7" fill-opacity="0.6" stroke="#993C1D" stroke-width="1"/>
  <text x="530" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#712B13">AZ: 2a</text>
  <text x="530" y="186" text-anchor="middle" font-size="11" fill="#993C1D">data center(s)</text>
  <rect x="474" y="202" width="112" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="530" y="222" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">EC2</text>
  <text x="530" y="238" text-anchor="middle" font-size="11" fill="#5F5E5A">optional server</text>

  <!-- AZ 2b -->
  <rect x="620" y="148" width="140" height="180" rx="10" fill="#FAECE7" fill-opacity="0.6" stroke="#993C1D" stroke-width="1"/>
  <text x="690" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#712B13">AZ: 2b</text>
  <text x="690" y="186" text-anchor="middle" font-size="11" fill="#993C1D">data center(s)</text>

  <!-- AZ 2c -->
  <rect x="460" y="348" width="300" height="140" rx="10" fill="#FAECE7" fill-opacity="0.3" stroke="#993C1D" stroke-width="0.8"/>
  <text x="610" y="372" text-anchor="middle" font-size="13" font-weight="bold" fill="#712B13">AZ: 2c</text>
  <text x="610" y="390" text-anchor="middle" font-size="11" fill="#993C1D">data center(s)</text>

  <!-- Wrong approach box -->
  <rect x="460" y="408" width="300" height="60" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
  <text x="610" y="430" text-anchor="middle" font-size="12" font-weight="bold" fill="#791F1F">Wrong approach  X</text>
  <text x="610" y="450" text-anchor="middle" font-size="11" fill="#A32D2D">Both servers in same AZ → one failure = app down</text>

  <!-- Naming reference box -->
  <rect x="440" y="488" width="340" height="16" rx="4"/>
  <text x="610" y="500" text-anchor="middle" font-size="11" fill="#888">Pattern: [region]-[letter]  →  ap-south-2a, us-east-1a, eu-west-1b</text>

  <!-- Legend -->
  <rect x="20" y="536" width="780" height="20" rx="4" fill="#F5F5F5" stroke="#DDD" stroke-width="0.5"/>
  <rect x="40" y="543" width="12" height="8" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="60" y="551" font-size="11" fill="#333">Region (your selection)</text>
  <rect x="200" y="543" width="12" height="8" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="220" y="551" font-size="11" fill="#333">EC2 Instance (you create)</text>
  <rect x="400" y="543" width="12" height="8" rx="2" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
  <text x="420" y="551" font-size="11" fill="#333">Wrong (single AZ)</text>
  <rect x="560" y="543" width="12" height="8" rx="2" fill="#E8F8E8" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="580" y="551" font-size="11" fill="#333">Correct (multi-AZ HA)</text>
  <text x="740" y="551" font-size="11" fill="#888">Day 2  DevOps Bootcamp</text>
</svg>
