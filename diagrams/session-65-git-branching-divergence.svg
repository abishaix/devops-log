<svg xmlns="http://www.w3.org/2000/svg" width="920" height="760" style="background:#ffffff;font-family:Arial,sans-serif">
  <style>
    .title{font-size:19px;font-weight:bold;fill:#1a1a2e}
    .h{font-size:14px;font-weight:bold;fill:#16213e}
    .lbl{font-size:12px;fill:#333}
    .sm{font-size:11px;fill:#555}
    .mono{font-family:'Courier New',monospace;font-size:11px;fill:#0a3d62}
    .box{fill:#eef2f7;stroke:#4a69bd;stroke-width:1.5}
    .main{fill:#dff9fb;stroke:#22a6b3;stroke-width:1.5}
    .feat{fill:#f6e58d;stroke:#e1b12c;stroke-width:1.5}
    .commit{fill:#78e08f;stroke:#38ada9;stroke-width:1.5}
    .commitnew{fill:#f6b93b;stroke:#e58e26;stroke-width:1.5}
    .merge{fill:#e55039;stroke:#b71540;stroke-width:1.5}
    .arrow{stroke:#4a69bd;stroke-width:2;fill:none;marker-end:url(#a)}
    .arrowr{stroke:#e55039;stroke-width:2;fill:none;marker-end:url(#ar)}
  </style>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#4a69bd"/></marker>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#e55039"/></marker>
  </defs>

  <text x="30" y="32" class="title">Session 65 — Branching Workflow, Commit Divergence & Same-Line Conflicts</text>

  <!-- 1. same branch vs branching -->
  <text x="30" y="66" class="h">1. Same branch = 2 failure modes · Own branch = 1 failure mode</text>
  <rect x="30" y="80" width="410" height="86" class="box" rx="6"/>
  <text x="235" y="102" text-anchor="middle" class="lbl">Everyone on same branch</text>
  <text x="45" y="124" class="sm">• push blocked (commit divergence — you missed a commit)</text>
  <text x="45" y="144" class="sm">• conflict (same line changed by two people)</text>
  <text x="45" y="160" class="mono">two things can go wrong</text>

  <rect x="470" y="80" width="410" height="86" class="box" rx="6"/>
  <text x="675" y="102" text-anchor="middle" class="lbl">Each dev on own branch</text>
  <text x="485" y="124" class="sm">• push always succeeds — nobody else touches your branch</text>
  <text x="485" y="144" class="sm">• conflict only at PR/merge-to-main, same line only</text>
  <text x="485" y="160" class="mono">one thing can go wrong</text>

  <!-- 2. commit divergence -->
  <text x="30" y="204" class="h">2. Commit divergence — you committed file4 on top of an out-of-date local (missed file3)</text>
  <circle cx="80" cy="250" r="18" class="commit"/><text x="80" y="255" text-anchor="middle" class="sm">f1</text>
  <line x1="98" y1="250" x2="132" y2="250" class="arrow"/>
  <circle cx="150" cy="250" r="18" class="commit"/><text x="150" y="255" text-anchor="middle" class="sm">f2</text>
  <line x1="168" y1="242" x2="200" y2="222" class="arrow"/>
  <line x1="168" y1="258" x2="200" y2="278" class="arrow"/>
  <circle cx="220" cy="215" r="18" class="commitnew"/><text x="220" y="220" text-anchor="middle" class="sm">f3</text>
  <text x="248" y="220" class="sm">remote (you missed this)</text>
  <circle cx="220" cy="285" r="18" class="commitnew"/><text x="220" y="290" text-anchor="middle" class="sm">f4</text>
  <text x="248" y="290" class="sm">your local commit</text>
  <line x1="238" y1="215" x2="292" y2="245" class="arrow"/>
  <line x1="238" y1="285" x2="292" y2="255" class="arrow"/>
  <circle cx="312" cy="250" r="18" class="merge"/><text x="312" y="255" text-anchor="middle" class="sm">M</text>
  <text x="345" y="248" class="sm">git push blocked → git pull runs merge → merge commit M</text>
  <text x="345" y="266" class="sm">M contains ALL files (f1–f4). Then push succeeds.</text>

  <!-- 3. same line conflict -->
  <text x="30" y="330" class="h">3. Same-line conflict — even merge fails until you resolve</text>
  <rect x="30" y="344" width="850" height="120" class="box" rx="6"/>
  <text x="45" y="366" class="mono">base: port = 6000   (both start here)</text>
  <text x="45" y="388" class="mono">remote: 6000 → 7000   |   you: 6000 → 5000   (same line, diverged)</text>
  <text x="45" y="412" class="sm">git push fails (divergence). git merge ALSO fails — Git can't find 6000 to update; it's 5000 locally.</text>
  <text x="45" y="432" class="sm">Merge marks a conflict: incoming 7000 vs current 5000. A human decides the final value.</text>
  <text x="45" y="454" class="mono">resolve → git add → git commit → git push</text>

  <!-- 4. branching workflow -->
  <text x="30" y="502" class="h">4. Branching workflow — feature branch → PR → review → merge to main</text>
  <rect x="30" y="518" width="150" height="52" class="main" rx="6"/>
  <text x="105" y="540" text-anchor="middle" class="lbl">main (protected)</text>
  <text x="105" y="558" text-anchor="middle" class="sm">CI/CD integrated</text>

  <line x1="105" y1="570" x2="105" y2="600" class="arrow"/>
  <text x="115" y="590" class="mono">checkout -b dev</text>

  <rect x="30" y="602" width="150" height="52" class="feat" rx="6"/>
  <text x="105" y="624" text-anchor="middle" class="lbl">feature branch</text>
  <text x="105" y="642" text-anchor="middle" class="sm">your changes only</text>

  <line x1="180" y1="628" x2="250" y2="628" class="arrow"/>
  <text x="215" y="620" text-anchor="middle" class="mono">push</text>
  <rect x="250" y="602" width="150" height="52" class="box" rx="6"/>
  <text x="325" y="624" text-anchor="middle" class="lbl">Pull Request</text>
  <text x="325" y="642" text-anchor="middle" class="sm">dev → main</text>

  <line x1="400" y1="628" x2="470" y2="628" class="arrow"/>
  <text x="435" y="620" text-anchor="middle" class="sm">review</text>
  <rect x="470" y="602" width="160" height="52" class="box" rx="6"/>
  <text x="550" y="624" text-anchor="middle" class="lbl">N reviewers approve</text>
  <text x="550" y="642" text-anchor="middle" class="sm">branch protection rule</text>

  <line x1="630" y1="628" x2="700" y2="628" class="arrowr"/>
  <text x="665" y="620" text-anchor="middle" class="sm">merge</text>
  <rect x="700" y="602" width="180" height="52" class="main" rx="6"/>
  <text x="790" y="624" text-anchor="middle" class="lbl">main updated</text>
  <text x="790" y="642" text-anchor="middle" class="sm">only your line changes</text>

  <text x="30" y="678" class="sm">Merge applies only the PR's specific line change — it does not delete and re-add the whole file.</text>

  <!-- 5. environments -->
  <text x="30" y="712" class="h">5. Promote through environments (separate branch + separate AWS account each)</text>
  <rect x="30" y="724" width="180" height="28" class="box" rx="4"/><text x="120" y="743" text-anchor="middle" class="sm">dev (internal team, small)</text>
  <line x1="210" y1="738" x2="250" y2="738" class="arrow"/>
  <rect x="250" y="724" width="200" height="28" class="box" rx="4"/><text x="350" y="743" text-anchor="middle" class="sm">test (client/QA verify)</text>
  <line x1="450" y1="738" x2="490" y2="738" class="arrow"/>
  <rect x="490" y="724" width="220" height="28" class="main" rx="4"/><text x="600" y="743" text-anchor="middle" class="sm">prod (end users, high spec)</text>
</svg>
