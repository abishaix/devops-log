<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" width="820" height="580" style="background:#ffffff;font-family:Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A1A2E">EC2 Application Deployment — Nginx Web Server</text>

  <!-- User/Browser -->
  <rect x="20" y="40" width="160" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
  <text x="100" y="64" text-anchor="middle" font-size="14" font-weight="bold" fill="#0C447C">User / Browser</text>
  <text x="100" y="82" text-anchor="middle" font-size="12" fill="#185FA5">HTTP port 80</text>

  <!-- Internet -->
  <rect x="280" y="40" width="200" height="60" rx="30" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
  <text x="380" y="76" text-anchor="middle" font-size="15" font-weight="bold" fill="#0C447C">Internet</text>

  <!-- User to Internet -->
  <line x1="180" y1="70" x2="278" y2="70" stroke="#185FA5" stroke-width="1.3" marker-end="url(#ab)"/>

  <!-- IGW -->
  <rect x="280" y="130" width="200" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="380" y="152" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Internet Gateway</text>
  <text x="380" y="170" text-anchor="middle" font-size="12" fill="#0F6E56">VPC-level</text>

  <!-- Internet to IGW -->
  <line x1="380" y1="100" x2="380" y2="130" stroke="#555" stroke-width="1.3" marker-end="url(#a)" marker-start="url(#a)"/>

  <!-- VPC -->
  <rect x="20" y="210" width="780" height="340" rx="16" fill="#EEEDFE" fill-opacity="0.2" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="410" y="234" text-anchor="middle" font-size="14" font-weight="bold" fill="#3C3489">VPC</text>

  <!-- IGW to VPC -->
  <line x1="380" y1="182" x2="380" y2="210" stroke="#555" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- Public Subnet -->
  <rect x="40" y="244" width="500" height="284" rx="12" fill="#E1F5EE" fill-opacity="0.5" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="290" y="266" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Public Subnet</text>

  <!-- EC2 Instance box -->
  <rect x="60" y="282" width="460" height="224" rx="10" fill="#E6F1FB" fill-opacity="0.6" stroke="#185FA5" stroke-width="1.2"/>
  <text x="290" y="304" text-anchor="middle" font-size="14" font-weight="bold" fill="#0C447C">EC2 Instance</text>

  <!-- SG layer -->
  <rect x="80" y="318" width="420" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="290" y="339" text-anchor="middle" font-size="13" font-weight="bold" fill="#712B13">Security Group</text>
  <text x="290" y="357" text-anchor="middle" font-size="12" fill="#993C1D">Inbound: port 22 (SSH) + port 80 (HTTP)  — must open 80 for browser access</text>

  <!-- Nginx process -->
  <rect x="80" y="384" width="420" height="100" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="290" y="406" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Nginx Web Server (port 80)</text>
  <text x="290" y="424" text-anchor="middle" font-size="12" fill="#085041">yum install nginx -y</text>
  <text x="290" y="442" text-anchor="middle" font-size="12" fill="#085041">systemctl start nginx</text>
  <text x="290" y="460" text-anchor="middle" font-size="12" fill="#0F6E56">content path: /usr/share/nginx/html/index.html</text>

  <!-- HTTP request arrow down into EC2 -->
  <path d="M380 182 Q380 300 290 316" fill="none" stroke="#0F6E56" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#ag)"/>
  <text x="410" y="260" font-size="12" fill="#0F6E56" font-weight="bold">HTTP :80</text>

  <!-- Deploy flow (right side) -->
  <rect x="580" y="244" width="200" height="284" rx="12" fill="#FAEEDA" fill-opacity="0.5" stroke="#854F0B" stroke-width="1.2"/>
  <text x="680" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#633806">Deployment Steps</text>
  <text x="680" y="296" text-anchor="middle" font-size="12" fill="#854F0B">1. Create EC2</text>
  <text x="680" y="316" text-anchor="middle" font-size="12" fill="#854F0B">2. sudo su -</text>
  <text x="680" y="336" text-anchor="middle" font-size="12" fill="#854F0B">3. yum install nginx -y</text>
  <text x="680" y="356" text-anchor="middle" font-size="12" fill="#854F0B">4. systemctl start nginx</text>
  <text x="680" y="376" text-anchor="middle" font-size="12" fill="#854F0B">5. cd /usr/share/nginx/html</text>
  <text x="680" y="396" text-anchor="middle" font-size="12" fill="#854F0B">6. vi index.html → paste app</text>
  <text x="680" y="416" text-anchor="middle" font-size="12" fill="#854F0B">7. Open SG port 80</text>
  <text x="680" y="436" text-anchor="middle" font-size="12" fill="#854F0B">8. http://&lt;public-ip&gt;</text>

  <!-- yum repo note -->
  <rect x="20" y="460" width="240" height="72" rx="8" fill="#FFFEF0" stroke="#CCA800" stroke-width="1"/>
  <text x="140" y="480" text-anchor="middle" font-size="13" font-weight="bold" fill="#5A4800">yum repositories</text>
  <text x="140" y="498" text-anchor="middle" font-size="12" fill="#854F0B">Live outside VPC (internet)</text>
  <text x="140" y="516" text-anchor="middle" font-size="12" fill="#854F0B">Private servers need NAT</text>
  <text x="140" y="532" text-anchor="middle" font-size="12" fill="#854F0B">Public servers use IGW</text>

  <!-- Coming next: private + LB -->
  <rect x="280" y="462" width="280" height="68" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="420" y="484" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">Coming next</text>
  <text x="420" y="504" text-anchor="middle" font-size="12" fill="#5F5E5A">Load Balancer (public) →</text>
  <text x="420" y="522" text-anchor="middle" font-size="12" fill="#5F5E5A">Private EC2 (Nginx app)</text>

  <!-- Legend -->
  <rect x="20" y="558" width="780" height="18" rx="4" fill="#F5F5F5" stroke="#DDD" stroke-width="0.5"/>
  <line x1="40" y1="567" x2="70" y2="567" stroke="#0F6E56" stroke-width="1.8" stroke-dasharray="5 3"/>
  <text x="80" y="571" font-size="11" fill="#333">HTTP request flow</text>
  <line x1="220" y1="567" x2="250" y2="567" stroke="#854F0B" stroke-width="1.5"/>
  <text x="260" y="571" font-size="11" fill="#333">Deployment steps</text>
  <text x="600" y="571" font-size="11" fill="#888">Day 10  DevOps Bootcamp</text>
</svg>
