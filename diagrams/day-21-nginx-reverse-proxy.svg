<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" style="background:#ffffff;font-family:Arial,sans-serif">

  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#4a90d9"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#c0392b"/></marker>
  </defs>

  <!-- TITLE -->
  <text x="450" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Nginx Reverse Proxy — Frontend/Backend Architecture</text>

  <!-- CLIENT (outside VPC) -->
  <rect x="18" y="110" width="115" height="65" rx="8" fill="#ddeeff" stroke="#4a90d9" stroke-width="2"/>
  <text x="75" y="138" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Client</text>
  <text x="75" y="157" text-anchor="middle" font-size="11" fill="#555">Browser</text>

  <!-- Arrow: Client to Nginx EC2 -->
  <line x1="133" y1="142" x2="197" y2="142" stroke="#4a90d9" stroke-width="2" marker-end="url(#ab)"/>
  <text x="165" y="133" text-anchor="middle" font-size="10" fill="#4a90d9">HTTP :80</text>

  <!-- VPC box: y=55, h=430, bottom=485 -->
  <rect x="200" y="55" width="670" height="430" rx="12" fill="#f9f9ff" stroke="#9b59b6" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="218" y="76" font-size="12" fill="#9b59b6" font-weight="bold">VPC (10.0.0.0/16)</text>

  <!-- PUBLIC SUBNET: y=88, h=310, bottom=398 -->
  <rect x="220" y="88" width="270" height="310" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="355" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">Public Subnet</text>

  <!-- Nginx EC2: y=120, h=80, bottom=200 -->
  <rect x="248" y="120" width="214" height="80" rx="8" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="355" y="149" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Nginx EC2</text>
  <text x="355" y="168" text-anchor="middle" font-size="11" fill="#d5f5e3">Reverse Proxy  |  Port :80</text>

  <!-- Nginx IP labels: y=212, y=228 -->
  <text x="355" y="212" text-anchor="middle" font-size="10" fill="#333">Public IP: 13.x.x.x</text>
  <text x="355" y="228" text-anchor="middle" font-size="10" fill="#333">Private IP: 10.0.0.x</text>

  <!-- nginx.conf box: y=248, h=120, bottom=368 -->
  <rect x="248" y="248" width="214" height="120" rx="6" fill="#f0fff4" stroke="#27ae60" stroke-width="1"/>
  <text x="355" y="268" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e8449">nginx.conf</text>
  <text x="260" y="288" font-size="9" fill="#555">server {</text>
  <text x="260" y="303" font-size="9" fill="#555">  listen 80;</text>
  <text x="260" y="318" font-size="9" fill="#555">  location / {</text>
  <text x="260" y="333" font-size="9" fill="#c0392b">    proxy_pass http://10.0.1.x:5000;</text>
  <text x="260" y="348" font-size="9" fill="#555">  }</text>
  <text x="260" y="363" font-size="9" fill="#555">}</text>

  <!-- Arrow: Nginx to Backend, centered at y=160 -->
  <line x1="462" y1="160" x2="546" y2="160" stroke="#c0392b" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="504" y="149" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0392b">proxy_pass</text>
  <text x="504" y="175" text-anchor="middle" font-size="10" fill="#c0392b">port :5000</text>

  <!-- PRIVATE SUBNET: y=88, h=310, bottom=398 (same as public) -->
  <rect x="550" y="88" width="290" height="310" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="695" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#f39c12">Private Subnet</text>

  <!-- Backend EC2: y=120, h=80, bottom=200 (same as Nginx EC2) -->
  <rect x="578" y="120" width="234" height="80" rx="8" fill="#e67e22" stroke="#d35400" stroke-width="2"/>
  <text x="695" y="149" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Backend EC2</text>
  <text x="695" y="168" text-anchor="middle" font-size="11" fill="#fdebd0">Python Flask  |  Port :5000</text>

  <!-- Backend IP labels: y=212, y=228 (same as Nginx labels) -->
  <text x="695" y="212" text-anchor="middle" font-size="10" fill="#333">No Public IP</text>
  <text x="695" y="228" text-anchor="middle" font-size="10" fill="#333">Private IP: 10.0.1.x</text>

  <!-- app.py box: y=248, h=120, bottom=368 (same as nginx.conf) -->
  <rect x="578" y="248" width="234" height="120" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="695" y="268" text-anchor="middle" font-size="10" font-weight="bold" fill="#d35400">app.py</text>
  <text x="590" y="288" font-size="9" fill="#555">from flask import Flask</text>
  <text x="590" y="303" font-size="9" fill="#555">app = Flask(__name__)</text>
  <text x="590" y="318" font-size="9" fill="#555">@app.route('/message')</text>
  <text x="590" y="333" font-size="9" fill="#555">def hello():</text>
  <text x="590" y="348" font-size="9" fill="#555">  return "Hello from backend"</text>
  <text x="590" y="363" font-size="9" fill="#555">app.run(port=5000)</text>

  <!-- CANNOT REACH line: y=415, below subnets (end at 398), inside VPC (ends at 485) -->
  <line x1="133" y1="415" x2="858" y2="415" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="496" y="433" text-anchor="middle" font-size="10" fill="#e74c3c">&#10060;  Browser CANNOT reach private IP — client is outside VPC</text>

  <!-- KEY TAKEAWAY: y=500, outside VPC (ends at 485) -->
  <rect x="200" y="500" width="670" height="84" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1.5"/>
  <text x="535" y="520" text-anchor="middle" font-size="11" font-weight="bold" fill="#222">Key Takeaway</text>
  <text x="215" y="538" font-size="10" fill="#27ae60">&#10003;  Browser calls Nginx public IP &#8594; proxy_pass &#8594; Backend private IP &#8594; response back</text>
  <text x="215" y="555" font-size="10" fill="#e74c3c">&#10007;  Browser calls Backend private IP directly &#8594; BLOCKED (not reachable outside VPC)</text>
  <text x="215" y="572" font-size="10" fill="#27ae60">&#10003;  Nginx EC2 &#8596; Backend EC2 talk freely via private IPs (same VPC, local route)</text>

</svg>
