<svg width="100%" viewBox="0 0 680 480" role="img">
<title>Lab 06 — Path-based routing with ALB</title>
<desc>ALB receiving HTTP traffic on port 80 and routing to 4 target groups based on URL path, all pointing to a single EC2 instance running nginx</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- VPC container -->
<rect x="20" y="20" width="640" height="440" rx="16" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" x="36" y="44" fill="#185FA5">VPC</text>

<!-- User -->
<rect x="30" y="200" width="80" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="70" y="218" text-anchor="middle" fill="#27500A">User</text>
<text font-family="sans-serif" font-size="12" x="70" y="234" text-anchor="middle" fill="#3B6D11">HTTP :80</text>

<!-- Arrow: User to ALB -->
<line x1="110" y1="222" x2="158" y2="222" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)" fill="none"/>

<!-- ALB -->
<rect x="160" y="196" width="100" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="210" y="217" text-anchor="middle" fill="#3C3489">ALB</text>
<text font-family="sans-serif" font-size="12" x="210" y="233" text-anchor="middle" fill="#534AB7">listener rules</text>
<text font-family="sans-serif" font-size="12" x="210" y="246" text-anchor="middle" fill="#534AB7">priority order</text>

<!-- Arrows: ALB to TGs -->
<path d="M260 210 L320 100" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<path d="M260 215 L320 180" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<path d="M260 222 L320 260" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<path d="M260 228 L320 340" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- TG-01 default -->
<rect x="320" y="75" width="140" height="50" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="390" y="96" text-anchor="middle" fill="#633806">tg-01</text>
<text font-family="sans-serif" font-size="12" x="390" y="114" text-anchor="middle" fill="#854F0B">/ (default) · port 80</text>

<!-- TG-2 burgers -->
<rect x="320" y="155" width="140" height="50" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="390" y="176" text-anchor="middle" fill="#712B13">tg-2</text>
<text font-family="sans-serif" font-size="12" x="390" y="194" text-anchor="middle" fill="#993C1D">/burgers* · port 80</text>

<!-- TG-03 pizza -->
<rect x="320" y="235" width="140" height="50" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="390" y="256" text-anchor="middle" fill="#085041">tg-03</text>
<text font-family="sans-serif" font-size="12" x="390" y="274" text-anchor="middle" fill="#0F6E56">/pizza · port 80</text>

<!-- TG-04 drinks -->
<rect x="320" y="315" width="140" height="50" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="390" y="336" text-anchor="middle" fill="#3C3489">tg-04</text>
<text font-family="sans-serif" font-size="12" x="390" y="354" text-anchor="middle" fill="#534AB7">/drinks* · port 80</text>

<!-- Arrows: TGs to EC2 -->
<path d="M460 100 L520 200" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<path d="M460 180 L520 215" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<path d="M460 260 L520 230" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<path d="M460 340 L520 248" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- EC2 -->
<rect x="520" y="170" width="130" height="100" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="585" y="196" text-anchor="middle" fill="#444441">EC2 app-home</text>
<text font-family="sans-serif" font-size="12" x="585" y="212" text-anchor="middle" fill="#5F5E5A">nginx · port 80</text>
<text font-family="sans-serif" font-size="12" x="585" y="228" text-anchor="middle" fill="#5F5E5A">/index.html</text>
<text font-family="sans-serif" font-size="12" x="585" y="244" text-anchor="middle" fill="#5F5E5A">/burgers/index.html</text>
<text font-family="sans-serif" font-size="12" x="585" y="260" text-anchor="middle" fill="#5F5E5A">/pizza /drinks</text>

<!-- Dev SSH -->
<rect x="30" y="380" width="80" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="70" y="399" text-anchor="middle" fill="#27500A">Dev</text>
<text font-family="sans-serif" font-size="12" x="70" y="415" text-anchor="middle" fill="#3B6D11">SSH :22</text>

<path d="M110 402 L520 300" fill="none" stroke="#3B6D11" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="11" x="300" y="370" text-anchor="middle" fill="#3B6D11">via bastion (not shown)</text>

<!-- GitHub Pages note -->
<rect x="160" y="400" width="200" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" x="260" y="419" text-anchor="middle" fill="#085041">GitHub Pages</text>
<text font-family="sans-serif" font-size="11" x="260" y="435" text-anchor="middle" fill="#0F6E56">abishaix.github.io/devops-log/</text>

</svg>
