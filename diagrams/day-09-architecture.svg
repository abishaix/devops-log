<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" width="820" height="580" style="background:#ffffff;font-family:Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="am" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#A32D2D" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A1A2E">NAT Gateway — Address Translation &amp; Port Allocation</text>

  <!-- Internet -->
  <rect x="300" y="36" width="200" height="44" rx="22" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
  <text x="400" y="64" text-anchor="middle" font-size="15" font-weight="bold" fill="#0C447C">Internet</text>

  <!-- Hacker -->
  <rect x="640" y="32" width="160" height="52" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
  <text x="720" y="52" text-anchor="middle" font-size="14" font-weight="bold" fill="#791F1F">Hacker</text>
  <text x="720" y="70" text-anchor="middle" font-size="12" fill="#A32D2D">192.1.3.0</text>
  <line x1="640" y1="58" x2="566" y2="100" stroke="#A32D2D" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#ar)"/>
  <text x="630" y="72" text-anchor="middle" font-size="11" fill="#A32D2D">NAT drops it — X</text>
  <text x="630" y="86" text-anchor="middle" font-size="11" fill="#A32D2D">unknown IP</text>

  <!-- IGW -->
  <rect x="160" y="96" width="200" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="260" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Internet Gateway</text>
  <text x="260" y="136" text-anchor="middle" font-size="12" fill="#0F6E56">stateless — allows all</text>

  <!-- NAT -->
  <rect x="440" y="96" width="200" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
  <text x="540" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#633806">NAT Gateway</text>
  <text x="540" y="136" text-anchor="middle" font-size="12" fill="#854F0B">174.2.3.5 — stateful</text>

  <!-- Internet to IGW -->
  <line x1="360" y1="58" x2="308" y2="96" stroke="#185FA5" stroke-width="1.3" marker-end="url(#a)"/>
  <!-- IGW to internet response -->
  <line x1="294" y1="96" x2="346" y2="60" stroke="#185FA5" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#a)"/>
  <!-- Internet to NAT -->
  <line x1="440" y1="58" x2="494" y2="96" stroke="#854F0B" stroke-width="1.3" marker-end="url(#am)"/>
  <!-- NAT to internet response -->
  <line x1="508" y1="96" x2="456" y2="62" stroke="#854F0B" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#am)"/>

  <!-- VPC -->
  <rect x="20" y="180" width="780" height="360" rx="16" fill="#EEEDFE" fill-opacity="0.2" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="410" y="204" text-anchor="middle" font-size="14" font-weight="bold" fill="#3C3489">VPC  10.0.0.0/16</text>

  <!-- Public Subnet -->
  <rect x="40" y="216" width="340" height="304" rx="10" fill="#E1F5EE" fill-opacity="0.5" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="210" y="238" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Public Subnet  10.0.0.0/24</text>
  <text x="210" y="254" text-anchor="middle" font-size="12" fill="#0F6E56">RT: 0.0.0.0/0 to IGW</text>

  <!-- Private Subnet -->
  <rect x="440" y="216" width="340" height="304" rx="10" fill="#FAECE7" fill-opacity="0.4" stroke="#993C1D" stroke-width="1.2"/>
  <text x="610" y="238" text-anchor="middle" font-size="14" font-weight="bold" fill="#712B13">Private Subnet  10.0.1.0/24</text>
  <text x="610" y="254" text-anchor="middle" font-size="12" fill="#993C1D">RT: 0.0.0.0/0 to NAT Gateway</text>

  <!-- NAT in public subnet -->
  <rect x="60" y="270" width="300" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
  <text x="210" y="293" text-anchor="middle" font-size="14" font-weight="bold" fill="#633806">NAT Gateway (174.2.3.5)</text>
  <text x="210" y="311" text-anchor="middle" font-size="12" fill="#854F0B">Sits in public subnet — needs internet</text>

  <!-- Private EC2 Server A -->
  <rect x="460" y="270" width="300" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="610" y="293" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C2C2A">Server A  (10.0.1.4)</text>
  <text x="610" y="311" text-anchor="middle" font-size="12" fill="#5F5E5A">outbound to facebook.com:443</text>

  <!-- Private EC2 Server B -->
  <rect x="460" y="348" width="300" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="610" y="371" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C2C2A">Server B  (10.0.1.15)</text>
  <text x="610" y="389" text-anchor="middle" font-size="12" fill="#5F5E5A">outbound to google.com:443</text>

  <!-- NAT translation table -->
  <rect x="60" y="352" width="300" height="140" rx="8" fill="#FFFEF0" stroke="#CCA800" stroke-width="1"/>
  <text x="210" y="374" text-anchor="middle" font-size="13" font-weight="bold" fill="#5A4800">NAT Translation Table</text>
  <line x1="80" y1="380" x2="340" y2="380" stroke="#DDD" stroke-width="0.8"/>
  <text x="210" y="396" text-anchor="middle" font-size="11" fill="#666">Private IP:Port</text>
  <text x="210" y="414" text-anchor="middle" font-size="12" fill="#333">10.0.1.4:54231  to  174.2.3.5:54231</text>
  <text x="210" y="432" text-anchor="middle" font-size="12" fill="#333">10.0.1.15:54232  to  174.2.3.5:54232</text>
  <text x="210" y="452" text-anchor="middle" font-size="11" fill="#854F0B">Port number = unique session key</text>
  <text x="210" y="468" text-anchor="middle" font-size="11" fill="#854F0B">No conflict across servers</text>

  <!-- Server A to NAT arrow -->
  <line x1="458" y1="298" x2="362" y2="298" stroke="#854F0B" stroke-width="1.5" marker-end="url(#am)"/>
  <text x="410" y="288" text-anchor="middle" font-size="11" fill="#854F0B">port 54231</text>

  <!-- Server B to NAT arrow -->
  <line x1="458" y1="376" x2="362" y2="420" stroke="#854F0B" stroke-width="1.5" marker-end="url(#am)"/>
  <text x="432" y="406" text-anchor="middle" font-size="11" fill="#854F0B">port 54232</text>

  <!-- Private IPs never leave VPC label -->
  <rect x="60" y="512" width="700" height="32" rx="6" fill="#E8F8E8" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="410" y="532" text-anchor="middle" font-size="13" fill="#085041" font-weight="bold">Private IPs never leave the VPC — NAT uses 174.2.3.5 on their behalf</text>

  <!-- Legend -->
  <rect x="20" y="552" width="780" height="22" rx="4" fill="#F5F5F5" stroke="#DDD" stroke-width="0.5"/>
  <line x1="40" y1="563" x2="70" y2="563" stroke="#854F0B" stroke-width="1.5" marker-end="url(#am)"/>
  <text x="80" y="567" font-size="11" fill="#333">Outbound (NAT)</text>
  <line x1="220" y1="563" x2="250" y2="563" stroke="#A32D2D" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="260" y="567" font-size="11" fill="#333">Blocked by NAT</text>
  <text x="580" y="567" font-size="11" fill="#888">Day 9  DevOps Bootcamp</text>
</svg>
