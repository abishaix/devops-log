<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" style="background:#ffffff;font-family:Arial,sans-serif">
  <style>
    .title{font-size:20px;font-weight:bold;fill:#1a1a2e}
    .h{font-size:14px;font-weight:bold;fill:#16213e}
    .lbl{font-size:12px;fill:#333}
    .sm{font-size:11px;fill:#555}
    .mono{font-family:'Courier New',monospace;font-size:11px;fill:#0a3d62}
    .box{fill:#eef2f7;stroke:#4a69bd;stroke-width:1.5}
    .commit{fill:#78e08f;stroke:#38ada9;stroke-width:1.5}
    .commitnew{fill:#f6b93b;stroke:#e58e26;stroke-width:1.5}
    .commitmerge{fill:#e55039;stroke:#b71540;stroke-width:1.5}
    .arrow{stroke:#4a69bd;stroke-width:2;fill:none;marker-end:url(#a)}
    .arrowr{stroke:#e55039;stroke-width:2;fill:none;marker-end:url(#ar)}
  </style>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#4a69bd"/></marker>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#e55039"/></marker>
  </defs>

  <text x="30" y="34" class="title">Session 66 — git pull / fetch, fast-forward vs merge commit, reset vs revert</text>

  <!-- fetch vs pull -->
  <text x="30" y="72" class="h">1. git pull = git fetch + git merge</text>
  <rect x="30" y="86" width="180" height="70" class="box" rx="6"/>
  <text x="120" y="112" text-anchor="middle" class="lbl">Remote repo</text>
  <text x="120" y="132" text-anchor="middle" class="sm">has new commit C</text>

  <line x1="210" y1="121" x2="310" y2="121" class="arrow"/>
  <text x="260" y="112" text-anchor="middle" class="mono">fetch</text>

  <rect x="310" y="86" width="200" height="70" class="box" rx="6"/>
  <text x="410" y="108" text-anchor="middle" class="lbl">Local repo (.git)</text>
  <text x="410" y="128" text-anchor="middle" class="sm">commit info updated</text>
  <text x="410" y="146" text-anchor="middle" class="sm">working files NOT yet</text>

  <line x1="510" y1="121" x2="610" y2="121" class="arrow"/>
  <text x="560" y="112" text-anchor="middle" class="mono">merge</text>

  <rect x="610" y="86" width="200" height="70" class="box" rx="6"/>
  <text x="710" y="108" text-anchor="middle" class="lbl">Working directory</text>
  <text x="710" y="128" text-anchor="middle" class="sm">files now updated</text>
  <text x="710" y="146" text-anchor="middle" class="sm">(pull does both steps)</text>

  <!-- fast forward -->
  <text x="30" y="206" class="h">2a. Fast-forward (in sync — pointer just slides forward)</text>
  <circle cx="80" cy="250" r="20" class="commit"/><text x="80" y="255" text-anchor="middle" class="lbl">A</text>
  <line x1="100" y1="250" x2="140" y2="250" class="arrow"/>
  <circle cx="160" cy="250" r="20" class="commit"/><text x="160" y="255" text-anchor="middle" class="lbl">B</text>
  <line x1="180" y1="250" x2="220" y2="250" class="arrow"/>
  <circle cx="240" cy="250" r="20" class="commitnew"/><text x="240" y="255" text-anchor="middle" class="lbl">C</text>
  <text x="330" y="255" class="sm">no extra commit — linear history</text>

  <!-- merge commit -->
  <text x="30" y="316" class="h">2b. Merge commit (you missed B — Git reconciles rather than dropping it)</text>
  <circle cx="80" cy="380" r="20" class="commit"/><text x="80" y="385" text-anchor="middle" class="lbl">A</text>
  <line x1="100" y1="372" x2="140" y2="352" class="arrow"/>
  <line x1="100" y1="388" x2="140" y2="408" class="arrow"/>
  <circle cx="160" cy="345" r="20" class="commitnew"/><text x="160" y="350" text-anchor="middle" class="lbl">B</text>
  <circle cx="160" cy="415" r="20" class="commitnew"/><text x="160" y="420" text-anchor="middle" class="lbl">C</text>
  <line x1="180" y1="345" x2="228" y2="372" class="arrow"/>
  <line x1="180" y1="415" x2="228" y2="388" class="arrow"/>
  <circle cx="250" cy="380" r="20" class="commitmerge"/><text x="250" y="385" text-anchor="middle" class="lbl">D</text>
  <text x="330" y="385" class="sm">D = merge commit joining both lines</text>

  <!-- reset vs revert -->
  <text x="30" y="470" class="h">3. reset (rewrites history) vs revert (adds history)</text>

  <rect x="30" y="486" width="400" height="110" class="box" rx="6"/>
  <text x="230" y="508" text-anchor="middle" class="lbl">git reset HEAD~1</text>
  <text x="45" y="530" class="mono">--soft   → changes back in STAGING</text>
  <text x="45" y="550" class="mono">--mixed  → changes back in WORKING DIR (default)</text>
  <text x="45" y="570" class="mono">--hard   → changes DELETED entirely</text>
  <text x="45" y="590" class="sm">no history left · not for pushed/shared work</text>

  <rect x="470" y="486" width="400" height="110" class="box" rx="6"/>
  <text x="670" y="508" text-anchor="middle" class="lbl">git revert &lt;commit&gt;</text>
  <text x="485" y="532" class="sm">creates a NEW commit that undoes the target</text>
  <text x="485" y="552" class="sm">original commit stays — full history preserved</text>
  <text x="485" y="572" class="sm">revert of a revert = another commit flipping back</text>
  <text x="485" y="590" class="mono">safe for anything already pushed</text>
</svg>
