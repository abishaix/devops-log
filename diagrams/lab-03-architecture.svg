<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" width="900" height="660" style="background:#ffffff;font-family:Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ao" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1A1A2E">Lab 3 — ALB + Target Group + Failover  |  ap-south-1</text>

  <!-- User -->
  <rect x="20" y="36" width="130" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
  <text x="85" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#0C447C">User</text>
  <text x="85" y="76" text-anchor="middle" font-size="11" fill="#185FA5">HTTP port 80</text>

  <!-- Developer -->
  <rect x="740" y="36" width="140" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="810" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">Developer</text>
  <text x="810" y="76" text-anchor="middle" font-size="11" fill="#5F5E5A">SSH port 22</text>

  <!-- IGW -->
  <rect x="340" y="36" width="220" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="450" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041">Internet Gateway</text>
  <text x="450" y="76" text-anchor="middle" font-size="11" fill="#0F6E56">dmo-igw — attached to dmo-vpc</text>

  <!-- User → IGW -->
  <line x1="150" y1="62" x2="338" y2="62" stroke="#185FA5" stroke-width="1.3" marker-end="url(#ab)"/>
  <!-- Dev → IGW -->
  <line x1="740" y1="62" x2="562" y2="62" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)"/>

  <!-- IGW → VPC -->
  <line x1="450" y1="88" x2="450" y2="112" stroke="#555" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- VPC -->
  <rect x="20" y="112" width="860" height="528" rx="16" fill="#EEEDFE" fill-opacity="0.12" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="450" y="136" text-anchor="middle" font-size="13" font-weight="bold" fill="#3C3489">VPC — dmo-vpc  (10.0.0.0/16)</text>

  <!-- LB spanning both public subnets -->
  <rect x="200" y="152" width="500" height="60" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
  <text x="450" y="176" text-anchor="middle" font-size="14" font-weight="bold" fill="#633806">Application Load Balancer — lb-listener</text>
  <text x="450" y="196" text-anchor="middle" font-size="11" fill="#854F0B">Internet-facing  |  HTTP:80  |  spans ap-south-1a + ap-south-1b  |  DNS: lb-listener-491807758.ap-south-1.elb.amazonaws.com</text>

  <!-- IGW → LB -->
  <line x1="450" y1="112" x2="450" y2="152" stroke="#854F0B" stroke-width="1.5" marker-end="url(#ao)"/>

  <!-- AZ 1a -->
  <rect x="40" y="232" width="380" height="390" rx="12" fill="#E1F5EE" fill-opacity="0.3" stroke="#0F6E56" stroke-width="1.2" stroke-dasharray="6 3"/>
  <text x="230" y="254" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041">Availability Zone — ap-south-1a</text>

  <!-- AZ 1b -->
  <rect x="480" y="232" width="380" height="390" rx="12" fill="#FAECE7" fill-opacity="0.3" stroke="#993C1D" stroke-width="1.2" stroke-dasharray="6 3"/>
  <text x="670" y="254" text-anchor="middle" font-size="13" font-weight="bold" fill="#712B13">Availability Zone — ap-south-1b</text>

  <!-- Public Subnet 1a -->
  <rect x="60" y="268" width="340" height="160" rx="10" fill="#E1F5EE" fill-opacity="0.5" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="230" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">Public Subnet 1a — 10.0.0.0/20</text>
  <text x="230" y="306" text-anchor="middle" font-size="10" fill="#0F6E56">RT: 0.0.0.0/0 → dmo-igw</text>

  <!-- Bastion -->
  <rect x="78" y="318" width="140" height="90" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="148" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C447C">Bastion Host</text>
  <text x="148" y="358" text-anchor="middle" font-size="11" fill="#185FA5">bastion-host</text>
  <text x="148" y="374" text-anchor="middle" font-size="11" fill="#185FA5">t3.micro</text>
  <text x="148" y="390" text-anchor="middle" font-size="10" fill="#185FA5">3.109.144.16 (public)</text>

  <!-- NAT -->
  <rect x="240" y="318" width="140" height="90" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="310" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#633806">NAT Gateway</text>
  <text x="310" y="358" text-anchor="middle" font-size="11" fill="#854F0B">dmo-regional-nat</text>
  <text x="310" y="374" text-anchor="middle" font-size="11" fill="#854F0B">Regional mode</text>
  <text x="310" y="390" text-anchor="middle" font-size="10" fill="#854F0B">35.154.230.94 (EIP)</text>

  <!-- Public Subnet 1b -->
  <rect x="500" y="268" width="340" height="160" rx="10" fill="#FAECE7" fill-opacity="0.4" stroke="#993C1D" stroke-width="1.2"/>
  <text x="670" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="#712B13">Public Subnet 1b — 10.0.16.0/20</text>
  <text x="670" y="306" text-anchor="middle" font-size="10" fill="#993C1D">RT: 0.0.0.0/0 → dmo-igw</text>
  <text x="670" y="370" text-anchor="middle" font-size="11" fill="#993C1D">(LB node in this subnet)</text>
  <text x="670" y="390" text-anchor="middle" font-size="10" fill="#993C1D">EIP: 3.7.121.192</text>

  <!-- LB → public subnets (arrows down) -->
  <line x1="310" y1="212" x2="230" y2="268" stroke="#854F0B" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ao)"/>
  <line x1="590" y1="212" x2="670" y2="268" stroke="#854F0B" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ao)"/>

  <!-- TARGET GROUP -->
  <rect x="310" y="450" width="280" height="60" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.3"/>
  <text x="450" y="474" text-anchor="middle" font-size="13" font-weight="bold" fill="#3C3489">Target Group — tg01</text>
  <text x="450" y="492" text-anchor="middle" font-size="11" fill="#534AB7">HTTP:80  |  myApp-3 + myApp-4  |  2 Healthy</text>

  <!-- LB → TG -->
  <line x1="450" y1="212" x2="450" y2="450" stroke="#854F0B" stroke-width="1.8" marker-end="url(#ao)"/>

  <!-- Private Subnet 1a -->
  <rect x="60" y="448" width="230" height="160" rx="10" fill="#E6F1FB" fill-opacity="0.4" stroke="#185FA5" stroke-width="1.2"/>
  <text x="175" y="468" text-anchor="middle" font-size="11" font-weight="bold" fill="#0C447C">Private Subnet 1a — 10.0.128.0/20</text>
  <text x="175" y="482" text-anchor="middle" font-size="10" fill="#185FA5">RT: 0.0.0.0/0 → NAT</text>

  <!-- myApp-3 -->
  <rect x="78" y="492" width="194" height="100" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="175" y="514" text-anchor="middle" font-size="13" font-weight="bold" fill="#0C447C">myApp-3</text>
  <text x="175" y="532" text-anchor="middle" font-size="11" fill="#185FA5">t3.micro — Nginx:80</text>
  <text x="175" y="550" text-anchor="middle" font-size="11" fill="#0F6E56">✅ Healthy</text>
  <text x="175" y="568" text-anchor="middle" font-size="10" fill="#185FA5">No public IP</text>

  <!-- Private Subnet 1b -->
  <rect x="610" y="448" width="230" height="160" rx="10" fill="#FAECE7" fill-opacity="0.4" stroke="#993C1D" stroke-width="1.2"/>
  <text x="725" y="468" text-anchor="middle" font-size="11" font-weight="bold" fill="#712B13">Private Subnet 1b — 10.0.144.0/20</text>
  <text x="725" y="482" text-anchor="middle" font-size="10" fill="#993C1D">RT: 0.0.0.0/0 → NAT</text>

  <!-- myApp-4 -->
  <rect x="628" y="492" width="194" height="100" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="725" y="514" text-anchor="middle" font-size="13" font-weight="bold" fill="#712B13">myApp-4</text>
  <text x="725" y="532" text-anchor="middle" font-size="11" fill="#993C1D">t3.micro — Nginx:80</text>
  <text x="725" y="550" text-anchor="middle" font-size="11" fill="#0F6E56">✅ Healthy</text>
  <text x="725" y="568" text-anchor="middle" font-size="10" fill="#993C1D">No public IP</text>

  <!-- TG → App3 -->
  <path d="M380 510 L272 542" fill="none" stroke="#854F0B" stroke-width="1.8" marker-end="url(#ao)"/>
  <!-- TG → App4 -->
  <path d="M520 510 L628 542" fill="none" stroke="#854F0B" stroke-width="1.8" marker-end="url(#ao)"/>

  <!-- Round robin label -->
  <text x="450" y="548" text-anchor="middle" font-size="11" fill="#854F0B">round robin</text>

  <!-- Bastion → App3 SSH -->
  <path d="M148 408 L148 490" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)"/>

  <!-- Dev → Bastion -->
  <path d="M810 88 Q810 340 290 340" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#a)"/>

  <!-- Failover note -->
  <rect x="340" y="608" width="220" height="24" rx="6" fill="#FCE8E8" stroke="#A32D2D" stroke-width="0.8"/>
  <text x="450" y="624" text-anchor="middle" font-size="11" fill="#791F1F">Failover tested: stop nginx → 1 Healthy / 1 Unhealthy ✓</text>

  <!-- Legend -->
  <rect x="20" y="636" width="860" height="18" rx="4" fill="#F5F5F5" stroke="#DDD" stroke-width="0.5"/>
  <line x1="40" y1="645" x2="66" y2="645" stroke="#185FA5" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="76" y="649" font-size="11" fill="#333">User traffic</text>
  <line x1="180" y1="645" x2="206" y2="645" stroke="#854F0B" stroke-width="1.8" marker-end="url(#ao)"/>
  <text x="216" y="649" font-size="11" fill="#333">LB routing</text>
  <line x1="320" y1="645" x2="346" y2="645" stroke="#555" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="356" y="649" font-size="11" fill="#333">Admin SSH</text>
  <text x="600" y="649" font-size="11" fill="#888">Lab 3  |  DevOps Bootcamp  |  ap-south-1  |  April 30 2026</text>
</svg>
