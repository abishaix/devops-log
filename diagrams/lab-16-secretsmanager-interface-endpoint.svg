<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" style="background:#ffffff;font-family:Arial,sans-serif">
  <style>
    .title{font-size:18px;font-weight:bold;fill:#232f3e}
    .vpclbl{font-size:13px;font-weight:bold;fill:#1a73e8}
    .sublbl{font-size:11px;font-weight:bold;fill:#3f6212}
    .node{font-size:12px;font-weight:bold;fill:#ffffff}
    .nodesub{font-size:10px;fill:#ffffff}
    .rt{font-size:10px;fill:#7c2d12;font-weight:bold}
    .flow{font-size:10px;fill:#b91c1c;font-weight:bold}
    .dns{font-size:10px;fill:#7c3aed;font-weight:bold}
    .note{font-size:10px;fill:#444}
  </style>

  <text x="30" y="32" class="title">lab-16 Part 2b — Secrets Manager via Interface Endpoint (ENI, no route table)</text>

  <!-- User -->
  <rect x="20" y="185" width="80" height="50" rx="6" fill="#475569"/>
  <text x="60" y="207" text-anchor="middle" class="node">User</text>
  <text x="60" y="221" text-anchor="middle" class="nodesub">console</text>

  <!-- AWS Cloud -->
  <rect x="115" y="55" width="660" height="420" rx="12" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6"/>
  <text x="130" y="74" style="font-size:11px;font-weight:bold;fill:#b45309">AWS Cloud</text>

  <!-- Region -->
  <rect x="128" y="82" width="635" height="378" rx="10" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="142" y="100" style="font-size:11px;font-weight:bold;fill:#0891b2">us-west-2 / Oregon</text>

  <!-- VPC -->
  <rect x="142" y="108" width="420" height="330" rx="10" fill="none" stroke="#1a73e8" stroke-width="2"/>
  <text x="158" y="127" class="vpclbl">VPC  10.0.0.0/24  (mod1-vpc)</text>

  <!-- Public subnet -->
  <rect x="158" y="136" width="170" height="85" rx="8" fill="#eef6ff" stroke="#3b82f6" stroke-dasharray="4"/>
  <text x="170" y="153" class="sublbl">Public Subnet</text>
  <rect x="178" y="162" width="130" height="46" rx="6" fill="#dd6b20"/>
  <text x="243" y="182" text-anchor="middle" class="node">Bastion</text>
  <text x="243" y="196" text-anchor="middle" class="nodesub">35.93.224.251</text>

  <!-- IGW -->
  <rect x="350" y="136" width="120" height="46" rx="8" fill="#0369a1"/>
  <text x="410" y="156" text-anchor="middle" class="node">IGW</text>
  <text x="410" y="170" text-anchor="middle" class="nodesub">bastion only</text>

  <!-- Private subnet -->
  <rect x="158" y="238" width="385" height="185" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-dasharray="4"/>
  <text x="170" y="256" class="sublbl">Private Subnet  10.0.128.0/20</text>

  <!-- EC2 -->
  <rect x="175" y="268" width="130" height="58" rx="6" fill="#16a34a"/>
  <text x="240" y="293" text-anchor="middle" class="node">ec2-private</text>
  <text x="240" y="309" text-anchor="middle" class="nodesub">10.0.140.142</text>

  <!-- ENI -->
  <rect x="320" y="268" width="100" height="58" rx="6" fill="#be185d"/>
  <text x="370" y="291" text-anchor="middle" class="node">ENI</text>
  <text x="370" y="307" text-anchor="middle" class="nodesub">10.0.136.123</text>

  <!-- IAM role note -->
  <rect x="175" y="345" width="230" height="62" rx="6" fill="#fdf4ff" stroke="#9333ea"/>
  <text x="185" y="363" style="font-size:10px;font-weight:bold;fill:#7e22ce">IAM Role (ec2-s3-access)</text>
  <text x="185" y="379" style="font-size:9px;fill:#444">SecretsManagerReadWrite</text>
  <text x="185" y="393" style="font-size:9px;fill:#444">STS temp credentials — no keys on disk</text>

  <!-- Route table (greyed out) -->
  <rect x="430" y="238" width="120" height="60" rx="6" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="490" y="260" text-anchor="middle" style="font-size:10px;fill:#9ca3af;font-weight:bold">Route Table</text>
  <text x="490" y="276" text-anchor="middle" style="font-size:9px;fill:#9ca3af">no endpoint route</text>
  <text x="490" y="290" text-anchor="middle" style="font-size:9px;fill:#9ca3af">DNS handles it</text>

  <!-- Interface endpoint -->
  <rect x="575" y="238" width="130" height="80" rx="10" fill="#7c3aed"/>
  <text x="640" y="270" text-anchor="middle" class="node">Interface</text>
  <text x="640" y="286" text-anchor="middle" class="node">Endpoint</text>
  <text x="640" y="304" text-anchor="middle" class="nodesub">vpce-0c7ceeb5...</text>

  <!-- Secrets Manager -->
  <rect x="575" y="355" width="130" height="70" rx="10" fill="#dc2626"/>
  <text x="640" y="385" text-anchor="middle" class="node">Secrets</text>
  <text x="640" y="401" text-anchor="middle" class="node">Manager</text>
  <text x="640" y="416" text-anchor="middle" class="nodesub">AWS backbone only</text>

  <!-- Arrows -->
  <line x1="100" y1="205" x2="156" y2="185" stroke="#b91c1c" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="243" y1="221" x2="243" y2="266" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr)"/>
  <line x1="305" y1="297" x2="318" y2="297" stroke="#7c3aed" stroke-width="2" marker-end="url(#darr)"/>
  <text x="190" y="288" class="dns">DNS: 10.0.136.123</text>
  <line x1="420" y1="297" x2="573" y2="278" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#darr)"/>
  <text x="420" y="272" class="dns">PrivateLink</text>
  <line x1="640" y1="318" x2="640" y2="353" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#darr)"/>

  <!-- DNS note -->
  <rect x="142" y="445" width="420" height="28" rx="4" fill="#fdf4ff" stroke="#9333ea"/>
  <text x="152" y="463" style="font-size:10px;fill:#7e22ce;font-weight:bold">DNS: secretsmanager.us-west-2.amazonaws.com → 10.0.136.123 (ENI) — no route table change needed</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b91c1c"/>
    </marker>
    <marker id="darr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
  </defs>
</svg>
