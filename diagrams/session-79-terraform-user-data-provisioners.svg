<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720" style="background:#ffffff;font-family:Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333333"/>
    </marker>
  </defs>

  <text x="500" y="30" font-size="20" font-weight="bold" text-anchor="middle" fill="#111111">Session 79 — Terraform Provisioners: local-exec / file / remote-exec</text>

  <rect x="30" y="70" width="180" height="60" rx="8" fill="#e8f0fe" stroke="#3367d6" stroke-width="1.5"/>
  <text x="120" y="95" font-size="13" text-anchor="middle" fill="#111111">Terraform client</text>
  <text x="120" y="112" font-size="11" text-anchor="middle" fill="#444444">(laptop / runner)</text>

  <rect x="280" y="60" width="680" height="300" rx="10" fill="#fafafa" stroke="#999999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="300" y="80" font-size="13" font-weight="bold" fill="#555555">AWS Account</text>

  <rect x="310" y="95" width="620" height="245" rx="8" fill="#eef7ee" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="325" y="113" font-size="12" font-weight="bold" fill="#2e7d32">VPC</text>

  <rect x="330" y="125" width="580" height="195" rx="8" fill="#f5faff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="345" y="143" font-size="12" font-weight="bold" fill="#1565c0">Public Subnet</text>

  <rect x="350" y="155" width="150" height="45" rx="6" fill="#fff3e0" stroke="#e65100"/>
  <text x="425" y="180" font-size="11" text-anchor="middle" fill="#111111">Security Group</text>

  <rect x="520" y="155" width="150" height="45" rx="6" fill="#fff3e0" stroke="#e65100"/>
  <text x="595" y="180" font-size="11" text-anchor="middle" fill="#111111">Key Pair (from local ~/.ssh)</text>

  <rect x="350" y="215" width="320" height="90" rx="6" fill="#e3f2fd" stroke="#0d47a1" stroke-width="1.5"/>
  <text x="510" y="235" font-size="12" font-weight="bold" text-anchor="middle" fill="#0d47a1">EC2 Instance</text>
  <text x="510" y="252" font-size="10" text-anchor="middle" fill="#333333">user_data runs ONCE at launch</text>
  <text x="510" y="266" font-size="10" text-anchor="middle" fill="#c62828">editing/restarting after boot = no effect</text>
  <text x="510" y="280" font-size="10" text-anchor="middle" fill="#333333">to change user_data: terminate + recreate</text>
  <text x="510" y="296" font-size="10" text-anchor="middle" fill="#333333">public_ip used by connection block</text>

  <line x1="210" y1="100" x2="330" y2="240" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="230" y="185" font-size="10" fill="#333333">apply (VPC, subnet, SG,</text>
  <text x="230" y="198" font-size="10" fill="#333333">key pair, EC2)</text>

  <rect x="30" y="400" width="940" height="290" rx="10" fill="#ffffff" stroke="#666666" stroke-width="1.5"/>
  <text x="50" y="425" font-size="14" font-weight="bold" fill="#111111">Provisioner flow (connection block: private_key, user=ubuntu/ec2-user, host=self.public_ip)</text>

  <rect x="60" y="450" width="200" height="70" rx="6" fill="#fce4ec" stroke="#ad1457"/>
  <text x="160" y="475" font-size="12" font-weight="bold" text-anchor="middle" fill="#ad1457">local-exec</text>
  <text x="160" y="492" font-size="10" text-anchor="middle" fill="#333333">creates file500</text>
  <text x="160" y="506" font-size="10" text-anchor="middle" fill="#333333">on the LOCAL machine</text>

  <rect x="60" y="540" width="200" height="70" rx="6" fill="#ede7f6" stroke="#4527a0"/>
  <text x="160" y="565" font-size="12" font-weight="bold" text-anchor="middle" fill="#4527a0">file provisioner</text>
  <text x="160" y="582" font-size="10" text-anchor="middle" fill="#333333">copies local file10 &#8594;</text>
  <text x="160" y="596" font-size="10" text-anchor="middle" fill="#333333">remote server home dir</text>

  <rect x="60" y="630" width="200" height="45" rx="6" fill="#e0f2f1" stroke="#00695c"/>
  <text x="160" y="650" font-size="12" font-weight="bold" text-anchor="middle" fill="#00695c">remote-exec</text>
  <text x="160" y="665" font-size="10" text-anchor="middle" fill="#333333">echo &#8594; file200 on server</text>

  <rect x="360" y="450" width="280" height="225" rx="8" fill="#f5f5f5" stroke="#555555" stroke-dasharray="4,3"/>
  <text x="500" y="472" font-size="12" font-weight="bold" text-anchor="middle" fill="#333333">EC2 Instance (remote)</text>
  <rect x="380" y="490" width="240" height="35" rx="4" fill="#ffffff" stroke="#4527a0"/>
  <text x="500" y="512" font-size="10" text-anchor="middle" fill="#333333">file10 (from file provisioner)</text>
  <rect x="380" y="535" width="240" height="35" rx="4" fill="#ffffff" stroke="#00695c"/>
  <text x="500" y="557" font-size="10" text-anchor="middle" fill="#333333">file200 = "hello from vdevops" (remote-exec)</text>
  <rect x="380" y="580" width="240" height="70" rx="4" fill="#ffffff" stroke="#c62828" stroke-dasharray="3,2"/>
  <text x="500" y="602" font-size="10" text-anchor="middle" fill="#c62828">terraform taint aws_instance.server</text>
  <text x="500" y="618" font-size="10" text-anchor="middle" fill="#333333">forces destroy + recreate</text>
  <text x="500" y="634" font-size="10" text-anchor="middle" fill="#333333">(only way to force provisioner rerun —</text>
  <text x="500" y="648" font-size="10" text-anchor="middle" fill="#333333">state doesn't track provisioner content)</text>

  <line x1="260" y1="485" x2="360" y2="485" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="575" x2="360" y2="560" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="652" x2="360" y2="600" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="700" y="450" width="240" height="150" rx="6" fill="#fff8e1" stroke="#f9a825"/>
  <text x="820" y="472" font-size="12" font-weight="bold" text-anchor="middle" fill="#f57f17">State tracking gap</text>
  <text x="820" y="492" font-size="10" text-anchor="middle" fill="#333333">terraform plan after editing a</text>
  <text x="820" y="506" font-size="10" text-anchor="middle" fill="#333333">provisioner's command:</text>
  <text x="820" y="524" font-size="13" font-weight="bold" text-anchor="middle" fill="#c62828">0 changes reported</text>
  <text x="820" y="544" font-size="10" text-anchor="middle" fill="#333333">state only tracks the parent</text>
  <text x="820" y="558" font-size="10" text-anchor="middle" fill="#333333">AWS resource, not provisioner</text>
  <text x="820" y="572" font-size="10" text-anchor="middle" fill="#333333">logic inside it &#8594; solved next</text>
  <text x="820" y="586" font-size="10" text-anchor="middle" fill="#333333">session with null_resource</text>
</svg>
