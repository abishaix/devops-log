<svg width="940" height="820" viewBox="0 0 940 820" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif">

  <text x="470" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Session 74 — Custom Network Build, State Backup &amp; Targeted Apply</text>

  <!-- Panel 1: custom network build order -->
  <text x="20" y="65" font-size="14" font-weight="bold" fill="#2c3e50">1. Custom Network — Build Order &amp; Explicit Association</text>

  <rect x="20" y="80" width="110" height="34" rx="4" fill="#dbe9f6" stroke="#2c3e50"/>
  <text x="75" y="102" font-size="10.5" text-anchor="middle">VPC</text>
  <line x1="130" y1="97" x2="160" y2="97" stroke="#2c3e50" marker-end="url(#arrow)"/>

  <rect x="160" y="80" width="110" height="34" rx="4" fill="#dbe9f6" stroke="#2c3e50"/>
  <text x="215" y="102" font-size="10.5" text-anchor="middle">Subnet</text>
  <line x1="270" y1="97" x2="300" y2="97" stroke="#2c3e50" marker-end="url(#arrow)"/>

  <rect x="300" y="80" width="110" height="34" rx="4" fill="#dbe9f6" stroke="#2c3e50"/>
  <text x="355" y="102" font-size="10.5" text-anchor="middle">Internet GW</text>
  <line x1="410" y1="97" x2="440" y2="97" stroke="#2c3e50" marker-end="url(#arrow)"/>

  <rect x="440" y="80" width="110" height="34" rx="4" fill="#dbe9f6" stroke="#2c3e50"/>
  <text x="495" y="102" font-size="10.5" text-anchor="middle">Route Table</text>
  <line x1="550" y1="97" x2="580" y2="97" stroke="#2c3e50" marker-end="url(#arrow)"/>

  <rect x="580" y="80" width="150" height="34" rx="4" fill="#fdebd0" stroke="#c0392b"/>
  <text x="655" y="98" font-size="10" text-anchor="middle">Route Table Association</text>
  <text x="655" y="110" font-size="8.5" text-anchor="middle" fill="#c0392b">separate resource!</text>
  <line x1="730" y1="97" x2="760" y2="97" stroke="#2c3e50" marker-end="url(#arrow)"/>

  <rect x="760" y="80" width="150" height="34" rx="4" fill="#dbe9f6" stroke="#2c3e50"/>
  <text x="835" y="102" font-size="10.5" text-anchor="middle">Security Group</text>

  <text x="20" y="150" font-size="10.5" fill="#555">Route table's inline `route {}` block is scoped by the resource itself — no extra ID needed to say which table.</text>
  <text x="20" y="165" font-size="10.5" fill="#555">`aws_route_table_association` is a fully independent resource type — Terraform has no implicit link between two</text>
  <text x="20" y="180" font-size="10.5" fill="#555">separate resource blocks, so it always needs BOTH `subnet_id` and `route_table_id` explicitly, even though the</text>
  <text x="20" y="195" font-size="10.5" fill="#555">route table already "knows" its own routes.</text>

  <!-- Panel 2: destroy on public IP change -->
  <text x="20" y="235" font-size="14" font-weight="bold" fill="#2c3e50">2. Some Attribute Changes Force Replacement — Even "Small" Ones</text>

  <rect x="30" y="250" width="260" height="34" rx="4" fill="#dbe9f6" stroke="#2c3e50"/>
  <text x="160" y="272" font-size="11" text-anchor="middle">Instance running, no public IP</text>
  <line x1="160" y1="284" x2="160" y2="310" stroke="#c0392b" marker-end="url(#arrow)"/>
  <text x="175" y="302" font-size="10" fill="#c0392b">set map_public_ip_on_launch = true</text>

  <rect x="30" y="310" width="260" height="34" rx="4" fill="#f5b7b1" stroke="#c0392b"/>
  <text x="160" y="332" font-size="11" text-anchor="middle" font-weight="bold">DESTROY → CREATE (not in-place)</text>

  <text x="320" y="270" font-size="10.5" fill="#555">Public IP assignment is set at</text>
  <text x="320" y="285" font-size="10.5" fill="#555">launch time, not mutable after —</text>
  <text x="320" y="300" font-size="10.5" fill="#555">so even a "small" attribute flip</text>
  <text x="320" y="315" font-size="10.5" fill="#555">triggers full replacement.</text>
  <text x="320" y="335" font-size="10.5" fill="#c0392b" font-weight="bold">Same lesson as session-72:</text>
  <text x="320" y="350" font-size="10.5" fill="#c0392b" font-weight="bold">always read the plan before apply —</text>
  <text x="320" y="365" font-size="10.5" fill="#c0392b" font-weight="bold">"replace" hides behind small diffs.</text>

  <!-- Panel 3: state backup mechanics -->
  <text x="20" y="410" font-size="14" font-weight="bold" fill="#2c3e50">3. terraform.tfstate.backup — When It's Created, What It Holds</text>

  <rect x="30" y="425" width="180" height="34" rx="4" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="120" y="447" font-size="10.5" text-anchor="middle">apply #1 (t2.micro)</text>
  <text x="230" y="447" font-size="10" fill="#555">no .backup file yet</text>

  <line x1="120" y1="459" x2="120" y2="485" stroke="#2c3e50" marker-end="url(#arrow)"/>

  <rect x="30" y="485" width="180" height="34" rx="4" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="120" y="507" font-size="10.5" text-anchor="middle">apply #2 (t2.medium)</text>
  <text x="330" y="500" font-size="10" fill="#555">.backup now holds t2.micro</text>
  <text x="330" y="514" font-size="10" fill="#555">(the state just before THIS apply)</text>
  <text x="330" y="528" font-size="10" fill="#555">current state = t2.medium</text>

  <line x1="120" y1="519" x2="120" y2="545" stroke="#2c3e50" marker-end="url(#arrow)"/>

  <rect x="30" y="545" width="180" height="34" rx="4" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="120" y="567" font-size="10.5" text-anchor="middle">apply #3 (t2.large)</text>
  <text x="330" y="560" font-size="10" fill="#555">.backup now holds t2.medium</text>
  <text x="330" y="574" font-size="10" fill="#555">(overwrites the t2.micro backup)</text>
  <text x="330" y="588" font-size="10" fill="#555">current state = t2.large</text>

  <text x="30" y="605" font-size="10.5" fill="#555">Backup is always exactly one apply behind — not full history. To revert: copy .backup back over the current</text>
  <text x="30" y="620" font-size="10.5" fill="#555">state file, then plan/apply to reconcile real infra to match.</text>

  <!-- Panel 4: -target -->
  <text x="20" y="660" font-size="14" font-weight="bold" fill="#2c3e50">4. terraform plan/apply -target — Scoping to One Resource</text>

  <rect x="30" y="675" width="150" height="34" rx="4" fill="#dbe9f6" stroke="#2c3e50"/>
  <text x="105" y="697" font-size="10.5" text-anchor="middle">aws_vpc.dev</text>

  <rect x="200" y="675" width="150" height="34" rx="4" fill="#f0f0f0" stroke="#999" stroke-dasharray="3,2"/>
  <text x="275" y="697" font-size="10.5" text-anchor="middle" fill="#777">aws_subnet.public</text>

  <rect x="370" y="675" width="150" height="34" rx="4" fill="#f0f0f0" stroke="#999" stroke-dasharray="3,2"/>
  <text x="445" y="697" font-size="10.5" text-anchor="middle" fill="#777">aws_instance.dev</text>

  <text x="30" y="730" font-size="10.5" font-family="monospace" fill="#2c3e50">terraform plan -target=aws_vpc.dev</text>
  <text x="30" y="748" font-size="10.5" fill="#555">Only the targeted resource is planned/applied — others in the same config are skipped for this run,</text>
  <text x="30" y="763" font-size="10.5" fill="#555">even though they exist in main.tf. Repeat -target for multiple resources. Works for apply and destroy too —</text>
  <text x="30" y="778" font-size="10.5" fill="#555">useful for large configs where you need to act on one resource without touching everything else.</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2c3e50"/>
    </marker>
  </defs>
</svg>
