<svg width="680" height="460" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="40" y="40" width="140" height="44" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="110" y="66" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c2c2a">Internet gateway</text>
<line x1="110" y1="84" x2="110" y2="120" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="230" y="40" width="220" height="44" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="340" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c2c2a">Route table</text>
<text x="340" y="75" text-anchor="middle" font-size="12" fill="#444441">0.0.0.0/0 to IGW</text>
<line x1="340" y1="84" x2="340" y2="120" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="120" width="600" height="300" rx="20" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
<text x="64" y="150" font-size="14" font-weight="bold" fill="#042c53">VPC</text>

<rect x="70" y="170" width="260" height="220" rx="12" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="200" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#04342c">Subnet A</text>
<text x="200" y="218" text-anchor="middle" font-size="12" fill="#0f6e56">AZ-1</text>

<rect x="350" y="170" width="260" height="220" rx="12" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="480" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#04342c">Subnet B</text>
<text x="480" y="218" text-anchor="middle" font-size="12" fill="#0f6e56">AZ-2</text>

<rect x="95" y="250" width="210" height="60" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="200" y="274" text-anchor="middle" font-size="14" font-weight="bold" fill="#26215c">RDS primary</text>
<text x="200" y="292" text-anchor="middle" font-size="12" fill="#3c3489">db.t3.micro, MySQL 8.0</text>

<rect x="375" y="250" width="210" height="60" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<text x="480" y="274" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a1b0c">Read replica</text>
<text x="480" y="292" text-anchor="middle" font-size="12" fill="#712b13">replica_source_db = ARN</text>

<line x1="305" y1="280" x2="373" y2="280" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="339" y="266" text-anchor="middle" font-size="12" fill="#444441">replicates</text>

<rect x="140" y="330" width="400" height="34" rx="6" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="340" y="351" text-anchor="middle" font-size="12" fill="#2c2c2a">DB subnet group -- spans both AZs</text>
<line x1="200" y1="330" x2="200" y2="310" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="480" y1="330" x2="480" y2="310" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<text x="340" y="410" text-anchor="middle" font-size="12" fill="#444441">Both subnets are route-table-associated so publicly_accessible = true resolves end to end</text>
</svg>
