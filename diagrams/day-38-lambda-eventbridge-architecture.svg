<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" style="background:#ffffff;font-family:Arial,sans-serif">

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Lambda Triggers: Event-Driven vs Schedule-Based</text>

  <!-- ── LEFT: Event-Driven ── -->
  <rect x="20" y="45" width="380" height="440" rx="10" fill="#f0f4ff" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="210" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a6fa5">Event-Driven Trigger</text>

  <!-- S3 -->
  <rect x="80" y="82" width="120" height="44" rx="6" fill="#e67e22" stroke="#b85c0a" stroke-width="1.5"/>
  <text x="140" y="101" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">S3 Bucket</text>
  <text x="140" y="117" text-anchor="middle" font-size="9" fill="#ffe8cc">PutObject event</text>

  <!-- Arrow -->
  <line x1="140" y1="126" x2="140" y2="154" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="155" y="145" font-size="9" fill="#555">event fired</text>

  <!-- EventBridge -->
  <rect x="60" y="154" width="160" height="44" rx="6" fill="#8e44ad" stroke="#5e2d73" stroke-width="1.5"/>
  <text x="140" y="173" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">EventBridge</text>
  <text x="140" y="189" text-anchor="middle" font-size="9" fill="#ead6ff">matches event rule</text>

  <!-- Arrow -->
  <line x1="140" y1="198" x2="140" y2="226" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="155" y="217" font-size="9" fill="#555">triggers</text>

  <!-- Lambda -->
  <rect x="60" y="226" width="160" height="44" rx="6" fill="#e74c3c" stroke="#a93226" stroke-width="1.5"/>
  <text x="140" y="245" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Lambda Function</text>
  <text x="140" y="261" text-anchor="middle" font-size="9" fill="#ffd6d6">code executes</text>

  <!-- Arrow -->
  <line x1="140" y1="270" x2="140" y2="298" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Result -->
  <rect x="60" y="298" width="160" height="44" rx="6" fill="#27ae60" stroke="#1a7a40" stroke-width="1.5"/>
  <text x="140" y="317" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Action Completed</text>
  <text x="140" y="333" text-anchor="middle" font-size="9" fill="#d4fce4">process file, create EC2, etc.</text>

  <!-- CloudWatch box -->
  <rect x="30" y="365" width="330" height="100" rx="6" fill="#fff9e6" stroke="#f0c040" stroke-width="1"/>
  <text x="195" y="383" text-anchor="middle" font-size="11" font-weight="bold" fill="#b7860b">CloudWatch — Auto Integrated</text>
  <text x="50" y="401" font-size="10" fill="#333">Every Lambda run → logs pushed automatically</text>
  <text x="50" y="417" font-size="10" fill="#333">Log Group: /aws/lambda/function-name</text>
  <text x="50" y="433" font-size="10" fill="#333">Each invocation → new Log Stream</text>
  <text x="50" y="449" font-size="10" fill="#555">START → logs → END → REPORT (duration, memory)</text>

  <!-- ── RIGHT: Schedule-Based ── -->
  <rect x="460" y="45" width="380" height="440" rx="10" fill="#f5fff5" stroke="#27ae60" stroke-width="1.5"/>
  <text x="650" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">Schedule-Based Trigger</text>

  <!-- EventBridge Schedule -->
  <rect x="510" y="82" width="280" height="60" rx="6" fill="#8e44ad" stroke="#5e2d73" stroke-width="1.5"/>
  <text x="650" y="103" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">EventBridge Schedule</text>
  <text x="560" y="122" font-size="9" fill="#ead6ff">One-off: specific date/time, runs once</text>
  <text x="560" y="135" font-size="9" fill="#ead6ff">Recurring: every day/hour/Monday etc.</text>

  <!-- Arrow -->
  <line x1="650" y1="142" x2="650" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="665" y="161" font-size="9" fill="#555">triggers</text>

  <!-- Lambda -->
  <rect x="550" y="170" width="200" height="44" rx="6" fill="#e74c3c" stroke="#a93226" stroke-width="1.5"/>
  <text x="650" y="189" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Lambda Function</text>
  <text x="650" y="205" text-anchor="middle" font-size="9" fill="#ffd6d6">runs script / batch job</text>

  <!-- Arrow -->
  <line x1="650" y1="214" x2="650" y2="242" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Done -->
  <rect x="550" y="242" width="200" height="44" rx="6" fill="#27ae60" stroke="#1a7a40" stroke-width="1.5"/>
  <text x="650" y="261" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Job Done</text>
  <text x="650" y="277" text-anchor="middle" font-size="9" fill="#d4fce4">environment killed, billing stops</text>

  <!-- Limitations box -->
  <rect x="470" y="305" width="360" height="160" rx="6" fill="#fff0f0" stroke="#e74c3c" stroke-width="1"/>
  <text x="650" y="323" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">Lambda Limitations</text>
  <text x="490" y="341" font-size="10" fill="#333">Max runtime:       15 minutes</text>
  <text x="490" y="357" font-size="10" fill="#333">Max RAM:           10 GB</text>
  <text x="490" y="373" font-size="10" fill="#333">Ephemeral storage: 512 MB – 10 GB (/tmp)</text>
  <text x="490" y="389" font-size="10" fill="#333">Concurrency:       1,000 per region</text>
  <text x="490" y="405" font-size="10" fill="#333">Not for:           continuous apps, web servers</text>
  <text x="490" y="421" font-size="10" fill="#333">Best for:          batch jobs, event automation</text>
  <text x="490" y="441" font-size="10" fill="#888">Stateless — no data persists between invocations</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>

</svg>
