<svg width="680" height="360" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="255" y="30" width="170" height="64" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="340" y="54" text-anchor="middle" font-size="14" font-weight="bold" fill="#26215c">Module source</text>
<text x="340" y="72" text-anchor="middle" font-size="12" fill="#3c3489">GitHub, no hardcoded values</text>
<text x="340" y="88" text-anchor="middle" font-size="12" fill="#3c3489">variables.tf defines inputs</text>

<line x1="255" y1="80" x2="130" y2="150" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="94" x2="340" y2="150" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="425" y1="80" x2="550" y2="150" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="150" width="180" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="130" y="174" text-anchor="middle" font-size="14" font-weight="bold" fill="#04342c">Dev caller</text>
<text x="130" y="192" text-anchor="middle" font-size="12" fill="#0f6e56">instance_type = t2.micro</text>

<rect x="250" y="150" width="180" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="340" y="174" text-anchor="middle" font-size="14" font-weight="bold" fill="#04342c">Test caller</text>
<text x="340" y="192" text-anchor="middle" font-size="12" fill="#0f6e56">instance_type = t2.medium</text>

<rect x="460" y="150" width="180" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="550" y="174" text-anchor="middle" font-size="14" font-weight="bold" fill="#04342c">Padma's caller</text>
<text x="550" y="192" text-anchor="middle" font-size="12" fill="#0f6e56">instance_type = t3.small</text>

<line x1="130" y1="206" x2="130" y2="240" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="206" x2="340" y2="240" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="550" y1="206" x2="550" y2="240" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="240" width="180" height="50" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="130" y="262" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c2c2a">terraform.tfstate</text>
<text x="130" y="279" text-anchor="middle" font-size="12" fill="#444441">local to dev directory</text>

<rect x="250" y="240" width="180" height="50" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="340" y="262" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c2c2a">terraform.tfstate</text>
<text x="340" y="279" text-anchor="middle" font-size="12" fill="#444441">local to test directory</text>

<rect x="460" y="240" width="180" height="50" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="550" y="262" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c2c2a">terraform.tfstate</text>
<text x="550" y="279" text-anchor="middle" font-size="12" fill="#444441">local to Padma's directory</text>

<text x="340" y="330" text-anchor="middle" font-size="12" fill="#444441">Module content is identical everywhere -- state is never shared between callers</text>
</svg>
