<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" style="background:#ffffff;font-family:Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ao" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#A32D2D" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1A1A2E">Day 12 — Health Checks, AZ Routing &amp; Elastic IP</text>

  <!-- Internet + IGW -->
  <rect x="330" y="34" width="240" height="44" rx="22" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
  <text x="450" y="62" text-anchor="middle" font-size="14" font-weight="bold" fill="#0C447C">Internet → IGW</text>

  <!-- User -->
  <rect x="20" y="34" width="120" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="80" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#0C447C">User</text>
  <line x1="140" y1="56" x2="328" y2="56" stroke="#185FA5" stroke-width="1.3" marker-end="url(#ab)"/>

  <!-- VPC -->
  <rect x="20" y="96" width="860" height="504" rx="16" fill="#EEEDFE" fill-opacity="0.12" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="450" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#3C3489">VPC</text>
  <line x1="450" y1="78" x2="450" y2="96" stroke="#555" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- LB -->
  <rect x="160" y="128" width="580" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
  <text x="450" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#633806">Application Load Balancer</text>
  <text x="450" y="168" text-anchor="middle" font-size="11" fill="#854F0B">Internet-facing  |  HTTP:80  |  Listener → Target Group  |  Round Robin</text>

  <!-- LB → TG -->
  <line x1="450" y1="180" x2="450" y2="218" stroke="#854F0B" stroke-width="1.5" marker-end="url(#ao)"/>

  <!-- TG -->
  <rect x="310" y="218" width="280" height="48" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.3"/>
  <text x="450" y="238" text-anchor="middle" font-size="13" font-weight="bold" fill="#3C3489">Target Group</text>
  <text x="450" y="254" text-anchor="middle" font-size="11" fill="#534AB7">HTTP:80  |  health check every 30s  |  threshold: 2</text>

  <!-- AZ 1a -->
  <rect x="36" y="284" width="256" height="296" rx="10" fill="#E1F5EE" fill-opacity="0.3" stroke="#0F6E56" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="164" y="304" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">AZ 1a</text>

  <!-- AZ 1b -->
  <rect x="322" y="284" width="256" height="296" rx="10" fill="#FAECE7" fill-opacity="0.3" stroke="#993C1D" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="450" y="304" text-anchor="middle" font-size="12" font-weight="bold" fill="#712B13">AZ 1b</text>

  <!-- AZ 1c -->
  <rect x="608" y="284" width="256" height="296" rx="10" fill="#FFFEF0" fill-opacity="0.5" stroke="#CCA800" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="736" y="304" text-anchor="middle" font-size="12" font-weight="bold" fill="#5A4800">AZ 1c  ← added later</text>

  <!-- Public subnet 1a -->
  <rect x="52" y="314" width="224" height="100" rx="8" fill="#E1F5EE" fill-opacity="0.6" stroke="#0F6E56" stroke-width="1"/>
  <text x="164" y="334" text-anchor="middle" font-size="11" font-weight="bold" fill="#085041">Public Subnet 1a</text>
  <rect x="68" y="348" width="92" height="52" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="114" y="370" text-anchor="middle" font-size="11" fill="#0C447C">Bastion</text>
  <text x="114" y="386" text-anchor="middle" font-size="10" fill="#185FA5">Elastic IP</text>
  <rect x="172" y="348" width="88" height="52" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="216" y="370" text-anchor="middle" font-size="11" fill="#633806">NAT GW</text>
  <text x="216" y="386" text-anchor="middle" font-size="10" fill="#854F0B">regional</text>

  <!-- Public subnet 1b -->
  <rect x="338" y="314" width="224" height="100" rx="8" fill="#FAECE7" fill-opacity="0.5" stroke="#993C1D" stroke-width="1"/>
  <text x="450" y="334" text-anchor="middle" font-size="11" font-weight="bold" fill="#712B13">Public Subnet 1b</text>
  <text x="450" y="370" text-anchor="middle" font-size="11" fill="#993C1D">LB node (AWS managed)</text>
  <text x="450" y="388" text-anchor="middle" font-size="10" fill="#993C1D">RT: 0.0.0.0/0 → IGW</text>

  <!-- Public subnet 1c -->
  <rect x="624" y="314" width="224" height="100" rx="8" fill="#FFFEF0" fill-opacity="0.7" stroke="#CCA800" stroke-width="1.2"/>
  <text x="736" y="334" text-anchor="middle" font-size="11" font-weight="bold" fill="#5A4800">Public Subnet 1c  ← new</text>
  <text x="736" y="362" text-anchor="middle" font-size="11" fill="#5A4800">Created to support</text>
  <text x="736" y="378" text-anchor="middle" font-size="11" fill="#5A4800">LB node in 1c</text>
  <text x="736" y="394" text-anchor="middle" font-size="10" fill="#5A4800">RT: 0.0.0.0/0 → IGW</text>

  <!-- LB to public subnets -->
  <line x1="310" y1="180" x2="164" y2="314" stroke="#854F0B" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#ao)"/>
  <line x1="450" y1="180" x2="450" y2="314" stroke="#854F0B" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#ao)"/>
  <line x1="590" y1="180" x2="736" y2="314" stroke="#854F0B" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#ao)"/>

  <!-- Private subnet 1a -->
  <rect x="52" y="432" width="224" height="132" rx="8" fill="#E6F1FB" fill-opacity="0.4" stroke="#185FA5" stroke-width="1"/>
  <text x="164" y="452" text-anchor="middle" font-size="11" font-weight="bold" fill="#0C447C">Private Subnet 1a</text>
  <text x="164" y="468" text-anchor="middle" font-size="10" fill="#185FA5">RT: 0.0.0.0/0 → NAT</text>
  <rect x="80" y="478" width="168" height="72" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="164" y="500" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C447C">App Server 1</text>
  <text x="164" y="518" text-anchor="middle" font-size="11" fill="#0F6E56">✅ Healthy</text>
  <text x="164" y="534" text-anchor="middle" font-size="10" fill="#185FA5">Nginx:80</text>

  <!-- Private subnet 1b -->
  <rect x="338" y="432" width="224" height="132" rx="8" fill="#FAECE7" fill-opacity="0.4" stroke="#993C1D" stroke-width="1"/>
  <text x="450" y="452" text-anchor="middle" font-size="11" font-weight="bold" fill="#712B13">Private Subnet 1b</text>
  <text x="450" y="468" text-anchor="middle" font-size="10" fill="#993C1D">RT: 0.0.0.0/0 → NAT</text>
  <rect x="366" y="478" width="168" height="72" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="450" y="500" text-anchor="middle" font-size="12" font-weight="bold" fill="#712B13">App Server 2</text>
  <text x="450" y="518" text-anchor="middle" font-size="11" fill="#0F6E56">✅ Healthy</text>
  <text x="450" y="534" text-anchor="middle" font-size="10" fill="#993C1D">Nginx:80</text>

  <!-- Private subnet 1c -->
  <rect x="624" y="432" width="224" height="132" rx="8" fill="#FFFEF0" fill-opacity="0.6" stroke="#CCA800" stroke-width="1.2"/>
  <text x="736" y="452" text-anchor="middle" font-size="11" font-weight="bold" fill="#5A4800">Private Subnet 1c</text>
  <text x="736" y="468" text-anchor="middle" font-size="10" fill="#5A4800">RT: 0.0.0.0/0 → NAT</text>
  <rect x="652" y="478" width="168" height="72" rx="6" fill="#FFFEF0" stroke="#CCA800" stroke-width="1"/>
  <text x="736" y="500" text-anchor="middle" font-size="12" font-weight="bold" fill="#5A4800">App Server 3</text>
  <text x="736" y="518" text-anchor="middle" font-size="11" fill="#A32D2D">❌ Before: Unhealthy</text>
  <text x="736" y="534" text-anchor="middle" font-size="11" fill="#0F6E56">✅ After: Healthy</text>

  <!-- TG to servers -->
  <path d="M380 266 L164 432" fill="none" stroke="#854F0B" stroke-width="1.8" marker-end="url(#ao)"/>
  <path d="M450 266 L450 432" fill="none" stroke="#854F0B" stroke-width="1.8" marker-end="url(#ao)"/>
  <path d="M520 266 L736 432" fill="none" stroke="#854F0B" stroke-width="1.8" marker-end="url(#ao)"/>

  <!-- Health check timing note -->
  <rect x="20" y="570" width="550" height="40" rx="6" fill="#FFF3CD" stroke="#CCA800" stroke-width="0.8"/>
  <text x="295" y="586" text-anchor="middle" font-size="12" font-weight="bold" fill="#5A4800">Health check timing: interval 30s × threshold 2 = 60s to detect failure</text>
  <text x="295" y="602" text-anchor="middle" font-size="11" fill="#854F0B">LB checks port:80 path:/ — if no HTTP 200 within 5s → timeout → after 2 failures → UNHEALTHY</text>

  <!-- Elastic IP note -->
  <rect x="590" y="570" width="290" height="40" rx="6" fill="#E8F8E8" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="735" y="586" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">Elastic IP = static public IP</text>
  <text x="735" y="602" text-anchor="middle" font-size="11" fill="#0F6E56">Survives stop/start  |  charged if unattached</text>

  <!-- Legend -->
  <rect x="20" y="614" width="860" height="0" rx="0"/>
</svg>
