<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" style="background:#ffffff;font-family:Arial,sans-serif">
  <style>
    .title{font-size:20px;font-weight:bold;fill:#1a1a2e}
    .sub{font-size:13px;font-weight:bold;fill:#444}
    .lbl{font-size:12px;fill:#1a1a2e}
    .mono{font-size:12px;font-family:'Courier New',monospace;fill:#1a1a2e}
    .small{font-size:11px;fill:#555}
    .wd{fill:#fdeaea;stroke:#b03030;stroke-width:1.6}
    .stage{fill:#e7f7ec;stroke:#2a9d4e;stroke-width:1.6}
    .lr{fill:#eef2ff;stroke:#4361ee;stroke-width:1.6}
    .remote{fill:#f3e8ff;stroke:#8e44ad;stroke-width:1.6}
    .laptop{fill:none;stroke:#888;stroke-width:1.4;stroke-dasharray:6,4}
    .cmd{fill:#fff7e6;stroke:#e8870c;stroke-width:1.2}
    .ar{stroke:#444;stroke-width:1.8;fill:none;marker-end:url(#ah)}
    .arb{stroke:#8e44ad;stroke-width:1.8;fill:none;marker-end:url(#ahp)}
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
    <marker id="ahp" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8e44ad"/>
    </marker>
  </defs>

  <text x="30" y="34" class="title">Session 62 — Git Lifecycle: Local Stages → GitHub</text>

  <!-- Laptop boundary -->
  <rect x="24" y="58" width="700" height="300" rx="10" class="laptop"/>
  <text x="40" y="80" class="sub" fill="#888">YOUR LAPTOP — everything here is local (has .git)</text>

  <!-- Working dir -->
  <rect x="44" y="100" width="160" height="120" rx="6" class="wd"/>
  <text x="124" y="122" class="lbl" text-anchor="middle" font-weight="bold">working directory</text>
  <text x="124" y="148" class="mono" text-anchor="middle">file-1</text>
  <text x="124" y="168" class="mono" text-anchor="middle">file-2</text>
  <text x="124" y="188" class="mono" text-anchor="middle">file-3</text>
  <text x="124" y="210" class="small" text-anchor="middle">you edit here</text>

  <!-- Staging -->
  <rect x="270" y="100" width="160" height="120" rx="6" class="stage"/>
  <text x="350" y="122" class="lbl" text-anchor="middle" font-weight="bold">staging area</text>
  <text x="350" y="156" class="mono" text-anchor="middle">file-1</text>
  <text x="350" y="200" class="small" text-anchor="middle">only what you chose</text>

  <!-- Local repo -->
  <rect x="496" y="100" width="200" height="120" rx="6" class="lr"/>
  <text x="596" y="122" class="lbl" text-anchor="middle" font-weight="bold">local repo</text>
  <text x="596" y="148" class="mono" text-anchor="middle">file-1  egf2</text>
  <text x="596" y="168" class="mono" text-anchor="middle">file-1  wqy</text>
  <text x="596" y="188" class="mono" text-anchor="middle">file-1  uqtui</text>
  <text x="596" y="210" class="small" text-anchor="middle">commits = version IDs</text>

  <!-- arrows local -->
  <line x1="204" y1="160" x2="270" y2="160" class="ar"/>
  <rect x="206" y="138" width="62" height="20" rx="4" class="cmd"/>
  <text x="237" y="152" class="mono" text-anchor="middle">git add</text>

  <line x1="430" y1="160" x2="496" y2="160" class="ar"/>
  <rect x="426" y="138" width="74" height="20" rx="4" class="cmd"/>
  <text x="463" y="152" class="mono" text-anchor="middle">git commit</text>

  <!-- Remote -->
  <rect x="772" y="100" width="160" height="120" rx="10" class="remote"/>
  <text x="852" y="122" class="lbl" text-anchor="middle" font-weight="bold">GitHub</text>
  <text x="852" y="142" class="small" text-anchor="middle">remote repository</text>
  <text x="852" y="166" class="mono" text-anchor="middle">file-1  egf2</text>
  <text x="852" y="184" class="mono" text-anchor="middle">file-1  wqy</text>
  <text x="852" y="202" class="mono" text-anchor="middle">file-1  uqtui</text>

  <!-- push / pull -->
  <line x1="696" y1="140" x2="772" y2="140" class="arb"/>
  <text x="734" y="132" class="mono" text-anchor="middle" fill="#8e44ad">push</text>
  <line x1="772" y1="184" x2="696" y2="184" class="arb"/>
  <text x="734" y="200" class="mono" text-anchor="middle" fill="#8e44ad">pull</text>

  <text x="44" y="250" class="small">push = upload commits + IDs to remote   ·   pull = download remote commits into existing local repo</text>
  <text x="44" y="272" class="small">commit does NOT touch GitHub — it saves to the local repo only. Nothing is remote until push.</text>
  <text x="44" y="294" class="small">Git tracks changes ONLY inside a repo (a folder containing .git). Outside it, Git sees nothing.</text>
  <text x="44" y="316" class="small">5 edits then 1 commit = 1 version (like S3: it snapshots on commit, not on every keystroke).</text>
  <text x="44" y="338" class="small">git status = is it tracked/staged?  ·  git log = local commit history  ·  git remote -v = where push goes</text>

  <!-- Two ways to start -->
  <text x="30" y="396" class="sub">Two ways to start a repo</text>

  <rect x="30" y="410" width="440" height="180" rx="8" class="lr" fill="#f7f9ff"/>
  <text x="48" y="432" class="lbl" font-weight="bold">A — Remote-first (recommended)</text>
  <text x="48" y="456" class="mono">1. create repo on GitHub</text>
  <text x="48" y="476" class="mono">2. git clone &lt;https-url&gt;</text>
  <text x="48" y="496" class="mono">3. edit → add → commit → push</text>
  <text x="48" y="524" class="small">clone = init + remote add + pull (all set up</text>
  <text x="48" y="540" class="small">for you — URL and branch configured).</text>
  <text x="48" y="566" class="small">Use HTTPS url; SSH needs keys (later topic).</text>

  <rect x="496" y="410" width="436" height="180" rx="8" class="stage" fill="#f5fbf7"/>
  <text x="514" y="432" class="lbl" font-weight="bold">B — Local-first (more friction)</text>
  <text x="514" y="456" class="mono">mkdir dev &amp;&amp; cd dev</text>
  <text x="514" y="476" class="mono">git init  →  add → commit</text>
  <text x="514" y="496" class="mono">git remote add &lt;name&gt; &lt;url&gt;</text>
  <text x="514" y="516" class="mono">git push  (reconcile master↔main)</text>
  <text x="514" y="544" class="small">push has no target until a remote endpoint</text>
  <text x="514" y="560" class="small">is attached. Plus first-time identity config:</text>
  <text x="514" y="578" class="mono">git config --global user.name / user.email</text>
</svg>
